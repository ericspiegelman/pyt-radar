    .subscribe-form button:hover {

      flex-wrap: wrap;

    .filter-group {

    }

    .filter-group label {
      font-size: 0.85rem;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .filter-group input[type="text"],
    .filter-group select {
      padding: 0.6rem 0.8rem;
      border-radius: 6px;
      border: 1px solid #ddd;
      background: #fff;
      color: #1a1a1a;
      font-size: 0.9rem;
      font-family: inherit;
      transition: all 0.2s ease;
    }

    .filter-group input[type="text"]:focus,
    .filter-group select:focus {
      outline: none;
      border-color: #e74c3c;
      box-shadow: 0 0 0 3px rgba(231, 76, 60, 0.1);
    }

    .filter-group select {
      cursor: pointer;
    }

    .search-input {
      flex: 1;
      min-width: 200px;
    }

    .filter-reset {
      padding: 0.6rem 1rem;

      color: #555;
      border: none;
      border-radius: 6px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 0.9rem;

    .filter-reset:hover {
      background: #d5dbdb;
    }

      color: #666;
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
    }

    }

      text-transform: uppercase;
      letter-spacing: 0.5px;

    .episode-date {
      font-size: 0.8rem;
      color: #aaa;

    .episode-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 0.8rem;
      line-height: 1.4;
    }

      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;

      background: #ecf0f1;
      color: #555;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 500;
    }

    .tag-person {
      background: #e8f4f8;
      color: #0277bd;
    }

    .tag-guest {
      background: #f0e8f4;
      color: #7b1fa2;
    }

    .tag-mention {
      background: #fff3e0;
      color: #e65100;
    }

    .tag-source {
      background: #e8f5e9;
      color: #2e7d32;
    }

      display: inline-block;
      padding: 0.3rem 0.75rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;

      background: #ecf0f1;
      color: #555;
    }

    .sentiment-negative {
      background: #fadbd8;
      color: #c0392b;
    }

    .sentiment-positive {
      background: #d5f4e6;
      color: #27ae60;
    }

    .sentiment-mixed {
      background: #fde8d5;
      color: #d68910;
    }

      color: #666;
      font-size: 0.95rem;
      margin-bottom: 1rem;
    }

      font-size: 0.95rem;
      margin-bottom: 0.5rem;
      line-height: 1.5;

      font-size: 2rem;
      line-height: 0;
      vertical-align: -0.4em;
      margin-right: 0.2rem;

      font-size: 0.85rem;
      font-style: normal;
    }

      color: #e74c3c;
      text-decoration: none;
    }

      text-decoration: underline;
    }

      display: none;
      margin-top: 0.75rem;

    .quote-expand.show {
      display: block;
    }

      border: none;
      color: #e74c3c;
      cursor: pointer;
      font-weight: 500;
      font-size: 0.85rem;

      padding: 3rem 1rem;
      color: #999;

      margin-bottom: 0.5rem;

      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin: 3rem 0;
      flex-wrap: wrap;
    }

      background: #f5f5f5;
      color: #666;
      border: 1px solid #ddd;
      padding: 0.6rem 0.8rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    .pagination button:hover {
      background: #ecf0f1;
      border-color: #ccc;
    }

    .pagination button.active {
      background: #e74c3c;
      color: #fff;
      border-color: #e74c3c;
    }

    .pagination button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

      text-align: center;
      padding: 2rem;
      color: #999;
      font-size: 0.85rem;
      border-top: 1px solid #e0e0e0;
      margin-top: 3rem;
    }

    @media (max-width: 768px) {
      header h1 {
        font-size: 1.75rem;
      }

      .filters {
        flex-direction: column;
      }

      .search-input {
        width: 100%;
      }

      .filter-group {
        width: 100%;
      }

      .episode-meta {
        flex-direction: column;
        gap: 0.4rem;
      }

      .subscribe-form {
        flex-direction: column;
        width: 100%;
      }

      .subscribe-form input[type="email"],
      .subscribe-form button {
        width: 100%;
      }
    }
  </style>

{"title": "Los Angeles Mayor Karen Bass Talks Public Transit | Bloomberg Talks", "show": "Bloomberg Podcasts", "description": "This Bloomberg podcast episode features an interview with Los Angeles Mayor Karen Bass discussing various challenges facing the city including high gas prices, housing affordability, public transit, and major upcoming events. Bass speaks extensively about her administration's progress on homelessness reduction, public safety improvements, and preparations for hosting the World Cup and Olympics.", "date": "March 28, 2026", "tags": ["Karen Bass", "Guest Appearance", "Video"], "sentiment": "Positive", "quotes": [{"text": "We are a city that loves our cars. However, we have spent the last three or four decades building out our public transportation system.", "attribution": "-- Karen Bass at 00:36", "link": "https://www.youtube.com/watch?v=JFivrIkyacI&t=36"}, {"text": "I signed an executive directive to fasttrack the building especially of housing. And we have 40,000 units that are currently going through that process.", "attribution": "-- Karen Bass at 01:35", "link": "https://www.youtube.com/watch?v=JFivrIkyacI&t=95"}, {"text": "I have certainly been doing everything to make sure that filming doesn't continue to leave and in fact increases in our city.", "attribution": "-- Karen Bass at 02:57", "link": "https://www.youtube.com/watch?v=JFivrIkyacI&t=177"}, {"text": "We have over 119 new projects that have started in LA since the tax credits and these other initiatives have been put into place.", "attribution": "-- Karen Bass at 03:49", "link": "https://www.youtube.com/watch?v=JFivrIkyacI&t=229"}, {"text": "You have called for the ouster of Casey Wasserman as the LA28 Olympic chair.", "attribution": "-- Bloomberg Host at 05:12", "link": "https://www.youtube.com/watch?v=JFivrIkyacI&t=312"}, {"text": "My role is to make sure that the city of Los Angeles is ready to welcome thousands, tens of thousands of visitors from around the world.", "attribution": "-- Karen Bass at 06:07", "link": "https://www.youtube.com/watch?v=JFivrIkyacI&t=367"}, {"text": "I ran because Los Angeles was the epicenter for the country in homelessness, especially street homelessness.", "attribution": "-- Karen Bass at 07:51", "link": "https://www.youtube.com/watch?v=JFivrIkyacI&t=471"}, {"text": "We've had a decrease in street homelessness of 18%. This is a dysfunctional system that has been dysfunctional for at least the last three decades.", "attribution": "-- Karen Bass at 08:11", "link": "https://www.youtube.com/watch?v=JFivrIkyacI&t=491"}], "links": [["Watch Episode", "https://www.youtube.com/watch?v=JFivrIkyacI"], ["Summary", "https://www.dropbox.com/scl/fi/8gxnsj0xw59srlhlyebdw/Bloomberg-Podcasts-Los-Angeles-Mayor-Karen-Bass-Talks-Public-Transit-Bloomberg-Talks-Summary.docx?rlkey=qwqhhrruxcfper6dbwt7vdiiv&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/zk7w9k3sr2voj8362tv7u/Bloomberg-Podcasts-Los-Angeles-Mayor-Karen-Bass-Talks-Public-Transit-Bloomberg-Talks-Transcript.docx?rlkey=miljxu7e68yyw3bthqie7ytvy&dl=0"]]},
{"title": "On the Record with Adam Miller", "show": "Pat Brown Institute at Cal State LA", "description": "This is an in-depth interview with Adam Miller, a mayoral candidate for Los Angeles, discussing his background as an entrepreneur and nonprofit leader, and his vision for fixing the city's problems through better leadership and management.", "date": "March 28, 2026", "tags": ["Adam Miller", "Guest Appearance", "Video"], "sentiment": "Neutral", "quotes": [{"text": "I love LA. I raised my family here... but the city's broken and you see it everywhere.", "attribution": "-- Adam Miller at 03:15", "link": "https://www.youtube.com/watch?v=KUWxBHWB1Os&t=195"}, {"text": "The city needs to be fixed and we need a builder to fix it. And I'm that builder.", "attribution": "-- Adam Miller at 05:02", "link": "https://www.youtube.com/watch?v=KUWxBHWB1Os&t=302"}, {"text": "Adam and my husband Sean have worked together for five years now... Seven years.", "attribution": "-- Speaker A at 02:02", "link": "https://www.youtube.com/watch?v=KUWxBHWB1Os&t=122"}, {"text": "Obviously, the fires were a complete abdication of leadership.", "attribution": "-- Adam Miller at 24:14", "link": "https://www.youtube.com/watch?v=KUWxBHWB1Os&t=1454"}, {"text": "Better Angels built that. We were the ones that did it.", "attribution": "-- Adam Miller at 28:56", "link": "https://www.youtube.com/watch?v=KUWxBHWB1Os&t=1736"}, {"text": "I would have been on the ground. I probably would have gotten in trouble because I would have been in the middle of the fire.", "attribution": "-- Adam Miller at 25:30", "link": "https://www.youtube.com/watch?v=KUWxBHWB1Os&t=1530"}, {"text": "We've helped about 2,000 Angelinos stay off the street with this program already.", "attribution": "-- Adam Miller at 26:58", "link": "https://www.youtube.com/watch?v=KUWxBHWB1Os&t=1618"}, {"text": "I think ultimately the way we're going to solve this... is by new leadership that has transparency, accountability, and operational experience.", "attribution": "-- Adam Miller at 09:16", "link": "https://www.youtube.com/watch?v=KUWxBHWB1Os&t=556"}], "links": [["Watch Episode", "https://www.youtube.com/watch?v=KUWxBHWB1Os"], ["Summary", "https://www.dropbox.com/scl/fi/kwh33mjpiw519m7cl1q7o/Pat-Brown-Institute-at-Cal-State-LA-On-the-Record-with-Adam-Miller-Summary.docx?rlkey=v7a7k78t9x16vzdkfm0watq3q&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/d8bb2yztbal83h7toszd2/Pat-Brown-Institute-at-Cal-State-LA-On-the-Record-with-Adam-Miller-Transcript.docx?rlkey=lap1rbddf2e7wgnfatn5r3vde&dl=0"]]},
{"title": "Spencer Pratt | Creating A Villain, His New Memoir, &amp; Running For LA Mayor!", "show": "Off the Vine with Kaitlyn Bristowe", "description": "Spencer Pratt appears as a guest on Kaitlyn Bristowe's podcast to discuss his new memoir 'The Guy You Love to Hate.' The wide-ranging conversation covers his reality TV villain persona, life experiences from The Hills, recent house fire tragedy, and his campaign for LA mayor.", "date": "March 28, 2026", "tags": ["Spencer Pratt", "Guest Appearance", "Video"], "sentiment": "Positive", "quotes": [{"text": "Your book was amazing. I text you this. I just could not get enough of it.", "attribution": "-- Kaitlyn Bristowe at 01:51", "link": "https://www.youtube.com/watch?v=fCUNquHGBkk&t=111"}, {"text": "I didn't accidentally become the villain, that you created him and that you studied obviously people like Simon Cowell.", "attribution": "-- Kaitlyn Bristowe at 05:04", "link": "https://www.youtube.com/watch?v=fCUNquHGBkk&t=304"}, {"text": "The goal was to write a book that the way I joked about it, it seems like somebody wrote a book to like take me down.", "attribution": "-- Spencer Pratt at 02:27", "link": "https://www.youtube.com/watch?v=fCUNquHGBkk&t=147"}, {"text": "I always joke for years if I had narrated The Hills, the other cast members would have definitely been the bad guys.", "attribution": "-- Spencer Pratt at 03:54", "link": "https://www.youtube.com/watch?v=fCUNquHGBkk&t=234"}, {"text": "If I had had comment sections and DMs and if I was going on TikTok live and just feeling that hate in real life, I probably would have not been able to continue.", "attribution": "-- Spencer Pratt at 05:32", "link": "https://www.youtube.com/watch?v=fCUNquHGBkk&t=332"}, {"text": "These are the two nicest people I've ever met in my life and like so real and so honest.", "attribution": "-- Kaitlyn Bristowe at 03:27", "link": "https://www.youtube.com/watch?v=fCUNquHGBkk&t=207"}, {"text": "I was forced because this lady Karen Bass who is rerunning who's probably, God forbid, if I didn't even step in, she was for sure winning.", "attribution": "-- Spencer Pratt at 53:13", "link": "https://www.youtube.com/watch?v=fCUNquHGBkk&t=3193"}, {"text": "I put all of my money into crystals since 2008. That was at least probably $2 million in just crystals that went up.", "attribution": "-- Spencer Pratt at 49:05", "link": "https://www.youtube.com/watch?v=fCUNquHGBkk&t=2945"}], "links": [["Watch Episode", "https://www.youtube.com/watch?v=fCUNquHGBkk"], ["Summary", "https://www.dropbox.com/scl/fi/mw75wd0at973t77p31skb/Off-the-Vine-with-Kaitlyn-Bristowe-Spencer-Pratt-Creating-A-Villain-His-New-Memoir-amp-Running-For-LA-Mayor-Summary.docx?rlkey=10p7yzv7vo02iqjniqmpztwlo&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/uq4eh4a9mz7qy98uugxjx/Off-the-Vine-with-Kaitlyn-Bristowe-Spencer-Pratt-Creating-A-Villain-His-New-Memoir-amp-Running-For-LA-Mayor-Transcript.docx?rlkey=3q91mrvlq3us4c9ll7h4pozy7&dl=0"]]},
{"title": "LA Mayoral Candidate Spencer Pratt In Studio Interview With John Kobylt", "show": "John Kobylt Show & John Kobylt Radio", "description": "Spencer Pratt appears as an in-studio guest for the full hour on the John Kobylt Show, discussing his mayoral campaign for Los Angeles. He presents himself as the accountability candidate challenging incumbent Karen Bass and Nithia Ramen, focusing heavily on homelessness, law enforcement, and city corruption.", "date": "March 28, 2026", "tags": ["Spencer Pratt", "Guest Appearance", "Video"], "sentiment": "Positive", "quotes": [{"text": "Spencer Pratt running for mayor of Los Angeles against Karen Bass and Nithia Ramen and he's got some good support already and you can definitely get into the runoff for sure.", "attribution": "-- John Kobylt at 00:06", "link": "https://www.youtube.com/watch?v=L1GctL0pQmE&t=6"}, {"text": "I'm so excited to be running for mayor because I'm going to show them there are consequences and there are enough angry taxpayers, they're going to say, 'No more. You're done, Mayor Bass.'", "attribution": "-- Spencer Pratt at 03:12", "link": "https://www.youtube.com/watch?v=L1GctL0pQmE&t=192"}, {"text": "The issue that I believe I will be elected potentially on June 2nd with 51% of the vote outright is homelessness.", "attribution": "-- Spencer Pratt at 04:50", "link": "https://www.youtube.com/watch?v=L1GctL0pQmE&t=290"}, {"text": "I'm the only one saying that everyone on the streets, we're going to enforce the law. And that means treatment first, not this housing first thing.", "attribution": "-- Spencer Pratt at 05:24", "link": "https://www.youtube.com/watch?v=L1GctL0pQmE&t=324"}, {"text": "Spencer Pratt, who's running for mayor and he's he's the only logical candidate. He's the guy you have to vote for if you want to change things.", "attribution": "-- John Kobylt at 10:44", "link": "https://www.youtube.com/watch?v=L1GctL0pQmE&t=644"}, {"text": "I'm going to be the mayor of accountability as I keep saying and I have after the break I'll show you the text messages from the IRS ready to go.", "attribution": "-- Spencer Pratt at 11:22", "link": "https://www.youtube.com/watch?v=L1GctL0pQmE&t=682"}, {"text": "I didn't want to run for mayor. I don't want to be a politician. I had no choice. If it wasn't me, it was Karen Bass again.", "attribution": "-- Spencer Pratt at 26:04", "link": "https://www.youtube.com/watch?v=L1GctL0pQmE&t=1564"}, {"text": "1984, people still talk about was the greatest Olympics ever. I'm bringing 1984 back.", "attribution": "-- Spencer Pratt at 28:57", "link": "https://www.youtube.com/watch?v=L1GctL0pQmE&t=1737"}], "links": [["Watch Episode", "https://www.youtube.com/watch?v=L1GctL0pQmE"], ["Summary", "https://www.dropbox.com/scl/fi/c6otgkv7zqghejqt1uepc/John-Kobylt-Show-John-Kobylt-Radio-LA-Mayoral-Candidate-Spencer-Pratt-In-Studio-Interview-With-John-Kobylt-Summary.docx?rlkey=b7u0xqi82feqaz2kfc3f7n15q&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/jbnrw9wqty2ss7vad6r92/John-Kobylt-Show-John-Kobylt-Radio-LA-Mayoral-Candidate-Spencer-Pratt-In-Studio-Interview-With-John-Kobylt-Transcript.docx?rlkey=0q7b0sphvvmb6om3eluqggaj9&dl=0"]]},
{"title": "A conversation with LA mayoral candidate Rae Huang and Nick Caputo of Livable Advanced LA", "show": "Rae for LA", "description": "This is Rae Huang's own podcast episode where she hosts Nick Caputo to discuss LA's charter reform process. Rae is the host/interviewer discussing civic engagement and governmental reform as part of her mayoral campaign platform.", "date": "March 28, 2026", "tags": ["Rae Huang", "Guest Appearance", "Video"], "sentiment": "Positive", "quotes": [{"text": "Hey everybody, it's Ray Hang here. I am so excited to be able to have my friend Nick Caputo", "attribution": "-- Rae Huang at 00:00", "link": ""}, {"text": "Part of the reason why I wanted to hold this podcast and have you on is because a lot of folks recently saw me go viral.", "attribution": "-- Rae Huang at 01:24", "link": "https://www.youtube.com/watch?v=8_q8m3g3XA8&t=84"}, {"text": "I was going to give public comment to the Charter Reform Commission and I got cut off immediately", "attribution": "-- Rae Huang at 01:30", "link": "https://www.youtube.com/watch?v=8_q8m3g3XA8&t=90"}, {"text": "A big piece of our campaign is actually educating people more about their city", "attribution": "-- Rae Huang at 01:46", "link": "https://www.youtube.com/watch?v=8_q8m3g3XA8&t=106"}, {"text": "I attended this last charter commission meeting and it was a bit of an embarrassment", "attribution": "-- Rae Huang at 14:56", "link": "https://www.youtube.com/watch?v=8_q8m3g3XA8&t=896"}, {"text": "Seeing what happened to you was wrong. Seeing what happened to you was without a doubt the worst I've seen", "attribution": "-- Nick Caputo at 15:24", "link": "https://www.youtube.com/watch?v=8_q8m3g3XA8&t=924"}, {"text": "I believe that people who have lived experience know what they need to change to make their lives better", "attribution": "-- Rae Huang at 48:30", "link": "https://www.youtube.com/watch?v=8_q8m3g3XA8&t=2910"}, {"text": "I'm so proud and honored to be running in this race and to be creating that hope and change", "attribution": "-- Rae Huang at 52:41", "link": "https://www.youtube.com/watch?v=8_q8m3g3XA8&t=3161"}], "links": [["Watch Episode", "https://www.youtube.com/watch?v=8_q8m3g3XA8"], ["Summary", "https://www.dropbox.com/scl/fi/jg3xxu75svmzwefwtfezh/Rae-for-LA-A-conversation-with-LA-mayoral-candidate-Rae-Huang-and-Nick-Caputo-of-Livable-Advanced-LA-Summary.docx?rlkey=1mvn7h8jqc0efx20f6kzvxqh8&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/mhi88am2v1nr0j9oxw3l8/Rae-for-LA-A-conversation-with-LA-mayoral-candidate-Rae-Huang-and-Nick-Caputo-of-Livable-Advanced-LA-Transcript.docx?rlkey=3bcqy5fxhngr8es1x9k4hzcu2&dl=0"]]},
{"title": "LA Mayor Karen Bass Sounds Alarm on Trump’s ICE Tactics", "show": "Lincoln Square", "description": "LA Mayor Karen Bass discusses her administration's response to Trump-era ICE enforcement tactics in Los Angeles. She explains her executive directive to limit ICE operations and describes the escalating brutality of immigration raids under the Trump administration.", "date": "March 28, 2026", "tags": ["Karen Bass", "Guest Appearance", "Video"], "sentiment": "Mixed", "quotes": [{"text": "My executive directive said a couple of things. In the state of California, they passed a law that says ICE agents cannot be completely masked.", "attribution": "-- Karen Bass at 00:30", "link": "https://www.youtube.com/watch?v=59w8jXQttn8&t=30"}, {"text": "As mayor, I have authority over the police commission that I appoint and they have authority over the police department.", "attribution": "-- Karen Bass at 00:46", "link": "https://www.youtube.com/watch?v=59w8jXQttn8&t=46"}, {"text": "There is no rationale in the world for an ICE agent to be masked.", "attribution": "-- Karen Bass at 02:01", "link": "https://www.youtube.com/watch?v=59w8jXQttn8&t=121"}, {"text": "The other thing my executive director said is that we ban ICE from staging on any city property.", "attribution": "-- Karen Bass at 02:30", "link": "https://www.youtube.com/watch?v=59w8jXQttn8&t=150"}, {"text": "I would have never imagined that I have to protect myself from my own government.", "attribution": "-- Karen Bass at 03:54", "link": "https://www.youtube.com/watch?v=59w8jXQttn8&t=234"}, {"text": "It's one thing to be a blue city in a super blue state. But it's another thing to be a blue city in the deep south.", "attribution": "-- Karen Bass at 04:49", "link": "https://www.youtube.com/watch?v=59w8jXQttn8&t=289"}, {"text": "Fortunately, ICE is not there. They are not needed here.", "attribution": "-- Karen Bass at 05:42", "link": "https://www.youtube.com/watch?v=59w8jXQttn8&t=342"}, {"text": "I do believe that part of this in terms of a long-term change was to get Americans used to the military.", "attribution": "-- Karen Bass at 06:17", "link": "https://www.youtube.com/watch?v=59w8jXQttn8&t=377"}], "links": [["Watch Episode", "https://www.youtube.com/watch?v=59w8jXQttn8"], ["Summary", "https://www.dropbox.com/scl/fi/xx5lok1zrsh4g3sfjcgtf/Lincoln-Square-LA-Mayor-Karen-Bass-Sounds-Alarm-on-Trumps-ICE-Tactics-Summary.docx?rlkey=3hyt8iojghq27vjqsy60rhhp9&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/6vjrchvjwjdhs0mooed3i/Lincoln-Square-LA-Mayor-Karen-Bass-Sounds-Alarm-on-Trumps-ICE-Tactics-Transcript.docx?rlkey=prw9wyjbwu546xr73jgz7q0q4&dl=0"]]},
{"title": "Jack Harlow Feels Blacker|LA Mayor Karen Bass Homeless Problem Update + More", "show": "Kamal (The Shadowban Man) Johnson", "description": "This episode discusses LA Mayor Karen Bass's announcement of $1 million in funding to prevent homelessness in Little Tokyo, which the host criticizes as helping Asian communities while ignoring the higher rates of Black homelessness in LA. The host views this as evidence that politicians can help specific groups but choose not to help Black Americans.", "date": "March 28, 2026", "tags": ["Karen Bass", "Mentioned", "Video"], "sentiment": "Negative", "quotes": [{"text": "Karen Bass combating homelessness for the Asian folks.", "attribution": "-- Speaker A at 02:00", "link": "https://www.youtube.com/watch?v=5SN0PoVpalY&t=120"}, {"text": "Helping out the Asian folks, huh? None for us.", "attribution": "-- Speaker A at 02:11", "link": "https://www.youtube.com/watch?v=5SN0PoVpalY&t=131"}, {"text": "Los Angeles Mayor Karen Bass has announced a million dollar award to the Little Tokyo Service Center to help expand homelessness prevention services.", "attribution": "-- Speaker A at 07:08", "link": "https://www.youtube.com/watch?v=5SN0PoVpalY&t=428"}, {"text": "Karen Bass. It looks like a naked mole rat. Does something for a specific group.", "attribution": "-- Speaker A at 09:36", "link": "https://www.youtube.com/watch?v=5SN0PoVpalY&t=576"}, {"text": "This woman is from our lineage but not helping out the lineage. She helping out Asian folks.", "attribution": "-- Speaker A at 20:37", "link": "https://www.youtube.com/watch?v=5SN0PoVpalY&t=1237"}, {"text": "Why can't you help the freedmen homelessness in LA, Karen Bass?", "attribution": "-- Speaker A at 17:12", "link": "https://www.youtube.com/watch?v=5SN0PoVpalY&t=1032"}, {"text": "We got to get the naked mole rat out of here aka Grimace. Cuz she ain't doing nothing for for us.", "attribution": "-- Speaker A at 27:42", "link": "https://www.youtube.com/watch?v=5SN0PoVpalY&t=1662"}, {"text": "She's from the lineage. That's why I be I get at these sambos the same way I get at these tethers.", "attribution": "-- Speaker A at 25:49", "link": "https://www.youtube.com/watch?v=5SN0PoVpalY&t=1549"}], "links": [["Watch Episode", "https://www.youtube.com/watch?v=5SN0PoVpalY"], ["Summary", "https://www.dropbox.com/scl/fi/afqo8c8j5xwxni6x18vv2/Kamal-The-Shadowban-Man-Johnson-Jack-Harlow-Feels-BlackerLA-Mayor-Karen-Bass-Homeless-Problem-Update-More-Summary.docx?rlkey=ye6d8m21bhcn7ltkxrpws0qun&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/ig8ii5l6ux4767f2q2fn3/Kamal-The-Shadowban-Man-Johnson-Jack-Harlow-Feels-BlackerLA-Mayor-Karen-Bass-Homeless-Problem-Update-More-Transcript.docx?rlkey=221au1thnggu51l6wr447idrj&dl=0"]]},

            tagsHtml += `<span class="tag tag-mention">${tag}</span>`;
          } else if (tag === 'Podcast' || tag === 'Video') {
            tagsHtml += `<span class="tag tag-source">${tag}</span>`;
          } else {
            tagsHtml += `<span class="tag">${tag}</span>`;
          }
        }

        let linksHtml = '';
        for (const link of ep.links) {
          const [text, url] = link;
          const icon = text.includes('Watch') || text.includes('Episode') ? '\u25b6' :
                       text.includes('Transcript') ? '\ud83d\udcc4' : '\ud83d\udcc4';
          linksHtml += `<a href="${url}" class="episode-link" target="_blank">${icon} ${text}</a>`;
        }

        let quoteHtml = '';
        if (ep.quotes && ep.quotes.length > 0) {
          const quotesMarkup = ep.quotes.map(q => `
            <div class="quote-item">
              <div class="quote-text">${q.text}</div>
              <div class="quote-attribution">${q.attribution}${q.link ? ` <a href="${q.link}" target="_blank">&#x2192;</a>` : ''}</div>
            </div>`).join('');
          quoteHtml = `<div class="quote-section">${quotesMarkup}</div>`;
        } else if (ep.quoteText) {
          quoteHtml = `<div class="quote-section">
            <div class="quote-item">
              <div class="quote-text">${ep.quoteText}</div>
              ${ep.quoteAttribution ? `<div class="quote-attribution">${ep.quoteAttribution}${ep.quoteLink ? ` <a href="${ep.quoteLink}" target="_blank">&#x2192;</a>` : ''}</div>` : ''}
            </div>
          </div>`;
        }

        return `<div class="episode-card">
          <div class="episode-meta">
            <div>
              <div class="episode-show">${ep.show}</div>
              <div class="episode-title">${ep.title}</div>
            </div>
            <div class="episode-date">${ep.date}</div>
          </div>

          <div class="episode-tags">
            ${tagsHtml}
            <span class="sentiment-badge ${sentimentClass}">${ep.sentiment}</span>
          </div>

          <div class="episode-description">${ep.description}</div>

          ${quoteHtml}

          <div class="episode-links">
            ${linksHtml}
          </div>
        </div>`;
      }).join('');

      renderPagination();
    }

    function renderPagination() {
      const totalPages = Math.ceil(filteredEpisodes.length / ITEMS_PER_PAGE);
      const pagination = document.getElementById('pagination');

      if (totalPages <= 1) {
        pagination.innerHTML = '';
        return;
      }

      let html = '';
      if (currentPage > 1) {
        html += `<button onclick="goToPage(${currentPage - 1})">\u2190 Previous</button>`;
      }

      for (let i = 1; i <= totalPages; i++) {
        if (i === currentPage) {
          html += `<button class="active">${i}</button>`;
        } else {
          html += `<button onclick="goToPage(${i})">${i}</button>`;
        }
      }

      if (currentPage < totalPages) {
        html += `<button onclick="goToPage(${currentPage + 1})">Next \u2192</button>`;
      }

      pagination.innerHTML = html;
    }

    function goToPage(page) {
      currentPage = page;
      renderEpisodes();
      window.scrollTo(0, 0);
    }

    function toggleQuote(quoteId, btn) {
      const expand = document.getElementById(quoteId + '-full');
      if (!expand || !btn) return;
      if (expand.classList.contains('show')) {
        expand.classList.remove('show');
        btn.textContent = 'Show full quote';
      } else {
        expand.classList.add('show');
        btn.textContent = 'Show less';
      }
    }

    function resetFilters() {
      document.getElementById('search').value = '';
      document.getElementById('person').value = '';
      document.getElementById('sentiment').value = '';
      document.getElementById('source').value = '';
      filterEpisodes();
    }

    // Event listeners
    document.getElementById('search').addEventListener('input', filterEpisodes);
    document.getElementById('person').addEventListener('change', filterEpisodes);
    document.getElementById('sentiment').addEventListener('change', filterEpisodes);
    document.getElementById('source').addEventListener('change', filterEpisodes);
    document.getElementById('resetBtn').addEventListener('click', resetFilters);

    // Populate person dropdown from episode data
    const personSelect = document.getElementById('person');
    const people = [...new Set(allEpisodes.flatMap(ep => ep.tags.filter(t => !['Mentioned', 'Guest', 'Guest Appearance', 'Podcast', 'Video'].includes(t))))].sort();
    people.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p;
      opt.textContent = p;
      personSelect.appendChild(opt);
    });

    // Initial render
    filterEpisodes();
  </script>
</body>
</html>
