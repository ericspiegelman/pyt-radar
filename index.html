new-midterm-projections-just-dropped-they-re-brutal?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=2028"}, {"text": "Right before the Palisades fire happened, and Karen Bass got busted being in Ghana", "attribution": "-- Jesse Kelly at 34:05", "link": "https://omny.fm/shows/the-jesse-kelly-show/new-midterm-projections-just-dropped-they-re-brutal?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=2045"}], "links": [["Listen to Episode", "https://omny.fm/shows/the-jesse-kelly-show/new-midterm-projections-just-dropped-they-re-brutal?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website"], ["Summary", "https://www.dropbox.com/scl/fi/pmj6wps9389barc1g3xxm/The-Jesse-Kelly-Show-New-Midterm-Projections-Just-Dropped-Theyre-BRUTAL-Summary.docx?rlkey=6oo3jknp2n28iqh5ea2wo1eex&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/cddlbr2e3rcr2pef8g7p0/The-Jesse-Kelly-Show-New-Midterm-Projections-Just-Dropped-Theyre-BRUTAL-Transcript.docx?rlkey=vzmkcvmk068h36q3xk2gtj19q&dl=0"]]},
{"title": "On the Record with Councilmember Nithya Raman", "show": "Pat Brown Institute at Cal State LA", "description": "This episode features Los Angeles City Councilwoman Nithya Raman as a guest in a fireside chat format, discussing her mayoral campaign and vision for LA leadership. The conversation covers her experience in city government, policy positions on housing, homelessness, and public safety, and her critique of current city leadership.", "date": "April 06, 2026", "tags": ["Nithya Raman", "Guest Appearance", "Video"], "sentiment": "Positive", "quotes": [{"text": "I stepped into this race last minute and somewhat unexpectedly, even for myself.", "attribution": "-- Nithya Raman at 03:23", "link": "https://www.youtube.com/watch?v=cSuNANONtQs&t=203"}, {"text": "We passed the largest expansion of tenant protections in 40 years in the city.", "attribution": "-- Nithya Raman at 09:31", "link": "https://www.youtube.com/watch?v=cSuNANONtQs&t=571"}, {"text": "You got more votes than anybody ever has for city council, a record that still holds.", "attribution": "-- Mike Bonin at 18:00", "link": "https://www.youtube.com/watch?v=cSuNANONtQs&t=1080"}, {"text": "I ran on a premise that for a long time in LA, elections had happened in very narrow spaces.", "attribution": "-- Nithya Raman at 08:31", "link": "https://www.youtube.com/watch?v=cSuNANONtQs&t=511"}, {"text": "A year after we put that forward, we still don't have a single person hired for that new bureau.", "attribution": "-- Nithya Raman at 13:02", "link": "https://www.youtube.com/watch?v=cSuNANONtQs&t=782"}, {"text": "I am deeply practical. I'm an urban planner by training. I love this city, I want it to function.", "attribution": "-- Nithya Raman at 27:28", "link": "https://www.youtube.com/watch?v=cSuNANONtQs&t=1648"}, {"text": "For Chief McDonnell, I would replace him and find another police chief who really met this moment.", "attribution": "-- Nithya Raman at 50:19", "link": "https://www.youtube.com/watch?v=cSuNANONtQs&t=3019"}, {"text": "I am an immigrant. This is a city that thrives because immigrants are here.", "attribution": "-- Nithya Raman at 70:15", "link": "https://www.youtube.com/watch?v=cSuNANONtQs&t=4215"}], "links": [["Watch Episode", "https://www.youtube.com/watch?v=cSuNANONtQs"], ["Summary", "https://www.dropbox.com/scl/fi/d6gem14j20gmoetgmihke/Pat-Brown-Institute-at-Cal-State-LA-On-the-Record-with-Councilmember-Nithya-Raman-Summary.docx?rlkey=avc4ef3ap58qis2g9t0bdhh4f&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/ru2lgs4cbvcevqmtnjyfz/Pat-Brown-Institute-at-Cal-State-LA-On-the-Record-with-Councilmember-Nithya-Raman-Transcript.docx?rlkey=k2xgcuzqfgyke7t75oglm46rz&dl=0"]]},
{"title": "No Kings vs CPAC did not go well", "show": "David Pakman Show", "description": "This episode of the David Pakman Show features an extended interview with Los Angeles Mayor Karen Bass, discussing her efforts to address homelessness and crime in the city. The conversation covers practical policy approaches and her anticipated confrontations with the Trump administration.", "date": "April 06, 2026", "tags": ["Karen Bass", "Guest Appearance", "Video"], "sentiment": "Positive", "quotes": [{"text": "On day one when I took office, I actually didn't even begin at City Hall. I went straight to our emergency management department and declared the city to be in a state of emergency because of homelessness.", "attribution": "-- Karen Bass at 36:53", "link": "https://www.youtube.com/watch?v=E30QGokg0lU&t=2213"}, {"text": "In Los Angeles, we had 40,000 people sleeping on our streets and 3, 4 of them don't wake up every morning. So that to me was horrific.", "attribution": "-- Karen Bass at 38:35", "link": "https://www.youtube.com/watch?v=E30QGokg0lU&t=2315"}, {"text": "My goal on day one was to get people off the street and get them into housing, not shoo them away, not hide them, house them.", "attribution": "-- Karen Bass at 38:35", "link": "https://www.youtube.com/watch?v=E30QGokg0lU&t=2315"}, {"text": "Street homelessness has decreased by 17%. I have been focusing on the encampments around the city and reducing those, but not by shooing people away.", "attribution": "-- Karen Bass at 45:47", "link": "https://www.youtube.com/watch?v=E30QGokg0lU&t=2747"}, {"text": "The secret is you take everybody together. That was not what the city was doing before. They were picking individuals out and leaving the encampments there.", "attribution": "-- Karen Bass at 47:37", "link": "https://www.youtube.com/watch?v=E30QGokg0lU&t=2857"}, {"text": "When we go to remove an encampment, we'll count ahead of time like there's 15 people, but then on the day, on moving day, there's 25. Because unhoused people have cell phones. They call their friends and say they're really going to house us.", "attribution": "-- Karen Bass at 49:05", "link": "https://www.youtube.com/watch?v=E30QGokg0lU&t=2945"}, {"text": "I consider that blustering speech that we're used to from the president.", "attribution": "-- Karen Bass at 45:11", "link": "https://www.youtube.com/watch?v=E30QGokg0lU&t=2711"}, {"text": "Next time, let's talk about crime. Because Democrats do not do that well. And I would love to engage with you on that.", "attribution": "-- Karen Bass at 49:28", "link": "https://www.youtube.com/watch?v=E30QGokg0lU&t=2968"}], "links": [["Watch Episode", "https://www.youtube.com/watch?v=E30QGokg0lU"], ["Summary", "https://www.dropbox.com/scl/fi/9kglt44qsp3z1r7wiadvp/David-Pakman-Show-No-Kings-vs-CPAC-did-not-go-well-Summary.docx?rlkey=bnp39qjoh6jbhugz3ac0xvf0f&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/1uihi7hlcyv807ttj0j94/David-Pakman-Show-No-Kings-vs-CPAC-did-not-go-well-Transcript.docx?rlkey=y7ly3awoqq6djy63ieft2pvgc&dl=0"]]},

{"title": "Prayer and Politics: Pastor Edward Anderson Brings a Deep Understanding of Both to Election Season", "show": "First Things First With Dominique DiPrima", "description": "This episode features Pastor Edward Anderson discussing prayer, politics, and LA elections with host Dominique DiPrima. Spencer Pratt is mentioned as a reality TV personality running for LA mayor in the upcoming election.", "date": "April 04, 2026", "tags": ["Spencer Pratt", "Mentioned", "Podcast"], "sentiment": "Negative", "quotes": [{"text": "So you're not giving Spencer Pratt, the reality show MAGA guy, a chance, even though he's polling quite well.", "attribution": "-- Dominique DiPrima at 14:59", "link": "https://www.spreaker.com/episode/prayer-and-politics-pastor-edward-anderson-brings-a-deep-understanding-of-both-to-election-season--71080895?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=899"}, {"text": "I think he's polling well, but what we know about Los Angeles is that the progressive vote always trickles in last.", "attribution": "-- Pastor Edward Anderson at 15:07", "link": "https://www.spreaker.com/episode/prayer-and-politics-pastor-edward-anderson-brings-a-deep-understanding-of-both-to-election-season--71080895?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=907"}, {"text": "Spencer Pratt, I imagine, would get, hmm, at least 9%, at least.", "attribution": "-- Pastor Edward Anderson at 17:31", "link": "https://www.spreaker.com/episode/prayer-and-politics-pastor-edward-anderson-brings-a-deep-understanding-of-both-to-election-season--71080895?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1051"}, {"text": "In the final analysis in the primary, I imagine he'll get around 9%.", "attribution": "-- Pastor Edward Anderson at 17:39", "link": "https://www.spreaker.com/episode/prayer-and-politics-pastor-edward-anderson-brings-a-deep-understanding-of-both-to-election-season--71080895?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1059"}, {"text": "Did you ever watch his show? Because I didn't, but I was talking to some of my friends and apparently he was always a problem. He was like the drama guy.", "attribution": "-- Dominique DiPrima at 17:35", "link": "https://www.spreaker.com/episode/prayer-and-politics-pastor-edward-anderson-brings-a-deep-understanding-of-both-to-election-season--71080895?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1055"}, {"text": "So I could see that from the way he runs his campaign.", "attribution": "-- Pastor Edward Anderson at 17:48", "link": "https://www.spreaker.com/episode/prayer-and-politics-pastor-edward-anderson-brings-a-deep-understanding-of-both-to-election-season--71080895?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1068"}, {"text": "They know that Spencer Pratt is the fire guy.", "attribution": "-- Pastor Edward Anderson at 22:32", "link": "https://www.spreaker.com/episode/prayer-and-politics-pastor-edward-anderson-brings-a-deep-understanding-of-both-to-election-season--71080895?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1352"}], "links": [["Listen to Episode", "https://www.spreaker.com/episode/prayer-and-politics-pastor-edward-anderson-brings-a-deep-understanding-of-both-to-election-season--71080895?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website"], ["Summary", "https://www.dropbox.com/scl/fi/vtyjximdud514wmrmsv9r/First-Things-First-With-Dominique-DiPrima-Prayer-and-Politics-Pastor-Edward-Anderson-Brings-a-Deep-Understanding-of-Both-to-Election-Season-Summary.docx?rlkey=e6wu1nhvvnrqs8ktnb7arzu9s&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/zs4mrldau72olezeuyix4/First-Things-First-With-Dominique-DiPrima-Prayer-and-Politics-Pastor-Edward-Anderson-Brings-a-Deep-Understanding-of-Both-to-Election-Season-Transcript.docx?rlkey=ka1sj95sfi8tic5g8u6pnch3p&dl=0"]]},
{"title": "Food As Medicine: From Trend to Treatment w/ Spencer Pratt, Chief Growth Officer, NourishedRx", "show": "CareTalk: Healthcare. Unfiltered.", "description": "This episode features Spencer Pratt, Chief Growth Officer at NourishedRx, discussing how his company is transforming healthcare by treating food as medicine. The conversation covers their tech-enabled nutrition programs, partnerships with health plans, and the growing federal support for food-based healthcare interventions.", "date": "April 04, 2026", "tags": ["Spencer Pratt", "Guest Appearance", "Podcast"], "sentiment": "Positive", "quotes": [{"text": "Welcome to Care Talk, America's home for incisive debate about healthcare, business, and politics... today for Care Talk, we are talking to Spencer Pratt, the chief growth officer at a company called NourishedRx.", "attribution": "-- John Driscoll at 00:06", "link": "https://www.caretalkpodcast.com?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=6"}, {"text": "So NourishedRx is a digital health and tech-enabled services company that operates in what we call the food is health space.", "attribution": "-- Spencer Pratt at 00:43", "link": "https://www.caretalkpodcast.com?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=43"}, {"text": "How did you get to NourishRx? What's your healthcare journey that got you to join the NourishedRx team and now lead it?", "attribution": "-- John Driscoll at 04:10", "link": "https://www.caretalkpodcast.com?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=250"}, {"text": "I focused my entire career, John, in healthcare, always focused on building solutions that address upstream drivers of health.", "attribution": "-- Spencer Pratt at 04:20", "link": "https://www.caretalkpodcast.com?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=260"}, {"text": "We're seeing a 1.5-point reduction in HbA1c within 3 to 4 months... that's more effective than most diabetes medications.", "attribution": "-- Spencer Pratt at 08:46", "link": "https://www.caretalkpodcast.com?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=526"}, {"text": "$474 of medical cost savings per member per month in a congestive heart failure program.", "attribution": "-- Spencer Pratt at 16:10", "link": "https://www.caretalkpodcast.com?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=970"}, {"text": "We have a really rich data set over 6 years, longitudinal engagement pathways with our participants, and that is really going to be underpinning our entire AI development efforts.", "attribution": "-- Spencer Pratt at 19:55", "link": "https://www.caretalkpodcast.com?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1195"}, {"text": "Our vision is we want to be supporting and enabling that model at scale across our country.", "attribution": "-- Spencer Pratt at 21:01", "link": "https://www.caretalkpodcast.com?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1261"}], "links": [["Listen to Episode", "https://www.caretalkpodcast.com?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website"], ["Summary", "https://www.dropbox.com/scl/fi/tec7qo6b9986aizxfn5cb/CareTalk-Healthcare-Unfiltered-Food-As-Medicine-From-Trend-to-Treatment-w-Spencer-Pratt-Chief-Growth-Officer-NourishedRx-Summary.docx?rlkey=23szdv5ka6l663j5z9olizmg2&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/1ixd23ft6y3as2ylh1e8b/CareTalk-Healthcare-Unfiltered-Food-As-Medicine-From-Trend-to-Treatment-w-Spencer-Pratt-Chief-Growth-Officer-NourishedRx-Transcript.docx?rlkey=i0pl2alqotix002zvqd16ed67&dl=0"]]},
{"title": "4/03/26 - George Papadopoulos", "show": "The Anchormen", "description": "The Anchormen podcast hosts Dan Ball and Riley Lewis interview George Papadopoulos, discussing current politics, California elections, and the state of the MAGA movement. Spencer Pratt is mentioned as a Republican candidate running for mayor of Los Angeles.", "date": "April 04, 2026", "tags": ["Spencer Pratt", "Mentioned", "Podcast"], "sentiment": "Positive", "quotes": [{"text": "I actually had a chance recently to meet the guy running against her, the Republican candidate, Spencer Pratt.", "attribution": "-- George Papadopoulos at 07:43", "link": "https://www.spreaker.com/episode/4-03-26-george-papadopoulos--71084714?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=463"}, {"text": "Actually, he's an impressive guy.", "attribution": "-- George Papadopoulos at 07:46", "link": "https://www.spreaker.com/episode/4-03-26-george-papadopoulos--71084714?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=466"}, {"text": "I liked what he had to say about somebody who saw L.A. before it became a hellhole versus what it currently is.", "attribution": "-- George Papadopoulos at 07:48", "link": "https://www.spreaker.com/episode/4-03-26-george-papadopoulos--71084714?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=468"}, {"text": "He was just talking about the differences, the taxes, the homelessness, the drug issues, the cost of living, how he's going to address it, and security being such a big issue.", "attribution": "-- George Papadopoulos at 07:58", "link": "https://www.spreaker.com/episode/4-03-26-george-papadopoulos--71084714?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=478"}, {"text": "Then they need a Republican mayor. By God, they need a Republican mayor and we need a Republican governor.", "attribution": "-- Dan Ball at 38:16", "link": "https://www.spreaker.com/episode/4-03-26-george-papadopoulos--71084714?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=2296"}, {"text": "There's momentum. It's not a lost cause like I said.", "attribution": "-- George Papadopoulos at 08:41", "link": "https://www.spreaker.com/episode/4-03-26-george-papadopoulos--71084714?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=521"}], "links": [["Listen to Episode", "https://www.spreaker.com/episode/4-03-26-george-papadopoulos--71084714?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website"], ["Summary", "https://www.dropbox.com/scl/fi/w22mcxsvpv1wpdycezo99/The-Anchormen-40326-George-Papadopoulos-Summary.docx?rlkey=42lgfrx6t460mrvtz6jjptqbz&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/6wvb40hkvup34mf76xwaf/The-Anchormen-40326-George-Papadopoulos-Transcript.docx?rlkey=jzyy49p8avn1ve0cbdvj5i0tm&dl=0"]]},
{"title": "Housing, Equity, and the Future of L.A: Rae Huang For LA Mayor", "show": "Locatora Radio [A Radiophonic Novela]", "description": "This episode features an in-depth interview with Rae Huang, a mayoral candidate for Los Angeles running in the June 2nd primary. The discussion covers her comprehensive policy platform focused on making LA affordable, sustainable, and safe through social housing, free public transit, and community-centered governance.", "date": "April 04, 2026", "tags": ["Rae Huang", "Guest Appearance", "Podcast"], "sentiment": "Positive", "quotes": [{"text": "This is Rae Huang, mayoral candidate for Los Angeles, and you're listening to Locutora.", "attribution": "-- Rae Huang at 05:22", "link": "https://omny.fm/shows/locatora-radio-a-radiophonic-novela/housing-equity-and-the-future-of-l-a-rae-huang-for-la-mayor?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=322"}, {"text": "What I love most about being an Angeleno is the fact that we show up for each other.", "attribution": "-- Rae Huang at 05:42", "link": "https://omny.fm/shows/locatora-radio-a-radiophonic-novela/housing-equity-and-the-future-of-l-a-rae-huang-for-la-mayor?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=342"}, {"text": "Social housing is permanent affordable housing that is permanently off the speculative market.", "attribution": "-- Rae Huang at 03:54", "link": "https://omny.fm/shows/locatora-radio-a-radiophonic-novela/housing-equity-and-the-future-of-l-a-rae-huang-for-la-mayor?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=234"}, {"text": "I am a coalition builder. I'm a community organizer. I am all about ensuring that people co-own our city.", "attribution": "-- Rae Huang at 24:15", "link": "https://omny.fm/shows/locatora-radio-a-radiophonic-novela/housing-equity-and-the-future-of-l-a-rae-huang-for-la-mayor?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1455"}, {"text": "A public bank is a bank that we get to run. It's our cities.", "attribution": "-- Rae Huang at 04:10", "link": "https://omny.fm/shows/locatora-radio-a-radiophonic-novela/housing-equity-and-the-future-of-l-a-rae-huang-for-la-mayor?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=250"}, {"text": "I am not accepting any dollar from any lobbyist group or any corporations because I believe that this is for Angelenos by Angelenos.", "attribution": "-- Rae Huang at 63:17", "link": "https://omny.fm/shows/locatora-radio-a-radiophonic-novela/housing-equity-and-the-future-of-l-a-rae-huang-for-la-mayor?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=3797"}, {"text": "We have over 1,000 volunteers in our campaign. We have raised over $150,000.", "attribution": "-- Rae Huang at 63:17", "link": "https://omny.fm/shows/locatora-radio-a-radiophonic-novela/housing-equity-and-the-future-of-l-a-rae-huang-for-la-mayor?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=3797"}, {"text": "Thank you so much for giving us this incredible download of your policies and politics and really what, in our perspective, like a very innovative way of looking at Los Angeles.", "attribution": "-- Host at 62:38", "link": "https://omny.fm/shows/locatora-radio-a-radiophonic-novela/housing-equity-and-the-future-of-l-a-rae-huang-for-la-mayor?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=3758"}], "links": [["Listen to Episode", "https://omny.fm/shows/locatora-radio-a-radiophonic-novela/housing-equity-and-the-future-of-l-a-rae-huang-for-la-mayor?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website"], ["Summary", "https://www.dropbox.com/scl/fi/eflgh9fw3o1te15nfx6ug/Locatora-Radio-A-Radiophonic-Novela-Housing-Equity-and-the-Future-of-LA-Rae-Huang-For-LA-Mayor-Summary.docx?rlkey=ay3iov5o8tvfik1l16od79kgi&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/tc438qa9h3y9nmtj1v4u9/Locatora-Radio-A-Radiophonic-Novela-Housing-Equity-and-the-Future-of-LA-Rae-Huang-For-LA-Mayor-Transcript.docx?rlkey=za15tlc1pfm13v1owo6cw79we&dl=0"]]},

{"title": "Enthusiasm for the Governor's race is pretty low", "show": "790 KABC", "description": "This episode discusses polling data showing LA Mayor Karen Bass trailing significantly in her reelection race. The hosts analyze her poor approval ratings and the challenges facing her campaign.", "date": "April 04, 2026", "tags": ["Karen Bass", "Mentioned", "Podcast"], "sentiment": "Negative", "quotes": [{"text": "The incumbent, Karen Bass, is coming in in this poll at 25%.", "attribution": "-- Speaker B at 00:26", "link": "https://omny.fm/shows/the-drive-home-with-jillian-barberie-and-john-ph-1/enthusiasm-for-the-governors-race-is-pretty-low?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=26"}, {"text": "No, that is so unbelievably pathetic. She deserves every bit of it.", "attribution": "-- Speaker A at 00:34", "link": "https://omny.fm/shows/the-drive-home-with-jillian-barberie-and-john-ph-1/enthusiasm-for-the-governors-race-is-pretty-low?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=34"}, {"text": "If the election were today, the November runoff would be Karen Bass and Spencer Pratt.", "attribution": "-- Speaker A at 01:22", "link": "https://omny.fm/shows/the-drive-home-with-jillian-barberie-and-john-ph-1/enthusiasm-for-the-governors-race-is-pretty-low?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=82"}, {"text": "There is a very non-existent chance of Karen Bass beating the runoff.", "attribution": "-- Speaker B at 01:44", "link": "https://omny.fm/shows/the-drive-home-with-jillian-barberie-and-john-ph-1/enthusiasm-for-the-governors-race-is-pretty-low?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=104"}], "links": [["Listen to Episode", "https://omny.fm/shows/the-drive-home-with-jillian-barberie-and-john-ph-1/enthusiasm-for-the-governors-race-is-pretty-low?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website"], ["Summary", "https://www.dropb otes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1505"}, {"text": "What has to give you concern if you are Mayor Bass is that your unfavorable rating is typically over 40%, if not over 50%. So 25% of the vote could be her ceiling.", "attribution": "-- Michael Monks at 28:31", "link": "https://omny.fm/shows/monks-merrill/from-moon-missions-to-price-shocks-space-soaring-costs-l-a-s-voter-wildcard?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1711"}, {"text": "What she is hoping for is a head-to-head race against Spencer Pratt because she probably thinks she can win that race more easily than against any of the other candidates.", "attribution": "-- Michael Monks at 28:31", "link": "https://omny.fm/shows/monks-merrill/from-moon-missions-to-price-shocks-space-soaring-costs-l-a-s-voter-wildcard?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1711"}, {"text": "Her favorable rating had dropped to 37% and the unfavorable rating to 49%. She looked extraordinarily damaged at this time last year, like unrecoverable.", "attribution": "-- Michael Monks at 30:59", "link": "https://omny.fm/shows/monks-merrill/from-moon-missions-to-price-shocks-space-soaring-costs-l-a-s-voter-wildcard?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1859"}, {"text": "There's no saving her reelection hopes at this point. But she seems to think that she's got a path.", "attribution": "-- Michael Monks at 31:39", "link": "https://omny.fm/shows/monks-merrill/from-moon-missions-to-price-shocks-space-soaring-costs-l-a-s-voter-wildcard?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1899"}], "links": [["Listen to Episode", "https://omny.fm/shows/monks-merrill/from-moon-missions-to-price-shocks-space-soaring-costs-l-a-s-voter-wildcard?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website"], ["Summary", "https://www.dropbox.com/scl/fi/1nxkq5wohtmkp0bqpp590/Monks-Merrill-From-Moon s://www.youtube.com/watch?v=UKQZM2vsUmY&t=2626"}], "links": [["Watch Episode", "https://www.youtube.com/watch?v=UKQZM2vsUmY"], ["Summary", "https://www.dropbox.com/scl/fi/1himee6zcqsu9ylc0axsp/Pointers-for-Life-Pointers-on-generational-church-going-the-quotcool-kidsquot-table-and-Spencer-Pratt-Summary.docx?rlkey=gl6jm04z9qin30e74uaii6cs1&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/edytper97swij4raua5s9/Pointers-for-Life-Pointers-on-generational-church-going-the-quotcool-kidsquot-table-and-Spencer-Pratt-Transcript.docx?rlkey=haxxqxtotqle3wy123k2ekbeh&dl=0"]]},
{"title": "On the Record with Rev. Rae Huang", "show": "Pat Brown Institute at Cal State LA", "description": "This is an in-depth interview with Rev. Rae Huang, a candidate for Mayor of Los Angeles, as part of the 'On the Record' series hosted by the Pat Brown Institute. The episode focuses on her leadership philosophy, policy positions, and campaign platform through the lens of public leadership.", "date": "April 02, 2026", "tags": ["Rae Huang", "Guest Appearance", "Video"], "sentiment": "Positive", "quotes": [{"text": "I'm running because we need real courageous, moral, and grounded leadership, especially in this moment in our city and in our country when we are regularly under attack.", "attribution": "-- Rae Huang at 03:38", "link": "https://www.youtube.com/watch?v=LfWNjYJ0Kpk&t=218"}, {"text": "I've been a community organizer and also running social justice organizations and mentorship over the last 20 years working on anti-racism trainings and also organizing work in our communities.", "attribution": "-- Rae Huang at 03:55", "link": "https://www.youtube.com/watch?v=LfWNjYJ0Kpk&t=235"}, {"text": "Our system, it's not that it's broken. It's working exactly as it's intended to work. The problem is a system is not meant for working people.", "attribution": "-- Rae Huang at 04:35", "link": "https://www.youtube.com/watch?v=LfWNjYJ0Kpk&t=275"}, {"text": "The main thing that I've been doing over the last 20 years actually has been around bringing people together who don't usually agree.", "attribution": "-- Rae Huang at 09:17", "link": "https://www.youtube.com/watch?v=LfWNjYJ0Kpk&t=557"}, {"text": "I have not seen her to be a collaborative colleague. I have not seen her to have the ability to bring people together.", "attribution": "-- Rae Huang at 12:41", "link": "https://www.youtube.com/watch?v=LfWNjYJ0Kpk&t=761"}, {"text": "I do not take money from corporations or lobbyists. I will most definitely never take money from the LAPPL.", "attribution": "-- Rae Huang at 24:00", "link": "https://www.youtube.com/watch?v=LfWNjYJ0Kpk&t=1440"}, {"text": "I plan on firing Police Chief McDonnell because he has not been representing the people of Los Angeles.", "attribution": "-- Rae Huang at 24:55", "link": "https://www.youtube.com/watch?v=LfWNjYJ0Kpk&t=1495"}, {"text": "There is a difference between compromise and compromising your values. And I think that is a very important distinction to make.", "attribution": "-- Rae Huang at 27:45", "link": "https://www.youtube.com/watch?v=LfWNjYJ0Kpk&t=1665"}], "links": [["Watch Episode", "https://www.youtube.com/watch?v=LfWNjYJ0Kpk"], ["Summary", "https://www.dropbox.com/scl/fi/6qmhhar597dadss6by3hn/Pat-Brown-Institute-at-Cal-State-LA-On-the-Record-with-Rev-Rae-Huang-Summary.docx?rlkey=21gu4yzwh2mhyxapj5fk1fewu&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/bja86a0edegrh8vpshtv6/Pat-Brown-Institute-at-Cal-State-LA-On-the-Record-with-Rev-Rae-Huang-Transcript.docx?rlkey=gdqq4pkrjd01jvb8jdht90hge&dl=0"]]},

{"title": "BEST OF WEEK: Cesar's Takedown. Virgin Husband, Promiscuous Wife. Meta's Kids. | Mar 23-27, '26", "show": "JLP Highlights", "description": "This is a highlights episode from the JLP show covering various topics including attacks on men, domestic violence cases, and political commentary. Karen Bass is briefly mentioned in the context of renaming Cesar Chavez Day after sexual assault allegations against the civil rights leader.", "date": "March 28, 2026", "tags": ["Karen Bass", "Mentioned", "Podcast"], "sentiment": "Neutral", "quotes": [{"text": "Even Karen Bass, the so-called mayor of LA, signed a proclamation on Thursday to rename the last day of the month Farmers Workers instead of Cesar Chavez Day.", "attribution": "-- Speaker A at 15:32", "link": "https://rebuildingtheman.substack.com/p/best-of-week-cesars-takedown-virgin?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=932"}, {"text": "LA Mayor Karen Bass signed a proclamation renaming the last Monday of March to Farm Workers Day in the city of Los Angeles.", "attribution": "-- Speaker F at 16:04", "link": "https://rebuildingtheman.substack.com/p/best-of-week-cesars-takedown-virgin?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=964"}], "links": [["Listen to Episode", "https://rebuildingtheman.substack.com/p/best-of-week-cesars-takedown-virgin?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website"], ["Summary", "https://www.dropbox.com/scl/fi/wjgbqk2zidzhbme2oxt9s/JLP-Highlights-BEST-OF-WEEK-Cesars-Takedown-Virgin-Husband-Promiscuous-Wife-Metas-Kids-Mar-23-27-26-Summary.docx?rlkey=2rvu1ebtkcf5s1yj8ko6qg6xy&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/sywu3mkuybyhzkodk1q09/JLP-Highlights-BEST-OF-WEEK-Cesars-Takedown-Virgin-Husband-Promiscuous-Wife-Metas-Kids-Mar-23-27-26-Transcript.docx?rlkey=5m40a7savxou8hqhj5v7qevqn&dl=0"]]},
{"title": "\"All Politics Is Local\"", "show": "Inside Golden State Politics ", "description": "This 36-minute episode of Inside Golden State Politics  mentions Nithya Raman.", "date": "March 19, 2026", "tags": ["Nithya Raman", "Mentioned", "Podcast"], "sentiment": "Neutral", "quotes": [{"text": "It's absolutely terrible for a horse, but she's still at the top of the field. You know, the person who I have with the second odds at this time is Council Member Nithya Raman from the 4th District, the late entry into the race. Given her political leanings, I've given her the horse name of Here Comes Lefty, and we've got, we've got Here Comes Lefty starting at, at 6-1. If you're looking for a I was going to say, if you're looking for a third candidate, you know, third person at the starting gate, I would say we'd look at Adam Miller. The horse name I've got for him is The Owl. Odds 25 to 1. And as I wrote, why is he The Owl? Because if you ask most Angelenos what they think of Adam Miller, the response will be, who? Who? But he is running for it. We've got a couple others. We've got Reverend Ray Wang, one of the left-leaning candidates. I'm calling her Ray of Light. Odd 70 to 1. And then our 5th main candidate, Spencer Pratt, the Republican reality TV star running, you know, out of the Palisades. Often we see him wearing gear for his wife Heidi Montag. He's selling merchandise on his website. So at 95 to 1, he is the merchant of Heidiwood. So that's how I break down the race.", "attribution": "-- Speaker C at 04:24", "link": "https://www.buzzsprout.com/916192?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=264"}, {"text": "Exactly. So I'm going to answer your question, Bill, which is absolutely the right on question with a little bit of context. And when we talk about who's running, we have to think about who's not running. And if we Recall, there was a lot of speculation for a long time over who would challenge Karen Bass. Austin Beutner, the former superintendent of LAUSD, former publisher of the LA Times, he was running in the race, but he had the terrible tragedy of his young daughter passing away. He pulled out of the contest. He was someone who I think could have been a threat to Karen Bass, you know, had he run. We had, as we kept knowing, Supervisor Lindsey Horvath was flirting with running almost until the last moment, and she opted not to run. And then I think most Notably, we had Rick Caruso, the billionaire developer, civic leader. He seemed to sort of waffle for 3 years. Am I going to run? Am I not going to run? And then decided not to run. By contrast, after 3 years of Rick wavering, I think Nithya Raman spent about 3 days determining and going, oh, no one else is running. There's an opportunity. I'm disappointed in what's happening in Los Angeles. I think I could do better. 3 days, sure, why not? Very important to note that Nithya Raman's campaign team is the campaign team that had been working with Austin Butner, a campaign team that's worked a lot in Los Angeles before. And she saw Elaine. Now look, certainly there are a number of people who are saying, oh well, this is just political opportunism. And maybe it is. I'm not criticizing it. As I wrote in that Westside Current column, many of those people who choose to wait their turn They're still working as political aides years down the line. So Nithya Raman had an opportunity. Very importantly, very importantly, she had just won a seat 2 years ago. So she, even if she loses, she still has her city council seat. So she jumped in and yeah, Bill, as you referenced, complete surprise to many people, but gives us a lot of content.", "attribution": "-- Speaker C at 06:58", "link": "https://www.buzzsprout.com/916192?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=418"}, {"text": "Well, I will answer that with a reference to an absolutely terrible movie that almost no one will remember. There was once a movie called King Ralph in which John Candy, who I think was about the 18th in line to be the King of England, suddenly became the King of England because the other 17 people in front of him were all electrocuted during a photo shoot. And King Ralph became the King of England. I think that's about the only way that we actually wind up with a Republican mayor of Los Angeles if we have a King Ralph moment, which in this case would be King Spencer. Now, goofiness aside, Bill, your point is actually crucial, and I think it's something that we really need to be thinking about widespread in Los Angeles. We should not be thinking about who's going to win the mayor's race of Los Angeles. We should, in June, We should be thinking about who is going to finish within the top 2, because, and Cheri, as you just referenced, you need 50%, but I don't see a world where anyone eclipses 50%. So we have these 5 main candidates, and then we have 9 other people on the ballot. So, you know, very, you know, it's very unlikely that someone gets to 50%. So who's going to finish within the top 2? And with so many people there, the voting, the, you know, could be, you know, spread in, in unexpected ways. There's a lot of people who do think that it will be Mayor Bass and Nithya Raman who will finish 1-2 and will continue on to, you know, to the November general election. That could happen, but there's also other things that could happen. Nithya Raman is expected to, you know, siphon a number of votes from Karen Bass, but there is another left-leaning candidate, as we just referenced, Ray Wang, the Reverend Ray of Light, who could as well siphon votes from Nithya Raman. Perhaps that holds down Nithya Raman's ability to get to second place. There is, I think, certainly a lane for Adam Miller, who, you know, is a successful businessman turned philanthropist. We have to remember in 2022, the runoff, Rick Caruso got 45%. So there's a lane there, but will he actually go and spend the money and boost his name ID? We don't know. Or will everyone just divide it up so much that it does leave space for Spencer Pratt, that reality TV star who will appeal to a lot of Republicans? I've heard different people speculate that maybe he gets 7%, maybe he gets 15%, maybe he gets as much as 20% or even slightly more. And if he gets there, does he advance to a runoff against Karen Bass or someone else? If he gets into that runoff, then again, we have, as you just referenced at the beginning, Bill, that possibility of a Republican mayor. I don't think it's likely. I think it's more likely we have a Republican governor, but that's a whole other story given where those polls are. But yeah, it, you know, again, sorry if I'm being long-winded, but it is really important for us to think about the fact that what matters is not, you know, if you come in first in the June primary, what matters is that you do not come in third or worse. In the June primary. You know, that's what candidates are trying to do. They're trying to figure out how do I get enough just to squeak into the top two? If I get there, I'll worry about November later.", "attribution": "-- Speaker C at 19:13", "link": "https://www.buzzsprout.com/916192?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1153"}, {"text": "And if I could just add to that a little bit more context, because you're right on, and just something to build on that. You know, Nithya Raman absolutely elected in the past with support from the Democratic Socialists. Local chapter, but she has certainly drifted, you know, more towards the middle compared with some of her other council colleagues who continue to hew sort of very hard left. You know, itÃ¢ÂÂ you know, when one of the ways that we see that most significantly is within housing amongst many of the super progressives, or whatever you want to call them. When it comes to housing, their focus will be, let's build affordable housing, it's got to be affordable housing, every product's got to be either all or mostly or have a significant chunk of affordable housing. I've spoken with Nithya Raman in the past and, you know, and I've had conversations with her where she's like, yes, we need to build affordable housing, but we also need to build market rate housing. We need housing at all levels in Los Angeles. And there's a number of developers, you know, people who want to build who are now backing her because she has been forward thinking in trying to take steps to get housing construction going in Los Angeles after the fires. She gotÃ¢ÂÂ she was pushing some strategies that had been utilized in other cities to speed up housing production. So she's been looking at a lot of these levels and steps that are embraced by the development community, which may be ironic to some people. So sheÃ¢ÂÂ so I don't think it's fair to just put her any longer into the shoebox of left-leaning only DSA part. Also recently, she talked about being more open to certain funding for policing for LAPD, which many of the DSA-affiliated candidates have opposed. But yeah, housing has definitely been, you know, been an interesting statement and evolution and stands out.", "attribution": "-- Speaker C at 24:28", "link": "https://www.buzzsprout.com/916192?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1468"}, {"text": "But when you're talking money, it also is the case in these elections. And that's another key component. And that's another thing that makes it very, that is a challenge, a significant challenge for Nithya Raman, when you get in the race on February 7th and the election is on June 2nd, you have very little time to raise the millions of dollars that you need to raise to run viably for the seat. Now, again, she's abetted in that by a generally weak field and criticism against the mayor, but it's a monumental challenge for her, and we can't dismiss, we can't dismiss that. I think there's a lot of people who are unaware of who Nithya Raman is, and she needs to introduce herself to a lot of people in a short time period. And I'm looking right now, this is March 18th. In less than 2 months, the mail-in ballots are already going to be in your homes. The election will be underway.", "attribution": "-- Speaker C at 28:37", "link": "https://www.buzzsprout.com/916192?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1717"}], "links": [["Listen to Episode", "https://www.buzzsprout.com/916192?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website"], ["Summary", "https://www.dropbox.com/scl/fi/ndw11qetqzk0rs2ax472b/Inside-Golden-State-Politics-All-Politics-Is-Local-Summary.docx?rlkey=yw14xuiolpss29r954tg9p29x&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/q5qtpim8nt0axevkqpkrw/Inside-Golden-State-Politics-All-Politics-Is-Local-Transcript.docx?rlkey=312w5wig5if1wuyxgornk0x19&dl=0"]]},
{"title": "Inside Nithya RamanÃ¢ÂÂs Campaign: Can She Transform LA? | CapÃÂ­tulo 264", "show": "Locatora Radio [A Radiophonic Novela]", "description": "This 55-minute episode of Locatora Radio [A Radiophonic Novela] mentions Nithya Raman.", "date": "March 25, 2026", "tags": ["Nithya Raman", "Mentioned", "Podcast"], "sentiment": "Neutral", "quotes": [{"text": "Hey, locamores, this is Diosa and you're listening to LocaTora Radio. In this week's episode, we interview mayoral race candidate Nithya Raman. She currently holds a seat in LA City Council and represents District 4. Councilmember Nithya Raman filed her candidacy for the mayor's race on the final day in February, shocking every Politico across Los Angeles. She's running against Democratic incumbent Mayor Karen Bass. In this interview, Councilmember Nithya Raman shares the days leading up to her filing.", "attribution": "-- Speaker F at 03:26", "link": "https://omny.fm/shows/locatora-radio-a-radiophonic-novela/inside-nithya-raman-s-campaign-can-she-transform-la-cap-tulo-264?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=206"}, {"text": "The city of LA is in a budget deficit. There's a myriad of issues Angelenos are facing every day. Like housing affordability, public safety, ICE kidnapping our neighbors, and the humanitarian crisis that is homelessness. But amidst these concerns lies a crossroads, a chance to stick to the status quo or enact change and redefine the city of LA's future. In this race, we find a diverse set of candidates, even reality TV star Spencer Pratt, is running for LA mayor. Every candidate demands our scrutiny, not just our support. Now is the time to familiarize ourselves with these candidates, not just through their campaign promises, but through their past actions and future potentials. It's our collective responsibility to be informed, to ask questions, and to make a voting plan with our friends and family. It's a midterm election year. And this is an important race in Los Angeles. We know that not all of our listeners are LA-based, but we do think this mayoral race is important because Los Angeles is often a test ground for politics and policy. Here's our interview with councilmember and mayoral candidate Nithya Raman.", "attribution": "-- Speaker F at 04:40", "link": "https://omny.fm/shows/locatora-radio-a-radiophonic-novela/inside-nithya-raman-s-campaign-can-she-transform-la-cap-tulo-264?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=280"}, {"text": "This is Nithya Raman, candidate for mayor of Los Angeles, and you're listening to Locutora Radio.", "attribution": "-- Speaker G at 06:04", "link": "https://omny.fm/shows/locatora-radio-a-radiophonic-novela/inside-nithya-raman-s-campaign-can-she-transform-la-cap-tulo-264?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=364"}, {"text": "Thank you so much, Councilmember Nithya Raman, mayoral candidate for the City of LA. It's been a pleasure chatting with you today.", "attribution": "-- Speaker H at 55:13", "link": "https://omny.fm/shows/locatora-radio-a-radiophonic-novela/inside-nithya-raman-s-campaign-can-she-transform-la-cap-tulo-264?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=3313"}], "links": [["Listen to Episode", "https://omny.fm/shows/locatora-radio-a-radiophonic-novela/inside-nithya-raman-s-campaign-can-she-transform-la-cap-tulo-264?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website"], ["Summary", "https://www.dropbox.com/scl/fi/4sse4mbgn4arxka679dxz/Locatora-Radio-A-Radiophonic-Novela-Inside-Nithya-Ramans-Campaign-Can-She-Transform-LA-Cap-tulo-264-Summary.docx?rlkey=vnco0x0z5jy20b78lx12yljel&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/v9zmmthpscw04evm78why/Locatora-Radio-A-Radiophonic-Novela-Inside-Nithya-Ramans-Campaign-Can-She-Transform-LA-Cap-tulo-264-Transcript.docx?rlkey=6qk8v9vfq0yobx3hphrrl4qm0&dl=0"]]},
{"title": "Justice for CÃÂ©sar ChÃÂ¡vez Victims? Taylor Frankie Paul &amp; Nithya Raman for LA Mayor | The Moment LIVE", "show": "The Moment LIVE", "description": "This episode of The Moment LIVE covers multiple topics including a New York Times investigation into CÃÂ©sar ChÃÂ¡vez, Taylor Frankie Paul's cancelled Bachelorette season, and features an interview with LA City Council member Nithya Raman who is running for mayor of Los Angeles.", "date": "March 21, 2026", "tags": ["Nithya Raman", "Guest Appearance", "Podcast"], "sentiment": "Positive", "quotes": [{"text": "Nithia Ramen who is a council member here in LA running for mayor and she's sort of LA's Zoron maybe some are saying", "attribution": "-- Speaker A at 03:04", "link": "https://www.youtube.com/watch?v=c3qMvb7q1F4&t=184"}, {"text": "Well, I'm endorsing myself for mayor.", "attribution": "-- Nithya Raman at 22:31", "link": "https://www.youtube.com/watch?v=c3qMvb7q1F4&t=1351"}, {"text": "We've passed some of the strongest tenant protections in the entire country universal just cause eviction protections.", "attribution": "-- Nithya Raman at 23:07", "link": "https://www.youtube.com/watch?v=c3qMvb7q1F4&t=1387"}, {"text": "We've housed hundreds of people without using arrests and enforcement.", "attribution": "-- Nithya Raman at 23:39", "link": "https://www.youtube.com/watch?v=c3qMvb7q1F4&t=1419"}, {"text": "We haven't paved a single mile of street this entire year.", "attribution": "-- Nithya Raman at 24:36", "link": "https://www.youtube.com/watch?v=c3qMvb7q1F4&t=1476"}, {"text": "I don't feel like we are adequately prepared for the Olympics right now.", "attribution": "-- Nithya Raman at 34:07", "link": "https://www.youtube.com/watch?v=c3qMvb7q1F4&t=2047"}, {"text": "The city is on the hook for hundreds of millions of dollars.", "attribution": "-- Nithya Raman at 35:17", "link": "https://www.youtube.com/watch?v=c3qMvb7q1F4&t=2117"}, {"text": "I really think about making government work for people because I believe in the power of government to do good.", "attribution": "-- Nithya Raman at 38:13", "link": "https://www.youtube.com/watch?v=c3qMvb7q1F4&t=2293"}], "links": [["Listen to Episode", "https://www.youtube.com/watch?v=c3qMvb7q1F4"], ["Summary", "https://www.dropbox.com/scl/fi/wv273ojrrk4nbh425xvd1/The-Moment-LIVE-Justice-for-C-sar-Ch-vez-Victims-Taylor-Frankie-Paul-amp-Nithya-Raman-for-LA-Mayor-The-Moment-LIVE-Summary.docx?rlkey=1nhshm05n2u8ie6a4gcxyok7m&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/p9x7kyffslgyrapiunrfg/The-Moment-LIVE-Justice-for-C-sar-Ch-vez-Victims-Taylor-Frankie-Paul-amp-Nithya-Raman-for-LA-Mayor-The-Moment-LIVE-Transcript.docx?rlkey=4jxvty4h6dcsr38y4x26afzh0&dl=0"]]},
{"title": "Rap&#39;s dogpiling problem + Hannah Montana 20th anniversary, Spencer Pratt for LA mayor?", "show": "Freshly Pop'd", "description": "This episode of Freshly Pop'd discusses Spencer Pratt's mayoral campaign for Los Angeles, with hosts critically analyzing his political platform and qualifications. The hosts express strong skepticism about his candidacy and compare him unfavorably to other political outsiders.", "date": "March 28, 2026", "tags": ["Spencer Pratt", "Mentioned", "Video"], "sentiment": "Negative", "quotes": [{"text": "Spencer Pratt is a villain.", "attribution": "-- Sequoia Holmes at 00:56", "link": "https://www.youtube.com/watch?v=Qsnm9TT_UPk&t=56"}, {"text": "I don't trust Spencer Pratt as far as I can throw him.", "attribution": "-- Sequoia Holmes at 01:13", "link": "https://www.youtube.com/watch?v=Qsnm9TT_UPk&t=73"}, {"text": "Spencer Pratt is from LA, has been in LA for a long time, was literally on television. You don't have any connections?", "attribution": "-- Ryan Graham at 04:12", "link": "https://www.youtube.com/watch?v=Qsnm9TT_UPk&t=252"}, {"text": "Spencer Pratt probably doesn't know what an NGO is.", "attribution": "-- Ryan Graham at 04:22", "link": "https://www.youtube.com/watch?v=Qsnm9TT_UPk&t=262"}, {"text": "I can't imagine he's ever been homeless. He was on a show where he was a like a rich kid.", "attribution": "-- Sequoia Holmes at 05:13", "link": "https://www.youtube.com/watch?v=Qsnm9TT_UPk&t=313"}, {"text": "Why did they get a king, and we get a clown?", "attribution": "-- Ryan Graham at 07:12", "link": "https://www.youtube.com/watch?v=Qsnm9TT_UPk&t=432"}, {"text": "What I saw of him on The Hills was abuse.", "attribution": "-- Sequoia Holmes at 06:23", "link": "https://www.youtube.com/watch?v=Qsnm9TT_UPk&t=383"}, {"text": "He's running on the drain the swamp, I'm an outsider, same type of platform that Trump ran on. And I hate that.", "attribution": "-- Sequoia Holmes at 07:02", "link": "https://www.youtube.com/watch?v=Qsnm9TT_UPk&t=422"}], "links": [["Watch Episode", "https://www.youtube.com/watch?v=Qsnm9TT_UPk"], ["Summary", "https://www.dropbox.com/scl/fi/gxbeip2c24d6laaho939h/Freshly-Popd-Rap39s-dogpiling-problem-Hannah-Montana-20th-anniversary-Spencer-Pratt-for-LA-mayor-Summary.docx?rlkey=l4zot0vfs8n3d3zjuu1nrhuh2&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/j3vwhqq3da3ml083q4ccp/Freshly-Popd-Rap39s-dogpiling-problem-Hannah-Montana-20th-anniversary-Spencer-Pratt-for-LA-mayor-Transcript.docx?rlkey=makzsilwip4e40u4e3fr6y2p4&dl=0"]]},
{"title": "Ashley Zavala confronts the lack of transparency at the Capitol Annex Project", "show": "The John Phillips Show", "description": "This episode of The John Phillips Show focuses on government transparency issues in California, particularly Ashley Zavala's investigation into the secretive Capitol Annex Project. Karen Bass is mentioned briefly in relation to LA's homelessness crisis when responding to the 'Sewer Lady' story.", "date": "March 28, 2026", "tags": ["Karen Bass", "Mentioned", "Podcast"], "sentiment": "Negative", "quotes": [{"text": "the current mayor of Los Angeles, Karen BassÃ¢ÂÂ if you're feeling down, if you're feeling blue, let's get help for you", "attribution": "-- Speaker A at 22:21", "link": "https://omny.fm/shows/the-drive-home-with-jillian-barberie-and-john-ph-1/ashley-zavala-confronts-the-lack-of-transparency-at-the-capitol-annex-project?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1341"}, {"text": "Mayor Karen Bass is reacting, calling it a tragedy.", "attribution": "-- Speaker D at 22:52", "link": "https://omny.fm/shows/the-drive-home-with-jillian-barberie-and-john-ph-1/ashley-zavala-confronts-the-lack-of-transparency-at-the-capitol-annex-project?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1372"}, {"text": "You're the mayor. This is your number one issue. Number one, not two, not three, not four. Number one. And you failed.", "attribution": "-- Speaker B at 27:29", "link": "https://omny.fm/shows/the-drive-home-with-jillian-barberie-and-john-ph-1/ashley-zavala-confronts-the-lack-of-transparency-at-the-capitol-annex-project?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1649"}, {"text": "You'd think in the last 4 years she'd have somebody working for her check the sewers.", "attribution": "-- Speaker A at 27:38", "link": "https://omny.fm/shows/the-drive-home-with-jillian-barberie-and-john-ph-1/ashley-zavala-confronts-the-lack-of-transparency-at-the-capitol-annex-project?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1658"}, {"text": "The mayor now responding, saying the drain is sealed.", "attribution": "-- Speaker D at 27:45", "link": "https://omny.fm/shows/the-drive-home-with-jillian-barberie-and-john-ph-1/ashley-zavala-confronts-the-lack-of-transparency-at-the-capitol-annex-project?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1665"}, {"text": "These are people that voted for Bass, or these are people that did not vote at all? 100% of those who voted, they voted for Bass.", "attribution": "-- Speaker A and Speaker B at 25:07", "link": "https://omny.fm/shows/the-drive-home-with-jillian-barberie-and-john-ph-1/ashley-zavala-confronts-the-lack-of-transparency-at-the-capitol-annex-project?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1507"}], "links": [["Listen to Episode", "https://omny.fm/shows/the-drive-home-with-jillian-barberie-and-john-ph-1/ashley-zavala-confronts-the-lack-of-transparency-at-the-capitol-annex-project?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website"], ["Summary", "https://www.dropbox.com/scl/fi/bx5qgcwrscq2n5vy7apar/The-John-Phillips-Show-Ashley-Zavala-confronts-the-lack-of-transparency-at-the-Capitol-Annex-Project-Summary.docx?rlkey=y514sms3cmreai5b75jht3vqm&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/fccpssvuvh72uemlwj19c/The-John-Phillips-Show-Ashley-Zavala-confronts-the-lack-of-transparency-at-the-Capitol-Annex-Project-Transcript.docx?rlkey=lkkk9813ogwfdxb9dr5op3fza&dl=0"]]},
{"title": "Los Angeles Mayor Karen Bass Talks Public Transit | Bloomberg Talks", "show": "Bloomberg Podcasts", "description": "This Bloomberg podcast episode features an interview with Los Angeles Mayor Karen Bass discussing various challenges facing the city including high gas prices, housing affordability, public transit, and major upcoming events. Bass speaks extensively about her administration's progress on homelessness reduction, public safety improvements, and preparations for hosting the World Cup and Olympics.", "date": "March 28, 2026", "tags": ["Karen Bass", "Guest Appearance", "Video"], "sentiment": "Positive", "quotes": [{"text": "We are a city that loves our cars. However, we have spent the last three or four decades building out our public transportation system.", "attribution": "-- Karen Bass at 00:36", "link": "https://www.youtube.com/watch?v=JFivrIkyacI&t=36"}, {"text": "I signed an executive directive to fasttrack the building especially of housing. And we have 40,000 units that are currently going through that process.", "attribution": "-- Karen Bass at 01:35", "link": "https://www.youtube.com/watch?v=JFivrIkyacI&t=95"}, {"text": "I have certainly been doing everything to make sure that filming doesn't continue to leave and in fact increases in our city.", "attribution": "-- Karen Bass at 02:57", "link": "https://www.youtube.com/watch?v=JFivrIkyacI&t=177"}, {"text": "We have over 119 new projects that have started in LA since the tax credits and these other initiatives have been put into place.", "attribution": "-- Karen Bass at 03:49", "link": "https://www.youtube.com/watch?v=JFivrIkyacI&t=229"}, {"text": "You have called for the ouster of Casey Wasserman as the LA28 Olympic chair.", "attribution": "-- Bloomberg Host at 05:12", "link": "https://www.youtube.com/watch?v=JFivrIkyacI&t=312"}, {"text": "My role is to make sure that the city of Los Angeles is ready to welcome thousands, tens of thousands of visitors from around the world.", "attribution": "-- Karen Bass at 06:07", "link": "https://www.youtube.com/watch?v=JFivrIkyacI&t=367"}, {"text": "I ran because Los Angeles was the epicenter for the country in homelessness, especially street homelessness.", "attribution": "-- Karen Bass at 07:51", "link": "https://www.youtube.com/watch?v=JFivrIkyacI&t=471"}, {"text": "We've had a decrease in street homelessness of 18%. This is a dysfunctional system that has been dysfunctional for at least the last three decades.", "attribution": "-- Karen Bass at 08:11", "link": "https://www.youtube.com/watch?v=JFivrIkyacI&t=491"}], "links": [["Watch Episode", "https://www.youtube.com/watch?v=JFivrIkyacI"], ["Summary", "https://www.dropbox.com/scl/fi/8gxnsj0xw59srlhlyebdw/Bloomberg-Podcasts-Los-Angeles-Mayor-Karen-Bass-Talks-Public-Transit-Bloomberg-Talks-Summary.docx?rlkey=qwqhhrruxcfper6dbwt7vdiiv&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/zk7w9k3sr2voj8362tv7u/Bloomberg-Podcasts-Los-Angeles-Mayor-Karen-Bass-Talks-Public-Transit-Bloomberg-Talks-Transcript.docx?rlkey=miljxu7e68yyw3bthqie7ytvy&dl=0"]]},
{"title": "On the Record with Adam Miller", "show": "Pat Brown Institute at Cal State LA", "description": "This is an in-depth interview with Adam Miller, a mayoral candidate for Los Angeles, discussing his background as an entrepreneur and nonprofit leader, and his vision for fixing the city's problems through better leadership and management.", "date": "March 28, 2026", "tags": ["Adam Miller", "Guest Appearance", "Video"], "sentiment": "Neutral", "quotes": [{"text": "I love LA. I raised my family here... but the city's broken and you see it everywhere.", "attribution": "-- Adam Miller at 03:15", "link": "https://www.youtube.com/watch?v=KUWxBHWB1Os&t=195"}, {"text": "The city needs to be fixed and we need a builder to fix it. And I'm that builder.", "attribution": "-- Adam Miller at 05:02", "link": "https://www.youtube.com/watch?v=KUWxBHWB1Os&t=302"}, {"text": "Adam and my husband Sean have worked together for five years now... Seven years.", "attribution": "-- Speaker A at 02:02", "link": "https://www.youtube.com/watch?v=KUWxBHWB1Os&t=122"}, {"text": "Obviously, the fires were a complete abdication of leadership.", "attribution": "-- Adam Miller at 24:14", "link": "https://www.youtube.com/watch?v=KUWxBHWB1Os&t=1454"}, {"text": "Better Angels built that. We were the ones that did it.", "attribution": "-- Adam Miller at 28:56", "link": "https://www.youtube.com/watch?v=KUWxBHWB1Os&t=1736"}, {"text": "I would have been on the ground. I probably would have gotten in trouble because I would have been in the middle of the fire.", "attribution": "-- Adam Miller at 25:30", "link": "https://www.youtube.com/watch?v=KUWxBHWB1Os&t=1530"}, {"text": "We've helped about 2,000 Angelinos stay off the street with this program already.", "attribution": "-- Adam Miller at 26:58", "link": "https://www.youtube.com/watch?v=KUWxBHWB1Os&t=1618"}, {"text": "I think ultimately the way we're going to solve this... is by new leadership that has transparency, accountability, and operational experience.", "attribution": "-- Adam Miller at 09:16", "link": "https://www.youtube.com/watch?v=KUWxBHWB1Os&t=556"}], "links": [["Watch Episode", "https://www.youtube.com/watch?v=KUWxBHWB1Os"], ["Summary", "https://www.dropbox.com/scl/fi/kwh33mjpiw519m7cl1q7o/Pat-Brown-Institute-at-Cal-State-LA-On-the-Record-with-Adam-Miller-Summary.docx?rlkey=v7a7k78t9x16vzdkfm0watq3q&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/d8bb2yztbal83h7toszd2/Pat-Brown-Institute-at-Cal-State-LA-On-the-Record-with-Adam-Miller-Transcript.docx?rlkey=lap1rbddf2e7wgnfatn5r3vde&dl=0"]]},
{"title": "Spencer Pratt | Creating A Villain, His New Memoir, &amp; Running For LA Mayor!", "show": "Off the Vine with Kaitlyn Bristowe", "description": "Spencer Pratt appears as a guest on Kaitlyn Bristowe's podcast to discuss his new memoir 'The Guy You Love to Hate.' The wide-ranging conversation covers his reality TV villain persona, life experiences from The Hills, recent house fire tragedy, and his campaign for LA mayor.", "date": "March 28, 2026", "tags": ["Spencer Pratt", "Guest Appearance", "Video"], "sentiment": "Positive", "quotes": [{"text": "Your book was amazing. I text you this. I just could not get enough of it.", "attribution": "-- Kaitlyn Bristowe at 01:51", "link": "https://www.youtube.com/watch?v=fCUNquHGBkk&t=111"}, {"text": "I didn't accidentally become the villain, that you created him and that you studied obviously people like Simon Cowell.", "attribution": "-- Kaitlyn Bristowe at 05:04", "link": "https://www.youtube.com/watch?v=fCUNquHGBkk&t=304"}, {"text": "The goal was to write a book that the way I joked about it, it seems like somebody wrote a book to like take me down.", "attribution": "-- Spencer Pratt at 02:27", "link": "https://www.youtube.com/watch?v=fCUNquHGBkk&t=147"}, {"text": "I always joke for years if I had narrated The Hills, the other cast members would have definitely been the bad guys.", "attribution": "-- Spencer Pratt at 03:54", "link": "https://www.youtube.com/watch?v=fCUNquHGBkk&t=234"}, {"text": "If I had had comment sections and DMs and if I was going on TikTok live and just feeling that hate in real life, I probably would have not been able to continue.", "attribution": "-- Spencer Pratt at 05:32", "link": "https://www.youtube.com/watch?v=fCUNquHGBkk&t=332"}, {"text": "These are the two nicest people I've ever met in my life and like so real and so honest.", "attribution": "-- Kaitlyn Bristowe at 03:27", "link": "https://www.youtube.com/watch?v=fCUNquHGBkk&t=207"}, {"text": "I was forced because this lady Karen Bass who is rerunning who's probably, God forbid, if I didn't even step in, she was for sure winning.", "attribution": "-- Spencer Pratt at 53:13", "link": "https://www.youtube.com/watch?v=fCUNquHGBkk&t=3193"}, {"text": "I put all of my money into crystals since 2008. That was at least probably $2 million in just crystals that went up.", "attribution": "-- Spencer Pratt at 49:05", "link": "https://www.youtube.com/watch?v=fCUNquHGBkk&t=2945"}], "links": [["Watch Episode", "https://www.youtube.com/watch?v=fCUNquHGBkk"], ["Summary", "https://www.dropbox.com/scl/fi/mw75wd0at973t77p31skb/Off-the-Vine-with-Kaitlyn-Bristowe-Spencer-Pratt-Creating-A-Villain-His-New-Memoir-amp-Running-For-LA-Mayor-Summary.docx?rlkey=10p7yzv7vo02iqjniqmpztwlo&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/uq4eh4a9mz7qy98uugxjx/Off-the-Vine-with-Kaitlyn-Bristowe-Spencer-Pratt-Creating-A-Villain-His-New-Memoir-amp-Running-For-LA-Mayor-Transcript.docx?rlkey=3q91mrvlq3us4c9ll7h4pozy7&dl=0"]]},
{"title": "LA Mayoral Candidate Spencer Pratt In Studio Interview With John Kobylt", "show": "John Kobylt Show & John Kobylt Radio", "description": "Spencer Pratt appears as an in-studio guest for the full hour on the John Kobylt Show, discussing his mayoral campaign for Los Angeles. He presents himself as the accountability candidate challenging incumbent Karen Bass and Nithia Ramen, focusing heavily on homelessness, law enforcement, and city corruption.", "date": "March 28, 2026", "tags": ["Spencer Pratt", "Guest Appearance", "Video"], "sentiment": "Positive", "quotes": [{"text": "Spencer Pratt running for mayor of Los Angeles against Karen Bass and Nithia Ramen and he's got some good support already and you can definitely get into the runoff for sure.", "attribution": "-- John Kobylt at 00:06", "link": "https://www.youtube.com/watch?v=L1GctL0pQmE&t=6"}, {"text": "I'm so excited to be running for mayor because I'm going to show them there are consequences and there are enough angry taxpayers, they're going to say, 'No more. You're done, Mayor Bass.'", "attribution": "-- Spencer Pratt at 03:12", "link": "https://www.youtube.com/watch?v=L1GctL0pQmE&t=192"}, {"text": "The issue that I believe I will be elected potentially on June 2nd with 51% of the vote outright is homelessness.", "attribution": "-- Spencer Pratt at 04:50", "link": "https://www.youtube.com/watch?v=L1GctL0pQmE&t=290"}, {"text": "I'm the only one saying that everyone on the streets, we're going to enforce the law. And that means treatment first, not this housing first thing.", "attribution": "-- Spencer Pratt at 05:24", "link": "https://www.youtube.com/watch?v=L1GctL0pQmE&t=324"}, {"text": "Spencer Pratt, who's running for mayor and he's he's the only logical candidate. He's the guy you have to vote for if you want to change things.", "attribution": "-- John Kobylt at 10:44", "link": "https://www.youtube.com/watch?v=L1GctL0pQmE&t=644"}, {"text": "I'm going to be the mayor of accountability as I keep saying and I have after the break I'll show you the text messages from the IRS ready to go.", "attribution": "-- Spencer Pratt at 11:22", "link": "https://www.youtube.com/watch?v=L1GctL0pQmE&t=682"}, {"text": "I didn't want to run for mayor. I don't want to be a politician. I had no choice. If it wasn't me, it was Karen Bass again.", "attribution": "-- Spencer Pratt at 26:04", "link": "https://www.youtube.com/watch?v=L1GctL0pQmE&t=1564"}, {"text": "1984, people still talk about was the greatest Olympics ever. I'm bringing 1984 back.", "attribution": "-- Spencer Pratt at 28:57", "link": "https://www.youtube.com/watch?v=L1GctL0pQmE&t=1737"}], "links": [["Watch Episode", "https://www.youtube.com/watch?v=L1GctL0pQmE"], ["Summary", "https://www.dropbox.com/scl/fi/c6otgkv7zqghejqt1uepc/John-Kobylt-Show-John-Kobylt-Radio-LA-Mayoral-Candidate-Spencer-Pratt-In-Studio-Interview-With-John-Kobylt-Summary.docx?rlkey=b7u0xqi82feqaz2kfc3f7n15q&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/jbnrw9wqty2ss7vad6r92/John-Kobylt-Show-John-Kobylt-Radio-LA-Mayoral-Candidate-Spencer-Pratt-In-Studio-Interview-With-John-Kobylt-Transcript.docx?rlkey=0q7b0sphvvmb6om3eluqggaj9&dl=0"]]},
{"title": "A conversation with LA mayoral candidate Rae Huang and Nick Caputo of Livable Advanced LA", "show": "Rae for LA", "description": "This is Rae Huang's own podcast episode where she hosts Nick Caputo to discuss LA's charter reform process. Rae is the host/interviewer discussing civic engagement and governmental reform as part of her mayoral campaign platform.", "date": "March 28, 2026", "tags": ["Rae Huang", "Guest Appearance", "Video"], "sentiment": "Positive", "quotes": [{"text": "Hey everybody, it's Ray Hang here. I am so excited to be able to have my friend Nick Caputo", "attribution": "-- Rae Huang at 00:00", "link": ""}, {"text": "Part of the reason why I wanted to hold this podcast and have you on is because a lot of folks recently saw me go viral.", "attribution": "-- Rae Huang at 01:24", "link": "https://www.youtube.com/watch?v=8_q8m3g3XA8&t=84"}, {"text": "I was going to give public comment to the Charter Reform Commission and I got cut off immediately", "attribution": "-- Rae Huang at 01:30", "link": "https://www.youtube.com/watch?v=8_q8m3g3XA8&t=90"}, {"text": "A big piece of our campaign is actually educating people more about their city", "attribution": "-- Rae Huang at 01:46", "link": "https://www.youtube.com/watch?v=8_q8m3g3XA8&t=106"}, {"text": "I attended this last charter commission meeting and it was a bit of an embarrassment", "attribution": "-- Rae Huang at 14:56", "link": "https://www.youtube.com/watch?v=8_q8m3g3XA8&t=896"}, {"text": "Seeing what happened to you was wrong. Seeing what happened to you was without a doubt the worst I've seen", "attribution": "-- Nick Caputo at 15:24", "link": "https://www.youtube.com/watch?v=8_q8m3g3XA8&t=924"}, {"text": "I believe that people who have lived experience know what they need to change to make their lives better", "attribution": "-- Rae Huang at 48:30", "link": "https://www.youtube.com/watch?v=8_q8m3g3XA8&t=2910"}, {"text": "I'm so proud and honored to be running in this race and to be creating that hope and change", "attribution": "-- Rae Huang at 52:41", "link": "https://www.youtube.com/watch?v=8_q8m3g3XA8&t=3161"}], "links": [["Watch Episode", "https://www.youtube.com/watch?v=8_q8m3g3XA8"], ["Summary", "https://www.dropbox.com/scl/fi/jg3xxu75svmzwefwtfezh/Rae-for-LA-A-conversation-with-LA-mayoral-candidate-Rae-Huang-and-Nick-Caputo-of-Livable-Advanced-LA-Summary.docx?rlkey=1mvn7h8jqc0efx20f6kzvxqh8&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/mhi88am2v1nr0j9oxw3l8/Rae-for-LA-A-conversation-with-LA-mayoral-candidate-Rae-Huang-and-Nick-Caputo-of-Livable-Advanced-LA-Transcript.docx?rlkey=3bcqy5fxhngr8es1x9k4hzcu2&dl=0"]]},
{"title": "LA Mayor Karen Bass Sounds Alarm on TrumpÃ¢ÂÂs ICE Tactics", "show": "Lincoln Square", "description": "LA Mayor Karen Bass discusses her administration's response to Trump-era ICE enforcement tactics in Los Angeles. She explains her executive directive to limit ICE operations and describes the escalating brutality of immigration raids under the Trump administration.", "date": "March 28, 2026", "tags": ["Karen Bass", "Guest Appearance", "Video"], "sentiment": "Mixed", "quotes": [{"text": "My executive directive said a couple of things. In the state of California, they passed a law that says ICE agents cannot be completely masked.", "attribution": "-- Karen Bass at 00:30", "link": "https://www.youtube.com/watch?v=59w8jXQttn8&t=30"}, {"text": "As mayor, I have authority over the police commission that I appoint and they have authority over the police department.", "attribution": "-- Karen Bass at 00:46", "link": "https://www.youtube.com/watch?v=59w8jXQttn8&t=46"}, {"text": "There is no rationale in the world for an ICE agent to be masked.", "attribution": "-- Karen Bass at 02:01", "link": "https://www.youtube.com/watch?v=59w8jXQttn8&t=121"}, {"text": "The other thing my executive director said is that we ban ICE from staging on any city property.", "attribution": "-- Karen Bass at 02:30", "link": "https://www.youtube.com/watch?v=59w8jXQttn8&t=150"}, {"text": "I would have never imagined that I have to protect myself from my own government.", "attribution": "-- Karen Bass at 03:54", "link": "https://www.youtube.com/watch?v=59w8jXQttn8&t=234"}, {"text": "It's one thing to be a blue city in a super blue state. But it's another thing to be a blue city in the deep south.", "attribution": "-- Karen Bass at 04:49", "link": "https://www.youtube.com/watch?v=59w8jXQttn8&t=289"}, {"text": "Fortunately, ICE is not there. They are not needed here.", "attribution": "-- Karen Bass at 05:42", "link": "https://www.youtube.com/watch?v=59w8jXQttn8&t=342"}, {"text": "I do believe that part of this in terms of a long-term change was to get Americans used to the military.", "attribution": "-- Karen Bass at 06:17", "link": "https://www.youtube.com/watch?v=59w8jXQttn8&t=377"}], "links": [["Watch Episode", "https://www.youtube.com/watch?v=59w8jXQttn8"], ["Summary", "https://www.dropbox.com/scl/fi/xx5lok1zrsh4g3sfjcgtf/Lincoln-Square-LA-Mayor-Karen-Bass-Sounds-Alarm-on-Trumps-ICE-Tactics-Summary.docx?rlkey=3hyt8iojghq27vjqsy60rhhp9&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/6vjrchvjwjdhs0mooed3i/Lincoln-Square-LA-Mayor-Karen-Bass-Sounds-Alarm-on-Trumps-ICE-Tactics-Transcript.docx?rlkey=prw9wyjbwu546xr73jgz7q0q4&dl=0"]]},

            tagsHtml += `<span class="tag tag-mention">${tag}</span>`;

            tagsHtml += `<span class="tag tag-source">${tag}</span>`;

        let linksHtml = '';

          </div>`;
        }

        return `<div class="episode-card">
          <div class="episode-meta">
            <div>
              <div class="episode-show">${ep.show}</div>
              <div class="episode-title">${ep.title}</div>
            </div>
            <div class="episode-date">${ep.date}</div>
          </div>

          <div class="episode-tags">
            ${tagsHtml}
            <span class="sentiment-badge ${sentimentClass}">${ep.sentiment}</span>
          </div>

          <div class="episode-description">${ep.description}</div>

          ${quoteHtml}

          <div class="episode-links">
            ${linksHtml}
          </div>
        </div>`;
      }).join('');

      renderPagination();
    }

    function renderPagination() {
      const totalPages = Math.ceil(filteredEpisodes.length / ITEMS_PER_PAGE);
      const pagination = document.getElementById('pagination');

      if (totalPages <= 1) {
        pagination.innerHTML = '';
        return;
      }

      let html = '';
      if (currentPage > 1) {
        html += `<button onclick="goToPage(${currentPage - 1})">\u2190 Previous</button>`;
      }

      for (let i = 1; i <= totalPages; i++) {
        if (i === currentPage) {
          html += `<button class="active">${i}</button>`;
        } else {
          html += `<button onclick="goToPage(${i})">${i}</button>`;
        }
      }

      if (currentPage < totalPages) {
        html += `<button onclick="goToPage(${currentPage + 1})">Next \u2192</button>`;
      }

      pagination.innerHTML = html;
    }

    function goToPage(page) {
      currentPage = page;
      renderEpisodes();
      window.scrollTo(0, 0);
    }

    function toggleQuote(quoteId, btn) {
      const expand = document.getElementById(quoteId + '-full');
      if (!expand || !btn) return;
      if (expand.classList.contains('show')) {
        expand.classList.remove('show');
        btn.textContent = 'Show full quote';
      } else {
        expand.classList.add('show');
        btn.textContent = 'Show less';
      }
    }

    function resetFilters() {
      document.getElementById('search').value = '';
      document.getElementById('person').value = '';
      document.getElementById('appearance').value = '';
      document.getElementById('sentiment').value = '';
      document.getElementById('source').value = '';
      filterEpisodes();
    }

    // Event listeners
    document.getElementById('search').addEventListener('input', filterEpisodes);
    document.getElementById('person').addEventListener('change', filterEpisodes);
    document.getElementById('appearance').addEventListener('change', filterEpisodes);
    document.getElementById('sentiment').addEventListener('change', filterEpisodes);
    document.getElementById('source').addEventListener('change', filterEpisodes);
    document.getElementById('resetBtn').addEventListener('click', resetFilters);

    // Populate person dropdown from episode data
    const personSelect = document.getElementById('person');
    const people = [...new Set(allEpisodes.flatMap(ep => ep.tags.filter(t => !['Mentioned', 'Guest', 'Guest Appearance', 'Podcast', 'Video'].includes(t))))].sort();
    people.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p;
      opt.textContent = p;
      personSelect.appendChild(opt);
    });

    // Initial render
    filterEpisodes();
  </script>
</body>
</html>
