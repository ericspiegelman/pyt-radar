utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1022"}], "links": [["Listen to Episode", "https://omny.fm/shows/the-drive-home-with-jillian-barberie-and-john-ph-1/will-swaim-on-the-state-of-the-governors-race?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website"], ["Summary", "https://www.dropbox.com/scl/fi/1yllpe3b6jvem1yeuyjuh/790-KABC-Will-Swaim-on-the-state-of-the-Governors-race-Summary.docx?rlkey=czbtpnh5ykazt8xzweaaz5hmv&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/52pfpbz52n0fwble2rtkq/790-KABC-Will-Swaim-on-the-state-of-the-Governors-race-Transcript.docx?rlkey=zy1s232mczdxku4ka6qlju5gg&dl=0"]]},
{"title": "Underground Failure, Hotel California and Money Mirage", "show": "Monks & Merrill", "description": "This episode of Monks & Merrill discusses LA's homelessness crisis, underground living situations, and city budget issues. Karen Bass is mentioned in the context of mayoral candidate Nithya Raman criticizing Bass's Inside Safe homelessness program and positioning herself as an alternative.", "date": "April 10, 2026", "tags": ["Karen Bass", "Mentioned", "Podcast"], "sentiment": "Negative", "quotes": [{"text": "LA City Councilwoman and mayoral candidate Nithya Raman has announced her homelessness platform...she has argued that Mayor Karen Bass's Inside Safe program is too costly and that the long-term results have been questionable.", "attribution": "-- Michael Monks at 10:33", "link": "https://omny.fm/shows/monks-merrill/underground-failure-hotel-california-and-money-mirage?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=633"}, {"text": "She buddied up to Karen Bass and then stabbed her in the back slowly, so slowly Karen Bass couldn't even feel the knife going in.", "attribution": "-- Chris Merrill at 13:57", "link": "https://omny.fm/shows/monks-merrill/underground-failure-hotel-california-and-money-mirage?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=837"}, {"text": "Nithya Raman set Karen Bass up to look like the person who was overseeing the destruction of Los Angeles.", "attribution": "-- Chris Merrill at 14:01", "link": "https://omny.fm/shows/monks-merrill/underground-failure-hotel-california-and-money-mirage?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=841"}, {"text": "Karen Bass told me what she wanted to do, and I had to go along with it. What else was I gonna do?", "attribution": "-- Chris Merrill at 14:05", "link": "https://omny.fm/shows/monks-merrill/underground-failure-hotel-california-and-money-mirage?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=845"}], "links": [["Listen to Episode", "https://omny.fm/shows/monks-merrill/underground-failure-hotel-california-and-money-mirage?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website"], ["Summary", "https://www.dropbox.com/scl/fi/0wma0pdhjettwf81yglaq/Monks-Merrill-Underground-Failure-Hotel-California-and-Money-Mirage-Summary.docx?rlkey=3f6zzp82lclxiqqsrlx28l99f&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/ejuhc12iwwca2pfkhr8d3/Monks-Merrill-Underground-Failure-Hotel-California-and-Money-Mirage-Transcript.docx?rlkey=y26dotg1r6eitbvnvbhzea8pb&dl=0"]]},

en to Episode", "https://omny.fm/shows/john-and-ken-on-demand/bill-to-raise-cas-elderly-parole-age-advances-04-09?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website"], ["Summary", "https://www.dropbox.com/scl/fi/337wbgkv8yce993pxxjx1/The-John-Kobylt-Show-Bill-To-Raise-CAs-Elderly-Parole-Age-Advances-0409-Summary.docx?rlkey=19khfd3m219f57j2f4g5eadit&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/2zbawap1qop4gr9mm0orf/The-John-Kobylt-Show-Bill-To-Raise-CAs-Elderly-Parole-Age-Advances-0409-Transcript.docx?rlkey=zvkx7ef6nc320un18zz6geg8j&dl=0"]]},

{"title": "NITHYA RAMAN is pushing her MOM IDEOLOGY || TMSM S2E24", "show": "Brandon Kyle Goodman", "description": "LA City Council member and mayoral candidate Nithya Raman appears as the main guest, discussing her political journey, housing policy, homelessness crisis, and her decision to challenge Mayor Karen Bass. The conversation covers both personal topics and policy positions in a casual, conversational format.", "date": "April 10, 2026", "tags": ["Nithya Raman", "Guest Appearance", "Video"], "sentiment": "Positive", "quotes": [{"text": "I am so excited because today I am speaking to LA mayoral candidate Nithya Rahman.", "attribution": "-- Brandon Kyle Goodman at 00:24", "link": "https://www.youtube.com/watch?v=Ev2Jf3X-MW8&t=24"}, {"text": "I would say that I'm more driven by mom ideology.", "attribution": "-- Nithya Raman at 00:03", "link": "https://www.youtube.com/watch?v=Ev2Jf3X-MW8&t=3"}, {"text": "I still holding the record for the most votes ever won by an LA City Council candidate.", "attribution": "-- Nithya Raman at 15:18", "link": "https://www.youtube.com/watch?v=Ev2Jf3X-MW8&t=918"}, {"text": "I was one of them. And they used terrible language, the most, I mean, really offensive racist language.", "attribution": "-- Nithya Raman at 12:24", "link": "https://www.youtube.com/watch?v=Ev2Jf3X-MW8&t=744"}, {"text": "I really want the city to care for its residents like the same way I wanna care for my kids.", "attribution": "-- Nithya Raman at 39:10", "link": "https://www.youtube.com/watch?v=Ev2Jf3X-MW8&t=2350"}, {"text": "My relationship with them is my primary relationship, right? Particularly in this role.", "attribution": "-- Nithya Raman at 42:26", "link": "https://www.youtube.com/watch?v=Ev2Jf3X-MW8&t=2546"}, {"text": "We ended up increasing voter turnout in the district by 5 times.", "attribution": "-- Nithya Raman at 14:54", "link": "https://www.youtube.com/watch?v=Ev2Jf3X-MW8&t=894"}, {"text": "If he doesn't like you, he doesn't have good taste.", "attribution": "-- Nithya Raman at 48:49", "link": "https://www.youtube.com/watch?v=Ev2Jf3X-MW8&t=2929"}], "links": [["Watch Episode", "https://www.youtube.com/watch?v=Ev2Jf3X-MW8"], ["Summary", "https://www.dropbox.com/scl/fi/6wlcucabnrrw6q9y9v1da/Brandon-Kyle-Goodman-NITHYA-RAMAN-is-pushing-her-MOM-IDEOLOGY-TMSM-S2E24-Summary.docx?rlkey=46es6d0si40421kgy8hliszwz&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/uxq0u3slpcxawv17m7c8f/Brandon-Kyle-Goodman-NITHYA-RAMAN-is-pushing-her-MOM-IDEOLOGY-TMSM-S2E24-Transcript.docx?rlkey=4f6jmyiyka4ddhax06snbletf&dl=0"]]},
{"title": "Spencer Pratt responds to the LA Times hit piece on his residency", "show": "Cumulus News Talk", "description": "This episode features Spencer Pratt defending himself against an LA Times article questioning his residency eligibility for the LA mayoral race, arguing that his house burned down in the Pacific Palisades fire. The hosts are very supportive of Pratt's candidacy and criticize the LA Times piece as a politically motivated hit job.", "date": "April 10, 2026", "tags": ["Spencer Pratt", "Mentioned", "Video"], "sentiment": "Positive", "quotes": [{"text": "They want to attack me for not living in the Palisades while running for mayor? Hey, brain surgeon, my house burned down.", "attribution": "-- Spencer Pratt at 03:41", "link": "https://www.youtube.com/watch?v=uGW3ukUAweM&t=221"}, {"text": "I find it ironic that the LA Times is in El Segundo for the last 8 years and they're not called the El Segundo Times.", "attribution": "-- Spencer Pratt at 04:32", "link": "https://www.youtube.com/watch?v=uGW3ukUAweM&t=272"}, {"text": "The more I hear from this guy, the more I love him. I'll tell you, he won me over when he came into the studio for an hour.", "attribution": "-- Speaker A (John Phillips) at 07:31", "link": "https://www.youtube.com/watch?v=uGW3ukUAweM&t=451"}, {"text": "12 of my neighbors burned alive due to the negligence of our city leaders and Karen Bass, who was in Ghana knowing this wind red weather event was coming.", "attribution": "-- Spencer Pratt at 10:19", "link": "https://www.youtube.com/watch?v=uGW3ukUAweM&t=619"}, {"text": "I'm fighting so my kids can grow up in the LA that I grew up in.", "attribution": "-- Spencer Pratt at 12:04", "link": "https://www.youtube.com/watch?v=uGW3ukUAweM&t=724"}, {"text": "As mayor, I'm going to enforce the law. I'm not going to pretend I'm compassionate while 6 people die a day.", "attribution": "-- Spencer Pratt at 13:03", "link": "https://www.youtube.com/watch?v=uGW3ukUAweM&t=783"}, {"text": "I'm not running as reality star. I'm running as an Angeleno who grew up here and wants his children to grow up here.", "attribution": "-- Spencer Pratt at 17:47", "link": "https://www.youtube.com/watch?v=uGW3ukUAweM&t=1067"}, {"text": "This guy is going to go in there like a bull in a china shop and force these idiots to accept reality.", "attribution": "-- Speaker A (John Phillips) at 14:25", "link": "https://www.youtube.com/watch?v=uGW3ukUAweM&t=865"}], "links": [["Watch Episode", "https://www.youtube.com/watch?v=uGW3ukUAweM"], ["Summary", "https://www.dropbox.com/scl/fi/d52nrewmnw54f33tgc9nx/Cumulus-News-Talk-Spencer-Pratt-responds-to-the-LA-Times-hit-piece-on-his-residency-Summary.docx?rlkey=acdumbqj3rzz1lb3ytjybocry&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/8xp7z48n0ysvcro69y2os/Cumulus-News-Talk-Spencer-Pratt-responds-to-the-LA-Times-hit-piece-on-his-residency-Transcript.docx?rlkey=kyspqgqz50l4851vnfclu5i3t&dl=0"]]},
{"title": "Iran War Ceasefire Holding | LAPD: Forget Growing, Stop Shrinking", "show": "The Bill Handel Show", "description": "This episode of The Bill Handel Show covers international tensions with Iran and domestic issues including LAPD staffing. Karen Bass is relevant as the current LA mayor facing re-election challenges and budget constraints that have forced her to change her police department expansion plans.", "date": "April 09, 2026", "tags": ["Karen Bass", "Mentioned", "Podcast"], "sentiment": "Negative", "quotes": [{"text": "Karen Bass, who is again running for mayor, her second go-round, and she's changed her tune.", "attribution": "-- Bill Handel at 16:45", "link": "https://omny.fm/shows/the-bill-handel-show/iran-war-ceasefire-holding-us-fertility-rate-drops-again?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1005"}, {"text": "Well, one of the tunes is she thinks she's going to win, and that's not going to happen.", "attribution": "-- Bill Handel at 16:48", "link": "https://omny.fm/shows/the-bill-handel-show/iran-war-ceasefire-holding-us-fertility-rate-drops-again?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1008"}, {"text": "When she ran for mayor 4 years ago, she wanted to regrow the LAPD to 9,500 officers.", "attribution": "-- Bill Handel at 17:15", "link": "https://omny.fm/shows/the-bill-handel-show/iran-war-ceasefire-holding-us-fertility-rate-drops-again?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1035"}, {"text": "And now she's facing this huge budget crunch and her plan has shifted.", "attribution": "-- Bill Handel at 17:20", "link": "https://omny.fm/shows/the-bill-handel-show/iran-war-ceasefire-holding-us-fertility-rate-drops-again?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1040"}, {"text": "The aim going forward, she told the Times, is to simply stop the department from getting smaller.", "attribution": "-- Bill Handel at 17:25", "link": "https://omny.fm/shows/the-bill-handel-show/iran-war-ceasefire-holding-us-fertility-rate-drops-again?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1045"}], "links": [["Listen to Episode", "https://omny.fm/shows/the-bill-handel-show/iran-war-ceasefire-holding-us-fertility-rate-drops-again?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website"], ["Summary", "https://www.dropbox.com/scl/fi/l8u1asso9g7wjhuzknqoa/The-Bill-Handel-Show-Iran-War-Ceasefire-Holding-LAPD-Forget-Growing-Stop-Shrinking-Summary.docx?rlkey=b5vzw5b88q488v427puouo957&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/67be1sqgvdknubk983gu4/The-Bill-Handel-Show-Iran-War-Ceasefire-Holding-LAPD-Forget-Growing-Stop-Shrinking-Transcript.docx?rlkey=0756jvjo0hf3nf6mjohx30c7u&dl=0"]]},
{"title": "Lawler HUMILIATED as Fox News interview goes side ways", "show": "The DeVory Darkins Show", "description": "This episode covers three main stories, with substantial focus on LA Mayor Karen Bass's homelessness program facing criticism for spending $300 million with 40% of participants returning to the streets. The host analyzes her CNN interview defending the program ahead of upcoming major events like the Olympics.", "date": "April 09, 2026", "tags": ["Karen Bass", "Mentioned", "Podcast"], "sentiment": "Negative", "quotes": [{"text": "Karen Bass, her homelessness program is facing a lot of backlash", "attribution": "-- Speaker A (Host) at 00:00", "link": ""}, {"text": "We spent a third of a billion dollars and most of us are back where we started.", "attribution": "-- Speaker A (Host) at 11:05", "link": "https://podcasters.spotify.com/pod/show/devory-darkins/episodes/Lawler-HUMILIATED-as-Fox-News-interview-goes-side-ways-e3hlmde?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=665"}, {"text": "Well, I say several things. First of all, 60% of the people have remained housed.", "attribution": "-- Karen Bass at 13:35", "link": "https://podcasters.spotify.com/pod/show/devory-darkins/episodes/Lawler-HUMILIATED-as-Fox-News-interview-goes-side-ways-e3hlmde?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=815"}, {"text": "Well, it is a great percentage.", "attribution": "-- Karen Bass at 13:45", "link": "https://podcasters.spotify.com/pod/show/devory-darkins/episodes/Lawler-HUMILIATED-as-Fox-News-interview-goes-side-ways-e3hlmde?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=825"}, {"text": "They're calling for change because they've seen how incompetent she's been.", "attribution": "-- Speaker A (Host) at 12:29", "link": "https://podcasters.spotify.com/pod/show/devory-darkins/episodes/Lawler-HUMILIATED-as-Fox-News-interview-goes-side-ways-e3hlmde?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=749"}, {"text": "She has not been able to deliver the results that she's promised.", "attribution": "-- Speaker A (Host) at 12:29", "link": "https://podcasters.spotify.com/pod/show/devory-darkins/episodes/Lawler-HUMILIATED-as-Fox-News-interview-goes-side-ways-e3hlmde?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=749"}, {"text": "But it's 2026 and you're now doing this. So what have you been doing the whole time exactly?", "attribution": "-- Speaker A (Host) at 14:20", "link": "https://podcasters.spotify.com/pod/show/devory-darkins/episodes/Lawler-HUMILIATED-as-Fox-News-interview-goes-side-ways-e3hlmde?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=860"}, {"text": "Mayor Bass's Inside Safe program has spent over $300 million since 2022 to move people from encampments into temporary housing.", "attribution": "-- Reporter at 18:21", "link": "https://podcasters.spotify.com/pod/show/devory-darkins/episodes/Lawler-HUMILIATED-as-Fox-News-interview-goes-side-ways-e3hlmde?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1101"}], "links": [["Listen to Episode", "https://podcasters.spotify.com/pod/show/devory-darkins/episodes/Lawler-HUMILIATED-as-Fox-News-interview-goes-side-ways-e3hlmde?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website"], ["Summary", "https://www.dropbox.com/scl/fi/qow653cl9n006d5h8b3nu/The-DeVory-Darkins-Show-Lawler-HUMILIATED-as-Fox-News-interview-goes-side-ways-Summary.docx?rlkey=wrja60hwvmpg4zvvjd0sqtf48&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/0rej03rieuuxvryizzfj5/The-DeVory-Darkins-Show-Lawler-HUMILIATED-as-Fox-News-interview-goes-side-ways-Transcript.docx?rlkey=eeywn437r72zgd6t0qbkw8p3j&dl=0"]]},
{"title": "Spencer Pratt responds to the LA Times hit piece on his residency", "show": "The John Phillips Show", "description": "The episode focuses on Spencer Pratt defending his LA mayoral candidacy against an LA Times attack on his residency after his home burned down in the Pacific Palisades fire. Karen Bass is heavily criticized throughout as the incumbent mayor who failed during the fire crisis.", "date": "April 09, 2026", "tags": ["Karen Bass", "Mentioned", "Podcast"], "sentiment": "Negative", "quotes": [{"text": "We know that embattled Los Angeles Mayor Karen Bass is facing long odds at winning reelection for a second term as the chief executive of the nation's second-largest city.", "attribution": "-- John Phillips at 02:14", "link": "https://omny.fm/shows/the-drive-home-with-jillian-barberie-and-john-ph-1/spencer-pratt-responds-to-the-la-times-hit-piece-on-his-residency?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=134"}, {"text": "Because he is currently a threat to Karen Bass's power at City Hall, he is out making his rounds everywhere he can go to make the argument that Karen Bass doesn't deserve a second term.", "attribution": "-- John Phillips at 03:06", "link": "https://omny.fm/shows/the-drive-home-with-jillian-barberie-and-john-ph-1/spencer-pratt-responds-to-the-la-times-hit-piece-on-his-residency?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=186"}, {"text": "Not only losing homes, 12 of my neighbors burned alive due to the negligence of our city leaders and Karen Bass, who was in Ghana knowing this wind red weather event was coming.", "attribution": "-- Spencer Pratt at 10:20", "link": "https://omny.fm/shows/the-drive-home-with-jillian-barberie-and-john-ph-1/spencer-pratt-responds-to-the-la-times-hit-piece-on-his-residency?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=620"}, {"text": "The Palisades is gone. Mayor Bass already let that burn to the ground.", "attribution": "-- Spencer Pratt at 11:58", "link": "https://omny.fm/shows/the-drive-home-with-jillian-barberie-and-john-ph-1/spencer-pratt-responds-to-the-la-times-hit-piece-on-his-residency?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=718"}, {"text": "And she's not equipped to do the job, so she's just going to have 4 more years of completely embarrassing failure to look forward to.", "attribution": "-- John Phillips at 12:28", "link": "https://omny.fm/shows/the-drive-home-with-jillian-barberie-and-john-ph-1/spencer-pratt-responds-to-the-la-times-hit-piece-on-his-residency?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=748"}, {"text": "What I think is really interesting, and we've asked Mayor Karen Bass, by the way, to be in studio before. She has not currently taken us up on that offer.", "attribution": "-- CBS Reporter at 16:49", "link": "https://omny.fm/shows/the-drive-home-with-jillian-barberie-and-john-ph-1/spencer-pratt-responds-to-the-la-times-hit-piece-on-his-residency?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1009"}, {"text": "What can she say that can put lipstick on this pig?", "attribution": "-- John Phillips at 16:51", "link": "https://omny.fm/shows/the-drive-home-with-jillian-barberie-and-john-ph-1/spencer-pratt-responds-to-the-la-times-hit-piece-on-his-residency?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1011"}, {"text": "What happens when the president of Nigeria is having an inauguration?", "attribution": "-- John Phillips at 12:08", "link": "https://omny.fm/shows/the-drive-home-with-jillian-barberie-and-john-ph-1/spencer-pratt-responds-to-the-la-times-hit-piece-on-his-residency?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=728"}], "links": [["Listen to Episode", "https://omny.fm/shows/the-drive-home-with-jillian-barberie-and-john-ph-1/spencer-pratt-responds-to-the-la-times-hit-piece-on-his-residency?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website"], ["Summary", "https://www.dropbox.com/scl/fi/8czz9dsh8ywobn9s46ci4/The-John-Phillips-Show-Spencer-Pratt-responds-to-the-LA-Times-hit-piece-on-his-residency-Summary.docx?rlkey=mjruwdn8s71m3dtr6vjas3f8r&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/0ey1h0pmyzxrq6wf6to4o/The-John-Phillips-Show-Spencer-Pratt-responds-to-the-LA-Times-hit-piece-on-his-residency-Transcript.docx?rlkey=m2luo6in87b6uc3g20y2dde53&dl=0"]]},
{"title": "The Smooth Rizzler", "show": "The JV Show Podcast", "description": "This episode of The JV Show discusses Spencer Pratt's surprising success in his campaign for mayor of Los Angeles, where he's currently polling in second place. The hosts express amazement at his political progress despite viewing him as unqualified.", "date": "April 09, 2026", "tags": ["Spencer Pratt", "Mentioned", "Podcast"], "sentiment": "Mixed", "quotes": [{"text": "Spencer Pratt decided after the fires in LA that he needed to run for mayor there because he just hated the way the city has mismanaged things.", "attribution": "-- Graham at 19:31", "link": "https://omny.fm/shows/the-jv-show-podcast/the-smooth-rizzler?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1171"}, {"text": "The most recent poll shows that Spencer Pratt currently in second place in the polling for race for mayor in LA.", "attribution": "-- Graham at 20:14", "link": "https://omny.fm/shows/the-jv-show-podcast/the-smooth-rizzler?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1214"}, {"text": "Right behind her, though, Spencer Pratt, 11% support.", "attribution": "-- Graham at 20:32", "link": "https://omny.fm/shows/the-jv-show-podcast/the-smooth-rizzler?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1232"}, {"text": "Spencer Pratt currently polling in second place to become the next mayor of LA.", "attribution": "-- Graham at 20:50", "link": "https://omny.fm/shows/the-jv-show-podcast/the-smooth-rizzler?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1250"}, {"text": "Anyone think he is qualified for something like this?", "attribution": "-- Selena at 20:53", "link": "https://omny.fm/shows/the-jv-show-podcast/the-smooth-rizzler?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1253"}, {"text": "I thought this guy wouldn't even stand a chance. Everyone was gonna look at him and be like, what a joke.", "attribution": "-- Selena at 21:15", "link": "https://omny.fm/shows/the-jv-show-podcast/the-smooth-rizzler?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1275"}, {"text": "LA is a major, major city.", "attribution": "-- Graham at 21:30", "link": "https://omny.fm/shows/the-jv-show-podcast/the-smooth-rizzler?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1290"}, {"text": "Next thing you know, he's running for governor. Next thing you know, he's running for president and win.", "attribution": "-- Selena at 21:48", "link": "https://omny.fm/shows/the-jv-show-podcast/the-smooth-rizzler?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1308"}], "links": [["Listen to Episode", "https://omny.fm/shows/the-jv-show-podcast/the-smooth-rizzler?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website"], ["Summary", "https://www.dropbox.com/scl/fi/3i0ny6de50btbyytq7j9w/The-JV-Show-Podcast-The-Smooth-Rizzler-Summary.docx?rlkey=9pcbfhallsayc2gugvae5s7pa&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/0xw9i2halv5r04unnbfhj/The-JV-Show-Podcast-The-Smooth-Rizzler-Transcript.docx?rlkey=6inaa71gbrdfou8xin5oo7b5n&dl=0"]]},
{"title": "Ep.22 California on fire - new polling is out and it's wild", "show": "Just Kira Davis on The Orange Report", "description": "This episode focuses on California politics, including polling data for gubernatorial candidates and Trump's endorsement of Steve Hilton. Spencer Pratt is discussed as a mayoral candidate in Los Angeles, with the host analyzing his chances and campaign strategy.", "date": "April 09, 2026", "tags": ["Spencer Pratt", "Mentioned", "Podcast"], "sentiment": "Mixed", "quotes": [{"text": "Listen, I've been watching that race with curiosity more than anything because obviously I can't vote in Los Angeles. Now I did. I like Spencer.", "attribution": "-- Kira Davis at 38:22", "link": "https://www.listennotes.com/e/323b3e7cc93843d0afcdd7e33e768f3c/&t=2302"}, {"text": "First of all, I like anybody who's going to boot out Karen Basura, you know, anybody who's going to change the guard there in LA, I'm going to support.", "attribution": "-- Kira Davis at 38:28", "link": "https://www.listennotes.com/e/323b3e7cc93843d0afcdd7e33e768f3c/&t=2308"}, {"text": "I think Spencer's weakness is that he comes across as a one-issue mayor or mayoral candidate, and of course he is because it was the Palisades that got him into the race.", "attribution": "-- Kira Davis at 39:42", "link": "https://www.listennotes.com/e/323b3e7cc93843d0afcdd7e33e768f3c/&t=2382"}, {"text": "But I think he's been expanding his Um, I think he's been working. I think he's been working to get a better grip on what needs to happen all over Los Angeles.", "attribution": "-- Kira Davis at 39:58", "link": "https://www.listennotes.com/e/323b3e7cc93843d0afcdd7e33e768f3c/&t=2398"}, {"text": "I think when it comes down to what probably was going to end up happening, it's going to be an issue of name recognition. And in that respect, I think Tish is behind the eight ball.", "attribution": "-- Kira Davis at 40:20", "link": "https://www.listennotes.com/e/323b3e7cc93843d0afcdd7e33e768f3c/&t=2420"}, {"text": "But I do think Spencer's got the high ground here with his name recognition and his celebrity is going to help. It is going to help.", "attribution": "-- Kira Davis at 41:12", "link": "https://www.listennotes.com/e/323b3e7cc93843d0afcdd7e33e768f3c/&t=2472"}], "links": [["Listen to Episode", "https://www.listennotes.com/e/323b3e7cc93843d0afcdd7e33e768f3c/"], ["Summary", "https://www.dropbox.com/scl/fi/fc9fpo59kjojrffxzp958/Just-Kira-Davis-on-The-Orange-Report-Ep22-California-on-fire-new-polling-is-out-and-its-wild-Summary.docx?rlkey=17bppdjg9tzhtrpy9j2xiwhc3&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/b279ky35nphaamzisfumi/Just-Kira-Davis-on-The-Orange-Report-Ep22-California-on-fire-new-polling-is-out-and-its-wild-Transcript.docx?rlkey=eyupjkq4pao0mit8cobiz40gu&dl=0"]]},
{"title": "Flea Crisis in LA, Typhus Surge & the Fight to Stabilize LAPD Staffing", "show": "Monks & Merrill", "description": "This episode covers LA's flea-borne typhus crisis and LAPD staffing challenges. Mayor Karen Bass is discussed regarding her retreat from earlier promises to grow the police force to 9,500 officers, now focusing on just preventing further officer losses amid budget constraints.", "date": "April 09, 2026", "tags": ["Karen Bass", "Mentioned", "Podcast"], "sentiment": "Critical", "quotes": [{"text": "the mayor has called for more money for the LAPD. She said We need to hire hundreds more officers. She hasn't been able to do that, so now she's moving the goalposts", "attribution": "-- Speaker D at 22:00", "link": "https://omny.fm/shows/monks-merrill/flea-crisis-in-la-typhus-surge-the-fight-to-stabilize-lapd-staffing?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1320"}, {"text": "the mayor is backing away from that earlier push to raise the number of LAPD officers to 9,500", "attribution": "-- Speaker C at 23:28", "link": "https://omny.fm/shows/monks-merrill/flea-crisis-in-la-typhus-surge-the-fight-to-stabilize-lapd-staffing?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1408"}, {"text": "She's lost officers since she's been in office, even though she said she was going to grow the size of the department", "attribution": "-- Speaker D at 24:50", "link": "https://omny.fm/shows/monks-merrill/flea-crisis-in-la-typhus-surge-the-fight-to-stabilize-lapd-staffing?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1490"}, {"text": "This is one of the big differences when people talk about Mayor Bass, and then one of the challengers is Nithya Raman", "attribution": "-- Speaker D at 27:51", "link": "https://omny.fm/shows/monks-merrill/flea-crisis-in-la-typhus-surge-the-fight-to-stabilize-lapd-staffing?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1671"}, {"text": "now she's going into an election year where it looks like her biggest competitor is going to be the guy who is very— who was on our show yesterday, Spencer Pratt", "attribution": "-- Speaker D at 33:15", "link": "https://omny.fm/shows/monks-merrill/flea-crisis-in-la-typhus-surge-the-fight-to-stabilize-lapd-staffing?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1995"}], "links": [["Listen to Episode", "https://omny.fm/shows/monks-merrill/flea-crisis-in-la-typhus-surge-the-fight-to-stabilize-lapd-staffing?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website"], ["Summary", "https://www.dropbox.com/scl/fi/xmfr2t7pb51737ecgjwgl/Monks-Merrill-Flea-Crisis-in-LA-Typhus-Surge-the-Fight-to-Stabilize-LAPD-Staffing-Summary.docx?rlkey=4lmccmfkcey22szeewitp372m&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/5w4ixexnhmzj02lf1je1b/Monks-Merrill-Flea-Crisis-in-LA-Typhus-Surge-the-Fight-to-Stabilize-LAPD-Staffing-Transcript.docx?rlkey=ul1lxzjpqnplzl1woegs2j3gb&dl=0"]]},
{"title": "Do we need to break up California's energy monopolies?", "show": "The KABC News Blitz", "description": "This is a California-focused news show covering various local issues including energy monopolies, crime, and municipal governance. Karen Bass is briefly mentioned in the context of her appointment of a former PG&E executive to head LA's Department of Water and Power.", "date": "April 09, 2026", "tags": ["Karen Bass", "Mentioned", "Podcast"], "sentiment": "Negative", "quotes": [{"text": "Who did we put in charge of the DWP? Karen Bass? A former executive at PG&E, Janice Quiñones.", "attribution": "-- Randy Wang at 14:48", "link": "https://omny.fm/shows/the-kabc-news-blitz/do-we-need-to-break-up-californias-energy-monopolies?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=888"}], "links": [["Listen to Episode", "https://omny.fm/shows/the-kabc-news-blitz/do-we-need-to-break-up-californias-energy-monopolies?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website"], ["Summary", "https://www.dropbox.com/scl/fi/3ml85dthunltfgb0pmdtr/The-KABC-News-Blitz-Do-we-need-to-break-up-Californias-energy-monopolies-Summary.docx?rlkey=mo6ahl6ld7z0hsoov85262svp&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/cr618c4ceeavf7j34l9ey/The-KABC-News-Blitz-Do-we-need-to-break-up-Californias-energy-monopolies-Transcript.docx?rlkey=nvtqxy1bpg7m74bmin7v1f0o9&dl=0"]]},
{"title": "Construction Process To Rebuild Pacific Palisades Has Been Awful (04/08)", "show": "The John Kobylt Show", "description": "This episode discusses the slow reconstruction process in Pacific Palisades after the fires, with guest Reza Akef explaining various bureaucratic obstacles. Karen Bass is discussed as the current mayor and her efforts to facilitate the rebuild process through coordination with federal agencies and holding departments accountable.", "date": "April 09, 2026", "tags": ["Karen Bass", "Mentioned", "Podcast"], "sentiment": "Mixed", "quotes": [{"text": "I get you're angry. Now we can talk about that later, but I want to focus on Gavin. But you can understand why Bass isn't going to be there, right? Because 50% of the town hates her.", "attribution": "-- Reza Akef at 08:09", "link": "https://omny.fm/shows/john-and-ken-on-demand/construction-process-to-rebuild-pacific-palisades-has-been-awful-04-08?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=489"}, {"text": "Mayor Bass did step up and brought DWP to the table. So I do give her credit for that.", "attribution": "-- Reza Akef at 21:47", "link": "https://omny.fm/shows/john-and-ken-on-demand/construction-process-to-rebuild-pacific-palisades-has-been-awful-04-08?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1307"}, {"text": "She's held their feet to the fire every step along the way and made them do what we presented about 2 weeks ago to the community was a 5-year plan for undergrounding in the Palisades.", "attribution": "-- Reza Akef at 21:47", "link": "https://omny.fm/shows/john-and-ken-on-demand/construction-process-to-rebuild-pacific-palisades-has-been-awful-04-08?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1307"}, {"text": "The mayor is working with Lee Zeldin to get the money to the city directly to avoid Gavin's holdup without Gavin being the dam.", "attribution": "-- Reza Akef at 23:07", "link": "https://omny.fm/shows/john-and-ken-on-demand/construction-process-to-rebuild-pacific-palisades-has-been-awful-04-08?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1387"}, {"text": "That was because of the Bass administration. That's because of Mayor Bass, because she explained how the insurer is a state issue.", "attribution": "-- Reza Akef at 23:55", "link": "https://omny.fm/shows/john-and-ken-on-demand/construction-process-to-rebuild-pacific-palisades-has-been-awful-04-08?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1435"}, {"text": "Mayor Bass is trying to do something. She may have whatever, but the fire happened. But she's trying.", "attribution": "-- Reza Akef at 24:17", "link": "https://omny.fm/shows/john-and-ken-on-demand/construction-process-to-rebuild-pacific-palisades-has-been-awful-04-08?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1457"}, {"text": "She's holding people's feet to the fire now. I know it's now, but it's now and it's needed, and it's a system that she's put into place to work.", "attribution": "-- Reza Akef at 34:46", "link": "https://omny.fm/shows/john-and-ken-on-demand/construction-process-to-rebuild-pacific-palisades-has-been-awful-04-08?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=2086"}, {"text": "Our mayor has opened doors for us in the last 6 months and made things happen for our rebuilding of the Palisades and given us access to solve problems that I do appreciate as a builder.", "attribution": "-- Reza Akef at 32:56", "link": "https://omny.fm/shows/john-and-ken-on-demand/construction-process-to-rebuild-pacific-palisades-has-been-awful-04-08?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1976"}], "links": [["Listen to Episode", "https://omny.fm/shows/john-and-ken-on-demand/construction-process-to-rebuild-pacific-palisades-has-been-awful-04-08?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website"], ["Summary", "https://www.dropbox.com/scl/fi/rxv6q4hf4171he0xmmseb/The-John-Kobylt-Show-Construction-Process-To-Rebuild-Pacific-Palisades-Has-Been-Awful-0408-Summary.docx?rlkey=8edq8qb7bj1u4jqkt4urzyayp&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/7hp9hg7mopznwci3b6opf/The-John-Kobylt-Show-Construction-Process-To-Rebuild-Pacific-Palisades-Has-Been-Awful-0408-Transcript.docx?rlkey=556q2mbcx5ou6vq0hj64gm9qg&dl=0"]]},
{"title": "California Has No Plan For Homelessness & Rampant Fraud (04/08)", "show": "The John Kobylt Show", "description": "This episode focuses on widespread fraud and lack of oversight in California government spending, featuring undercover recordings exposing how audits aren't being conducted. Karen Bass is mentioned in the context of homelessness crisis management and her office's responses to people living in underground tunnels.", "date": "April 09, 2026", "tags": ["Karen Bass", "Mentioned", "Podcast"], "sentiment": "Negative", "quotes": [{"text": "Mayor Karen Bass's office told us today that her statement to us Monday about the bridge couple stands for this tunnel encampment as well, saying this is unacceptable and tragic", "attribution": "-- Reporter Makalo Medina at 38:24", "link": "https://omny.fm/shows/john-and-ken-on-demand/california-has-no-plan-for-homelessness-rampant-fraud-04-08?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=2304"}, {"text": "They said because of the mayor's leadership, street homelessness is down nearly 18% after years of growth.", "attribution": "-- Reporter Makalo Medina at 38:24", "link": "https://omny.fm/shows/john-and-ken-on-demand/california-has-no-plan-for-homelessness-rampant-fraud-04-08?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=2304"}, {"text": "Karen Bass has created like this underground city that none of us are aware of.", "attribution": "-- John Kobelt at 38:44", "link": "https://omny.fm/shows/john-and-ken-on-demand/california-has-no-plan-for-homelessness-rampant-fraud-04-08?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=2324"}, {"text": "And then you go to her office and they give you boilerplate fake statistics, and you're supposed— they pat the media on the head and the media wanders away.", "attribution": "-- John Kobelt at 38:44", "link": "https://omny.fm/shows/john-and-ken-on-demand/california-has-no-plan-for-homelessness-rampant-fraud-04-08?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=2324"}], "links": [["Listen to Episode", "https://omny.fm/shows/john-and-ken-on-demand/california-has-no-plan-for-homelessness-rampant-fraud-04-08?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website"], ["Summary", "https://www.dropbox.com/scl/fi/lxp8ba8uk9i5cpo3yu6qm/The-John-Kobylt-Show-California-Has-No-Plan-For-Homelessness-Rampant-Fraud-0408-Summary.docx?rlkey=dib6bc1p6tel3hsuq6msn6txo&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/v3m2lc4cefgxdqv7mlwg0/The-John-Kobylt-Show-California-Has-No-Plan-For-Homelessness-Rampant-Fraud-0408-Transcript.docx?rlkey=9t52u3glsh3skfadjc40hob0u&dl=0"]]},

with-the-people-s-budget--71201386?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1437"}, {"text": "it's amazing that the LA Police Protective League, the fake union that LAPD is a part of, went from spending millions of dollars opposing Karen Bass 3.5 years ago to now supporting her in this cycle", "attribution": "-- Dr. Melina Abdullah at 26:09", "link": "https://www.spreaker.com/episode/now-you-can-say-how-the-city-of-la-should-spend-your-money-with-the-people-s-budget--71201386?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1569"}], "links": [["Listen to Episode", "https://www.spreaker.com/episode/now-you-can-say-how-the-city-of-la-should-spend-your-money-with-the-people-s-budget--71201386?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website"], ["Summary", "https://www.dropbox.com/scl/fi/3wapcod5v3t6mpi7ho70i/First-Things-First-With-Dominique-DiPrima-Now-You-Can-Say-How-the-City-of-LA-Should-Spend-Your-Money-with-The-Peoples-Budget-Summary.docx?rlkey=u36ewik8ltkquw1uqwk3tyk1o&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/7bgriotx0nfyb5ey5lo95/First-Things-First-With-Dominique-DiPrima-Now-You-Can-Say-How-the-City-of-LA-Should-Spend-Your-Money-with-The-Peoples-Budget-Transcript.docx?rlkey=i3bgyagxjoh80ofusjdoiw0kz&dl=0"]]},
{"title": "TURNING POINT TONIGHT, WITH JOBOB, APRIL 8TH, 2026", "show": "Real America’s Voice", "description": "This episode of Turning Point Tonight covers various political topics including NYC's 250th anniversary celebration issues, Iran conflict updates, and California politics. Karen Bass is discussed regarding LA's homeless crisis and the failure rates of her housing programs.", "date": "April 09, 2026", "tags": ["Karen Bass", "Mentioned", "Podcast"], "sentiment": "Negative", "quotes": [{"text": "Bass, the mayor of Los Angeles, says this: On 40% of leaving homeless housing program. Uh, 60% staying is actually a great percentage.", "attribution": "-- Speaker C at 29:54", "link": "https://omny.fm/shows/real-america-s-voice/turning-point-tonight-with-jobob-april-8th-2026?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1794"}, {"text": "The mayor of Los Angeles said this is great. It's a great— this is a great percentage.", "attribution": "-- Speaker C at 30:45", "link": "https://omny.fm/shows/real-america-s-voice/turning-point-tonight-with-jobob-april-8th-2026?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1845"}, {"text": "She acknowledged that the 40% departure rate is concerning, but noted that there's some uncertainty about the whereabouts, which is her thing.", "attribution": "-- Speaker C at 30:52", "link": "https://omny.fm/shows/real-america-s-voice/turning-point-tonight-with-jobob-april-8th-2026?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1852"}], "links": [["Listen to Episode", "https://omny.fm/shows/real-america-s-voice/turning-point-tonight-with-jobob-april-8th-2026?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website"], ["Summary", "https://www.dropbox.com/scl/fi/any7xwvs8e3ce0pmz7gb8/Real-Americas-Voice-TURNING-POINT-TONIGHT-WITH-JOBOB-APRIL-8TH-2026-Summary.docx?rlkey=6kdjx8c7yr29l26nshna7w4oo&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/yh86bbyj9gdvnxy0ss15p/Real-Americas-Voice-TURNING-POINT-TONIGHT-WITH-JOBOB-APRIL-8TH-2026-Transcript.docx?rlkey=qkv519ovzjoka5akokfaab626&dl=0"]]},
{"title": "Mom Ideology w/ Nithya Raman", "show": "Tell Me Something Messy with Brandon Kyle Goodman", "description": "This episode features LA City Council member Nithya Raman discussing her decision to run for mayor against Karen Bass, whom she had previously endorsed. The conversation covers LA politics, housing issues, and Raman's motivation for entering the mayoral race.", "date": "April 09, 2026", "tags": ["Karen Bass", "Mentioned", "Podcast"], "sentiment": "Mixed", "quotes": [{"text": "A few hours before the deadline, you had already endorsed Karen Bass, and then you decided to throw your name into the ring.", "attribution": "-- Brandon Kyle Goodman at 39:23", "link": "https://omny.fm/shows/tell-me-something-messy-with-brandon-kyle-goodman/mom-ideology-w-nithya-raman?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=2363"}, {"text": "When I decided to run for office, I did end up speaking up against people with whom I had built a relationship in City Hall, including Mayor Bass.", "attribution": "-- Nithya Raman at 40:09", "link": "https://omny.fm/shows/tell-me-something-messy-with-brandon-kyle-goodman/mom-ideology-w-nithya-raman?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=2409"}, {"text": "I have a lot of respect for her and what she's done. So it was a very tough moment and a tough decision.", "attribution": "-- Nithya Raman at 40:14", "link": "https://omny.fm/shows/tell-me-something-messy-with-brandon-kyle-goodman/mom-ideology-w-nithya-raman?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=2414"}, {"text": "I'd watched city leadership, the mayor, make bad decisions that had put us in a really bad place in LA.", "attribution": "-- Nithya Raman at 41:15", "link": "https://omny.fm/shows/tell-me-something-messy-with-brandon-kyle-goodman/mom-ideology-w-nithya-raman?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=2475"}], "links": [["Listen to Episode", "https://omny.fm/shows/tell-me-something-messy-with-brandon-kyle-goodman/mom-ideology-w-nithya-raman?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website"], ["Summary", "https://www.dropbox.com/scl/fi/rkydr45qsj5hmoyfzltsu/Tell-Me-Something-Messy-with-Brandon-Kyle-Goodman-Mom-Ideology-w-Nithya-Raman-Summary.docx?rlkey=2gv4t5cauitk3xaxy5mbr1vai&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/5atag5e58awjf6t3k3abn/Tell-Me-Something-Messy-with-Brandon-Kyle-Goodman-Mom-Ideology-w-Nithya-Raman-Transcript.docx?rlkey=53vi5kcrnaqa12vqx7ta477xz&dl=0"]]},
{"title": "Nithya Raman on running for Mayor of Los Angeles", "show": "Here We Go Again With Kal Penn", "description": "This episode features Los Angeles City Council member Nithya Raman as the main guest discussing her run for Mayor of LA. The conversation covers her background as an urban planner, her grassroots campaign that defeated an incumbent, and her progressive policy achievements on homelessness and tenant protections.", "date": "April 08, 2026", "tags": ["Nithya Raman", "Guest Appearance", "Podcast"], "sentiment": "Positive", "quotes": [{"text": "The elected representative for the area that I lived in didn't meet with us, and I got really frustrated, and I knew that there was a lot that the city could do.", "attribution": "-- Nithya Raman at 00:01", "link": "https://omny.fm/shows/here-we-go-again-with-kal-penn/nithya-raman-on-running-for-mayor-of-los-angeles?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1"}, {"text": "I won a tough race against a sitting incumbent. And that hadn't happened in the city of LA for almost two decades before that.", "attribution": "-- Nithya Raman at 11:37", "link": "https://omny.fm/shows/here-we-go-again-with-kal-penn/nithya-raman-on-running-for-mayor-of-los-angeles?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=697"}, {"text": "We actually increased voter turnout in the district 5 times.", "attribution": "-- Nithya Raman at 13:54", "link": "https://omny.fm/shows/here-we-go-again-with-kal-penn/nithya-raman-on-running-for-mayor-of-los-angeles?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=834"}, {"text": "We've passed the largest expansion of tenant protections, of renter protections here in the city of Los Angeles in 40 years.", "attribution": "-- Nithya Raman at 17:13", "link": "https://omny.fm/shows/here-we-go-again-with-kal-penn/nithya-raman-on-running-for-mayor-of-los-angeles?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1033"}, {"text": "I was excited to talk to you for a number of reasons, but especially because you announced your run for mayor.", "attribution": "-- Kal Penn at 01:40", "link": "https://omny.fm/shows/here-we-go-again-with-kal-penn/nithya-raman-on-running-for-mayor-of-los-angeles?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=100"}, {"text": "I actually had the most amount of money ever spent against a sitting incumbent. Spent against me largely by landlords and the police union.", "attribution": "-- Nithya Raman at 19:53", "link": "https://omny.fm/shows/here-we-go-again-with-kal-penn/nithya-raman-on-running-for-mayor-of-los-angeles?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1193"}, {"text": "Someone pissed me off and I thought I can do it better.", "attribution": "-- Nithya Raman at 24:27", "link": "https://omny.fm/shows/here-we-go-again-with-kal-penn/nithya-raman-on-running-for-mayor-of-los-angeles?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1467"}, {"text": "Representing this city has been the privilege. It's been such an incredible privilege to represent the city already.", "attribution": "-- Nithya Raman at 41:42", "link": "https://omny.fm/shows/here-we-go-again-with-kal-penn/nithya-raman-on-running-for-mayor-of-los-angeles?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=2502"}], "links": [["Listen to Episode", "https://omny.fm/shows/here-we-go-again-with-kal-penn/nithya-raman-on-running-for-mayor-of-los-angeles?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website"], ["Summary", "https://www.dropbox.com/scl/fi/o9788je4v9q22zjjklj9x/Here-We-Go-Again-With-Kal-Penn-Nithya-Raman-on-running-for-Mayor-of-Los-Angeles-Summary.docx?rlkey=rsr0v28xtaiyir3c512sg53t4&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/jcbqo4wpupx5um248yput/Here-We-Go-Again-With-Kal-Penn-Nithya-Raman-on-running-for-Mayor-of-Los-Angeles-Transcript.docx?rlkey=7n0to9w1z0o7dw14atxdk9glw&dl=0"]]},

{"title": "Spencer Pratt’s Shock Campaign: “Zero Encampments,” Open Race & Voters Fed Up", "show": "Monks & Merrill", "description": "This episode focuses on Spencer Pratt's mayoral campaign for Los Angeles, with extensive discussion of his policies on homelessness, law enforcement, and city reform. Adam Miller is briefly mentioned as one of the other candidates in the race but does not appear as a guest or receive detailed discussion.", "date": "April 08, 2026", "tags": ["Adam Miller", "Mentioned", "Podcast"], "sentiment": "Neutral", "quotes": [{"text": "He, along with Mayor Bass, Councilwoman Nithya Raman, entrepreneur Adam Miller, leftist activist Ray Huang— they're trying to break through to an electorate where nearly half are unsure of what they want from these guys.", "attribution": "-- Chris Merrill at 26:08", "link": "https://omny.fm/shows/monks-merrill/spencer-pratt-s-shock-campaign-zero-encampments-open-race-voters-fed-up?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1568"}], "links": [["Listen to Episode", "https://omny.fm/shows/monks-merrill/spencer-pratt-s-shock-campaign-zero-encampments-open-race-voters-fed-up?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website"], ["Summary", "https://www.dropbox.com/scl/fi/0k7b7cwx60uce2so2v35x/Monks-Merrill-Spencer-Pratts-Shock-Campaign-Zero-Encampments-Open-Race-Voters-Fed-Up-Summary.docx?rlkey=lmgmje7yt6jgnn9qixycogkgg&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/bew1aq2r01zg2swcgo9dy/Monks-Merrill-Spencer-Pratts-Shock-Campaign-Zero-Encampments-Open-Race-Voters-Fed-Up-Transcript.docx?rlkey=4k89ecjwgov2srg8z5saq9gnv&dl=0"]]},
{"title": "Spencer Pratt Fires Back: Wildfire Fallout, Mayoral Run & Media Showdown", "show": "Monks & Merrill", "description": "Spencer Pratt appears as a guest to defend his mayoral candidacy after an LA Times article questioned his residency eligibility following the loss of his Palisades home in wildfires. He discusses his campaign platform and criticizes current LA leadership.", "date": "April 08, 2026", "tags": ["Spencer Pratt", "Guest Appearance", "Podcast"], "sentiment": "Positive", "quotes": [{"text": "Spencer Pratt was not happy about this article even before the article dropped.", "attribution": "-- Michael Monks at 06:35", "link": "https://omny.fm/shows/monks-merrill/spencer-pratt-fires-back-wildfire-fallout-mayoral-run-media-showdown?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=395"}, {"text": "My house burned down. You guys left my entire neighborhood burned down, remember?", "attribution": "-- Spencer Pratt at 13:33", "link": "https://omny.fm/shows/monks-merrill/spencer-pratt-fires-back-wildfire-fallout-mayoral-run-media-showdown?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=813"}, {"text": "Spencer Pratt is running for mayor and I think he can win. Yes, he's actually good.", "attribution": "-- Joe Rogan (in video) at 13:11", "link": "https://omny.fm/shows/monks-merrill/spencer-pratt-fires-back-wildfire-fallout-mayoral-run-media-showdown?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=791"}, {"text": "I am the candidate for change. I am the only one that speaks about common sense.", "attribution": "-- Spencer Pratt at 18:06", "link": "https://omny.fm/shows/monks-merrill/spencer-pratt-fires-back-wildfire-fallout-mayoral-run-media-showdown?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1086"}, {"text": "Recent polls have him in second place.", "attribution": "-- Michael Monks at 25:19", "link": "https://omny.fm/shows/monks-merrill/spencer-pratt-fires-back-wildfire-fallout-mayoral-run-media-showdown?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1519"}, {"text": "The Getty House will be filled with single mothers and their children, because clearly housing is an issue.", "attribution": "-- Spencer Pratt at 25:19", "link": "https://omny.fm/shows/monks-merrill/spencer-pratt-fires-back-wildfire-fallout-mayoral-run-media-showdown?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1519"}, {"text": "As mayor, I will live on my dirt lot because it will remind me what started this journey.", "attribution": "-- Spencer Pratt at 26:07", "link": "https://omny.fm/shows/monks-merrill/spencer-pratt-fires-back-wildfire-fallout-mayoral-run-media-showdown?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1567"}, {"text": "I'm coming in as an outsider to rock their system and get it back on track.", "attribution": "-- Spencer Pratt at 30:41", "link": "https://omny.fm/shows/monks-merrill/spencer-pratt-fires-back-wildfire-fallout-mayoral-run-media-showdown?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1841"}], "links": [["Listen to Episode", "https://omny.fm/shows/monks-merrill/spencer-pratt-fires-back-wildfire-fallout-mayoral-run-media-showdown?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website"], ["Summary", "https://www.dropbox.com/scl/fi/cob6jsjc1b1si26lmvufz/Monks-Merrill-Spencer-Pratt-Fires-Back-Wildfire-Fallout-Mayoral-Run-Media-Showdown-Summary.docx?rlkey=2d6g4qwmr76g4b06ue3b7b61d&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/t9falyckztwz4o811963x/Monks-Merrill-Spencer-Pratt-Fires-Back-Wildfire-Fallout-Mayoral-Run-Media-Showdown-Transcript.docx?rlkey=megrs9tfn5moc7kennlvkjyu8&dl=0"]]},
{"title": "Breaking Down the L.A. Mayor’s Race", "show": "Political Breakdown", "description": "This episode analyzes the 2026 Los Angeles mayoral race where incumbent Karen Bass faces challenges from several candidates, including Spencer Pratt, a former reality TV star whose house burned in the Palisades fires. The discussion covers how Pratt has positioned himself as the anti-Bass candidate focused on fire response criticism.", "date": "April 08, 2026", "tags": ["Spencer Pratt", "Mentioned", "Podcast"], "sentiment": "Neutral", "quotes": [{"text": "Spencer Pratt was a reality TV— we've been saying star. I hope that's accurate.", "attribution": "-- Noah Goldberg at 04:09", "link": "https://next.kqed.org/news/12078978?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=249"}, {"text": "Spencer Pratt has filled that gap and has really become the Palisades fire thorn in Karen Bass's side.", "attribution": "-- Noah Goldberg at 05:30", "link": "https://next.kqed.org/news/12078978?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=330"}, {"text": "He is making sure that the fire is top of mind at all times.", "attribution": "-- Noah Goldberg at 05:45", "link": "https://next.kqed.org/news/12078978?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=345"}, {"text": "Pratt is a registered Republican. He has gotten a lot of support online, at least from Trump supporters and the Trump camp.", "attribution": "-- Noah Goldberg at 05:50", "link": "https://next.kqed.org/news/12078978?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=350"}, {"text": "Pratt has come in second in more than one poll.", "attribution": "-- Noah Goldberg at 08:05", "link": "https://next.kqed.org/news/12078978?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=485"}, {"text": "He's referred to homeless people as like drug zombies.", "attribution": "-- Noah Goldberg at 24:45", "link": "https://next.kqed.org/news/12078978?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1485"}, {"text": "It took him months into his campaign to start wearing pants. He's wearing shorts.", "attribution": "-- Noah Goldberg at 23:30", "link": "https://next.kqed.org/news/12078978?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1410"}, {"text": "Pratt and Bass both didn't show up.", "attribution": "-- Noah Goldberg at 25:29", "link": "https://next.kqed.org/news/12078978?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1529"}], "links": [["Listen to Episode", "https://next.kqed.org/news/12078978?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website"], ["Summary", "https://www.dropbox.com/scl/fi/040ie4fbrxpyvjrd6thpi/Political-Breakdown-Breaking-Down-the-LA-Mayors-Race-Summary.docx?rlkey=6ll2n2wiume4jpz1rm8mmd42h&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/s4bcpkpy3b69jexkefq2b/Political-Breakdown-Breaking-Down-the-LA-Mayors-Race-Transcript.docx?rlkey=axd2c8hzvcou6rls20ughb49i&dl=0"]]},
{"title": "Did Trump Just do California a Big Favor? It Looks That Way.", "show": "First Things First With Dominique DiPrima", "description": "This episode of 'First Things First' covers California politics including the governor's race and LA mayoral race. Spencer Pratt is discussed as a MAGA reality TV candidate for LA mayor whose eligibility is questioned after he moved to Santa Barbara following the Palisades fire.", "date": "April 08, 2026", "tags": ["Spencer Pratt", "Mentioned", "Podcast"], "sentiment": "Neutral", "quotes": [{"text": "It seems that the reality TV guy, who is the MAGA guy who also lost his home in the fire, Spencer Pratt is his name. He's running for mayor.", "attribution": "-- Dominique DiPrima at 28:45", "link": "https://www.spreaker.com/episode/did-trump-just-do-california-a-big-favor-it-looks-that-way--71173286?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1725"}, {"text": "He has said that he lived in Santa Barbara for a while after his house in the Palisades burned to the ground.", "attribution": "-- Dominique DiPrima at 29:15", "link": "https://www.spreaker.com/episode/did-trump-just-do-california-a-big-favor-it-looks-that-way--71173286?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1755"}, {"text": "It may mean that he's not eligible to run for mayor. So that would be— that's why I say would be a game changer, because he's been moving up in the polls.", "attribution": "-- Dominique DiPrima at 29:30", "link": "https://www.spreaker.com/episode/did-trump-just-do-california-a-big-favor-it-looks-that-way--71173286?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1770"}, {"text": "I think it's because of the empathy around him losing his home in the Palisades fire, but also he's famous. He's a reality TV guy.", "attribution": "-- Dominique DiPrima at 29:45", "link": "https://www.spreaker.com/episode/did-trump-just-do-california-a-big-favor-it-looks-that-way--71173286?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1785"}, {"text": "LA Times says he didn't respond to their inquiries about his residency.", "attribution": "-- Dominique DiPrima at 30:30", "link": "https://www.spreaker.com/episode/did-trump-just-do-california-a-big-favor-it-looks-that-way--71173286?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1830"}, {"text": "He posted a video Yesterday on X saying that he had been living at his father's house in Carpinteria after the fires, which is near Santa Barbara.", "attribution": "-- Dominique DiPrima at 30:45", "link": "https://www.spreaker.com/episode/did-trump-just-do-california-a-big-favor-it-looks-that-way--71173286?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1845"}, {"text": "His argument, that his burned-out lot is still his legal residence. And that he moved into a trailer in the Palisades on the lot.", "attribution": "-- Dominique DiPrima at 31:15", "link": "https://www.spreaker.com/episode/did-trump-just-do-california-a-big-favor-it-looks-that-way--71173286?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1875"}, {"text": "It would certainly upend the race, and I'm not sure who that benefits.", "attribution": "-- Dominique DiPrima at 32:00", "link": "https://www.spreaker.com/episode/did-trump-just-do-california-a-big-favor-it-looks-that-way--71173286?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1920"}], "links": [["Listen to Episode", "https://www.spreaker.com/episode/did-trump-just-do-california-a-big-favor-it-looks-that-way--71173286?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website"], ["Summary", "https://www.dropbox.com/scl/fi/9fv6eidjnmimm57zc7xb6/First-Things-First-With-Dominique-DiPrima-Did-Trump-Just-do-California-a-Big-Favor-It-Looks-That-Way-Summary.docx?rlkey=z8eyxqwric2l2a9cxtnyh0vl0&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/9m7x17f97ueir34r8fijb/First-Things-First-With-Dominique-DiPrima-Did-Trump-Just-do-California-a-Big-Favor-It-Looks-That-Way-Transcript.docx?rlkey=sd8p2ywqe9fpwxkysdh66wh6p&dl=0"]]},
{"title": "Buying LA2028 Tickets? Get ready for a sticker shock", "show": "790 KABC", "description": "This is a news commentary show discussing LA 2028 Olympics ticket prices and various California issues. Karen Bass is mentioned in relation to her Inside Safe homelessness program's failures and potential re-election.", "date": "April 08, 2026", "tags": ["Karen Bass", "Mentioned", "Podcast"], "sentiment": "Negative", "quotes": [{"text": "40% of the people in Karen Bass's Inside Safe went back to the streets.", "attribution": "-- Randy Wang at 11:45", "link": "https://omny.fm/shows/the-kabc-news-blitz/buying-la2028-tickets-get-ready-for-a-sticker-shock?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=705"}, {"text": "If we give Karen Bass another 4 years, it's going to be another 4 years of this failed policy.", "attribution": "-- Randy Wang at 12:15", "link": "https://omny.fm/shows/the-kabc-news-blitz/buying-la2028-tickets-get-ready-for-a-sticker-shock?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=735"}, {"text": "when Karen Bass does Project Inside Safe, it's not city employees that are being tasked to take care of the homeless", "attribution": "-- Randy Wang at 18:30", "link": "https://omny.fm/shows/the-kabc-news-blitz/buying-la2028-tickets-get-ready-for-a-sticker-shock?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1110"}], "links": [["Listen to Episode", "https://omny.fm/shows/the-kabc-news-blitz/buying-la2028-tickets-get-ready-for-a-sticker-shock?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website"], ["Summary", "https://www.dropbox.com/scl/fi/5o4qo4y7roq4imzwube05/790-KABC-Buying-LA2028-Tickets-Get-ready-for-a-sticker-shock-Summary.docx?rlkey=3oiw89522nzsritcpekhx6f8m&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/bsbjjvlpdr6i55g35pix6/790-KABC-Buying-LA2028-Tickets-Get-ready-for-a-sticker-shock-Transcript.docx?rlkey=2znqlle34tdb0htcj5ww4j3g5&dl=0"]]},
{"title": "CA's Homeless Programs Are Failures (04/07)", "show": "The John Kobylt Show", "description": "The episode heavily criticizes LA Mayor Karen Bass's homeless policies, particularly her Inside Safe program which spent $300 million but saw 40% of participants return to the streets. Host John Kobylt and guest Tom Wolfe (a former homeless person and addiction recovery advocate) argue that Bass's 'housing first' approach fails because it doesn't treat underlying addiction and mental illness issues.", "date": "April 08, 2026", "tags": ["Karen Bass", "Mentioned", "Podcast"], "sentiment": "Negative", "quotes": [{"text": "Karen Bass allowed his home to burn down along with everybody else's.", "attribution": "-- John Kobylt at 01:25", "link": "https://omny.fm/shows/john-and-ken-on-demand/cas-homeless-programs-are-failures-04-07?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=85"}, {"text": "Karen Bass won't release permits for most people.", "attribution": "-- John Kobylt at 01:30", "link": "https://omny.fm/shows/john-and-ken-on-demand/cas-homeless-programs-are-failures-04-07?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=90"}, {"text": "Karen Bass hasn't done anything about the insurance companies bottling up the payments to their clients.", "attribution": "-- John Kobylt at 01:35", "link": "https://omny.fm/shows/john-and-ken-on-demand/cas-homeless-programs-are-failures-04-07?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=95"}, {"text": "Here in LA, Karen Bass is proving it. Found out yesterday that 40% of the homeless people in her Inside Safe program are already back out on the streets.", "attribution": "-- John Kobylt at 02:45", "link": "https://omny.fm/shows/john-and-ken-on-demand/cas-homeless-programs-are-failures-04-07?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=165"}, {"text": "Karen Bass's Inside Safe program, they've spent $300 million to house 1,200 people. 40% of them have left that housing within a year, and another 10% have died of drug overdose.", "attribution": "-- Tom Wolfe at 06:15", "link": "https://omny.fm/shows/john-and-ken-on-demand/cas-homeless-programs-are-failures-04-07?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=375"}, {"text": "I don't know if Karen Bass thinks that's an upgrade.", "attribution": "-- John Kobylt at 10:45", "link": "https://omny.fm/shows/john-and-ken-on-demand/cas-homeless-programs-are-failures-04-07?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=645"}, {"text": "This is an Eric Garcetti, Karen Bass era problem.", "attribution": "-- John Kobylt at 26:30", "link": "https://omny.fm/shows/john-and-ken-on-demand/cas-homeless-programs-are-failures-04-07?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1590"}, {"text": "The only one left connected to LAHSA, the only one who believes in it apparently, is Karen Bass.", "attribution": "-- John Kobylt at 30:45", "link": "https://omny.fm/shows/john-and-ken-on-demand/cas-homeless-programs-are-failures-04-07?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1845"}], "links": [["Listen to Episode", "https://omny.fm/shows/john-and-ken-on-demand/cas-homeless-programs-are-failures-04-07?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website"], ["Summary", "https://www.dropbox.com/scl/fi/vlsw9a8pfh5uyhu9sil1y/The-John-Kobylt-Show-CAs-Homeless-Programs-Are-Failures-0407-Summary.docx?rlkey=p1xgginlxtred6plaf3rqipev&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/ikr2xv5jin9x4y2wmny1g/The-John-Kobylt-Show-CAs-Homeless-Programs-Are-Failures-0407-Transcript.docx?rlkey=8kz8zc45nh0oo96eezwf6lalt&dl=0"]]},
{"title": "LA Times Goes After Spencer Pratt (04/07)", "show": "The John Kobylt Show", "description": "This episode focuses on defending Spencer Pratt against what the host calls a 'smear' by the LA Times regarding his eligibility to run for mayor against Karen Bass. The show also criticizes Karen Bass's Inside Safe program as a $300 million failure.", "date": "April 08, 2026", "tags": ["Karen Bass", "Mentioned", "Podcast"], "sentiment": "Negative", "quotes": [{"text": "Spencer Pratt, who's the number 2 candidate for mayor behind Karen Bass", "attribution": "-- Speaker A at 04:24", "link": "https://omny.fm/shows/john-and-ken-on-demand/la-times-goes-after-spencer-pratt-04-07?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=264"}, {"text": "claiming that Pratt doesn't live in Los Angeles, therefore is not eligible to run for mayor because Bass allowed his house to burn down", "attribution": "-- Speaker A at 04:32", "link": "https://omny.fm/shows/john-and-ken-on-demand/la-times-goes-after-spencer-pratt-04-07?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=272"}, {"text": "the reason why Spencer Pratt and thousands of people who lived in the Palisades who lost their home haven't been able to go back is because Karen Bass and Nithya Raman control enormous influence over the rebuilding process", "attribution": "-- Speaker D at 09:00", "link": "https://omny.fm/shows/john-and-ken-on-demand/la-times-goes-after-spencer-pratt-04-07?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=540"}, {"text": "we found out that Karen Bass has blown $300 million on the failed Inside Safe program", "attribution": "-- Speaker A at 29:02", "link": "https://omny.fm/shows/john-and-ken-on-demand/la-times-goes-after-spencer-pratt-04-07?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1742"}, {"text": "40%, at the moment, 40% of the people she stuffed into the motels are back out on the streets", "attribution": "-- Speaker A at 29:10", "link": "https://omny.fm/shows/john-and-ken-on-demand/la-times-goes-after-spencer-pratt-04-07?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1750"}], "links": [["Listen to Episode", "https://omny.fm/shows/john-and-ken-on-demand/la-times-goes-after-spencer-pratt-04-07?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website"], ["Summary", "https://www.dropbox.com/scl/fi/n9vpvxd3vjaqg8sp97ldd/The-John-Kobylt-Show-LA-Times-Goes-After-Spencer-Pratt-0407-Summary.docx?rlkey=xoyf6ag2tcis8nziuo3vws4dt&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/qhc3po7kj8i0lt7ydz4bs/The-John-Kobylt-Show-LA-Times-Goes-After-Spencer-Pratt-0407-Transcript.docx?rlkey=l1ahuxcdfweqk31fz5zpm6n53&dl=0"]]},

{"title":"I Heard It Through The K Line","show":"LA Podcast","description":"Hosts Scott Frazier, Mike Bonin, and Godfrey Plata examine Metroâs approval of the K Line northern extension connecting Hollywood Bowl, West Hollywood, Cedars-Sinai, and the Grove by 2040. They also analyze conflicting mayoral polls showing Karen Bass with historically soft support for an incumbent, while Nithya Raman leads in one poll and trails in another, and discuss the Bass campaignâs strategy of elevating Spencer Pratt as their preferred runoff opponent.","date":"April 07, 2026","tags":["Karen Bass","Nithya Raman","Mentioned","Podcast"],"sentiment":"Negative","quotes":[{"text":"She put out a statement that was designed to calm people and freaked people the hell out.","attribution":"-- Mike Bonin at 21:18","link":"https://podcasts.apple.com/us/podcast/i-heard-it-through-the-k-line/id1365234191?i=1000759513453"},{"text":"Nithya Raman was almost a 2-to-1 lead over the mayor, 32.5% to the mayorâs 17%.","attribution":"-- Mike Bonin at 32:13","link":"https://podcasts.apple.com/us/podcast/i-heard-it-through-the-k-line/id1365234191?i=1000759513453"},{"text":"Mayor Bassâs actual support might be something like 22 to 24%. Thatâs terrible.","attribution":"-- Scott Frazier at 39:18","link":"https://podcasts.apple.com/us/podcast/i-heard-it-through-the-k-line/id1365234191?i=1000759513453"},{"text":"They will do anything to distract from Raman, Huang, Miller, these other folks who are building campaigns.","attribution":"-- Godfrey Plata at 42:12","link":"https://podcasts.apple.com/us/podcast/i-heard-it-through-the-k-line/id1365234191?i=1000759513453"},{"text":"Supervisor Horvath has been needling Karen Bass for months now in very public ways.","attribution":"-- Scott Frazier at 30:51","link":"https://podcasts.apple.com/us/podcast/i-heard-it-through-the-k-line/id1365234191?i=1000759513453"}],"links":[["Listen on Apple Podcasts","https://podcasts.apple.com/us/podcast/i-heard-it-through-the-k-line/id1365234191?i=1000759513453"],["Listen on Spotify","https://open.spotify.com/episode/13PuCAGWt35czRP7XYMGm8?si=EVB6t-dOStutOXw-LzGBew"],["Dropbox upload skipped - token expired","#"]]},
{"title": "&#39;ANGRY TAXPAYER&#39;: Spencer Pratt BLASTS LA mayor for &#39;absolutely zero&#39; action", "show": "Fox Business", "description": "Spencer Pratt, former reality TV star from The Hills, appears as a guest to discuss his mayoral campaign to unseat LA's current mayor Karen Bass. He positions himself as an angry taxpayer focused on enforcing existing laws to address homelessness, crime, and city management issues.", "date": "April 07, 2026", "tags": ["Spencer Pratt", "Guest Appearance", "Video"], "sentiment": "Positive", "quotes": [{"text": "I'm an angry taxpayer that wants L.A. to get fixed.", "attribution": "-- Spencer Pratt at 07:26", "link": "https://www.youtube.com/watch?v=z4mM21hmVvk&t=446"}, {"text": "I didn't have a choice to run for mayor. We cannot have 4 more years of this person, Karen Bass.", "attribution": "-- Spencer Pratt at 01:36", "link": "https://www.youtube.com/watch?v=z4mM21hmVvk&t=96"}, {"text": "Spencer Pratt, great to see you. Thank you so much for being here, and congratulations on this race.", "attribution": "-- Host at 00:35", "link": "https://www.youtube.com/watch?v=z4mM21hmVvk&t=35"}, {"text": "All they do is they shake my hand and they say, thank you for having common sense.", "attribution": "-- Spencer Pratt at 04:32", "link": "https://www.youtube.com/watch?v=z4mM21hmVvk&t=272"}, {"text": "Karen Bass has done nothing, period. Nothing. Absolutely zero.", "attribution": "-- Spencer Pratt at 07:33", "link": "https://www.youtube.com/watch?v=z4mM21hmVvk&t=453"}, {"text": "Some of the most powerful people in Hollywood have reached out in support of my campaign.", "attribution": "-- Spencer Pratt at 09:01", "link": "https://www.youtube.com/watch?v=z4mM21hmVvk&t=541"}, {"text": "You were a former reality TV star, starring role on MTV's The Hills, and you're adding to a long line of actors turned politicians.", "attribution": "-- Host at 05:39", "link": "https://www.youtube.com/watch?v=z4mM21hmVvk&t=339"}, {"text": "There's a reason {"title": "Spencer Pratt speaks about his Los Angeles mayoral run, answers questions on his residency", "show": "CBS LA", "description": "Spencer Pratt appears on CBS LA to defend his Los Angeles mayoral candidacy after the LA Times questioned his residency following the Palisades fires. He discusses his platform and responds to criticism while promoting his campaign.", "date": "April 07, 2026", "tags": ["Spencer Pratt", "Guest Appearance", "Video"], "sentiment": "Mixed", "quotes": [{"text": "They want to attack me for not living in the Palisades while running for mayor? Hey, brain surgeon, my house burned down.", "attribution": "-- Spencer Pratt at 00:00", "link": ""}, {"text": "I find it ironic that the L.A. Times is in El Segundo for the last 8 years and they're not called the El Segundo Times.", "attribution": "-- Spencer Pratt at 00:46", "link": "https://www.youtube.com/watch?v=uoXdcR3WcOs&t=46"}, {"text": "In the UCLA polls, they have me in the lead behind Karen Bass.", "attribution": "-- Spencer Pratt at 01:20", "link": "https://www.youtube.com/watch?v=uoXdcR3WcOs&t=80"}, {"text": "12 of my neighbors burned alive due to the negligence of our city leaders and Karen Bass, who was in Ghana knowing this wind-red weather event was coming.", "attribution": "-- Spencer Pratt at 02:40", "link": "https://www.youtube.com/watch?v=uoXdcR3WcOs&t=160"}, {"text": "I'm not a reality TV star. I'm a father with two sons that I want to be able to come back to Los Angeles and grow up in the city I loved.", "attribution": "-- Spencer Pratt at 06:32", "link": "https://www.youtube.com/watch?v=uoXdcR3WcOs&t=392"}, {"text": "The reason she can't come up here and tell you she's gonna do anything is 'cause she's on the city council right now.", "attribution": "-- Spencer Pratt at 06:50", "link": "https://www.youtube.com/watch?v=uoXdcR3WcOs&t=410"}, {"text": "Obviously, it took my house burning down, my parents' house burning down, my neighbors burning alive for me to get in this fight y.fm/shows/john-and-ken-on-demand/pres-trump-endorse-steve-hilton-for-ca-governor-04-06?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1615"}, {"text": "Bass is running a campaign to get reelected as mayor of Los Angeles, and shockingly She's running on change.", "attribution": "-- John Kobylt at 36:43", "link": "https://omny.fm/shows/john-and-ken-on-demand/pres-trump-endorse-steve-hilton-for-ca-governor-04-06?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=2203"}, {"text": "You defunded the fire department and you haven't refunded it.", "attribution": "-- John Kobylt at 39:15", "link": "https://omny.fm/shows/john-and-ken-on-demand/pres-trump-endorse-steve-hilton-for-ca-governor-04-06?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=2355"}, {"text": "Could you run for reelection after allowing a big chunk of the city to burn?", "attribution": "-- John Kobylt at 40:28", "link": "https://omny.fm/shows/john-and-ken-on-demand/pres-trump-endorse-steve-hilton-for-ca-governor-04-06?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=2428"}], "links": [["Listen to Episode", "https://omny.fm/shows/john-and-ken-on-demand/pres-trump-endorse-steve-hilton-for-ca-governor-04-06?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website"], ["Summary", "https://www.dropbox.com/scl/fi/zz6teocpc6cma89eugjsm/The-John-Kobylt-Show-Pres-Trump-Endorsed-Steve-Hilton-For-CA-Governor-0406-Summary.docx?rlkey=dxr8ds5cea96k99yz952ryegq&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/1xpaylrocch3vpsvvas8z/The-John-Kobylt-Show-Pres-Trump-Endorsed-Steve-Hilton-For-CA-Governor-0406-Transcript.docx?rlkey=jujhbheatv2swyxoshpvl44m3&dl=0"]]},

een a way to fire her. She's so incompetent, she's in over her head.", "attribution": "-- John Kobylt at 28:50", "link": "https://omny.fm/shows/john-and-ken-on-demand/inside-safe-has-been-a-failure-04-06?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1730"}], "links": [["Listen to Episode", "https://omny.fm/shows/john-and-ken-on-demand/inside-safe-has-been-a-failure-04-06?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website"], ["Summary", "https://www.dropbox.com/scl/fi/o9315kkm0uol64kj0znq4/The-John-Kobylt-Show-Inside-Safe-Has-Been-A-Failure-0406-Summary.docx?rlkey=yv4xv0i2mag7akf8pao2wsr0e&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/t548zykmymd1m04zxrqtv/The-John-Kobylt-Show-Inside-Safe-Has-Been-A-Failure-0406-Transcript.docx?rlkey=syrrpwf9q8fo8e5khbdp30ngl&dl=0"]]},
