<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PYT Radar</title>
    <link rel="alternate" type="application/rss+xml" title="PYT Radar RSS Feed" href="https://ericspiegelman.github.io/pyt-radar/feed.xml">
    <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; color: #e0e0e0; line-height: 1.6; }
    .container { max-width: 800px; margin: 0 auto; padding: 2rem; }
    header { border-bottom: 1px solid #333; padding-bottom: 1.5rem; margin-bottom: 2rem; }
    h1 { font-size: 2rem; color: #fff; letter-spacing: -0.02em; }
    h1 span { color: #4ade80; }
    .subtitle { color: #888; font-size: 0.95rem; margin-top: 0.25rem; }
    .subscribe { margin-top: 0.75rem; }
    .subscribe a { color: #4ade80; text-decoration: none; font-size: 0.9rem; border: 1px solid #333; padding: 0.3rem 0.75rem; border-radius: 4px; }
    .subscribe a:hover { background: #1a2e1a; }
    .subscribe a + a { margin-left: 0.5rem; }
    .digest { background: #111; border: 1px solid #222; border-radius: 8px; padding: 1.5rem; margin-bottom: 1.5rem; }
    .digest-date { color: #4ade80; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
    .digest h2 { font-size: 1.25rem; color: #fff; margin: 0.5rem 0; }
    .digest .show { color: #888; font-size: 0.9rem; }
    .digest .summary { margin-top: 0.75rem; color: #bbb; }
    .digest .links { margin-top: 1rem; }
    .digest .links a { color: #4ade80; text-decoration: none; margin-right: 1rem; font-size: 0.9rem; }
    .digest .links a:hover { text-decoration: underline; }
    .tag { display: inline-block; background: #1a2e1a; color: #4ade80; padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.8rem; margin-right: 0.5rem; }
    .sentiment { margin-top: 0.5rem; font-size: 0.9rem; }
    .sentiment-negative { color: #f87171; }
    .quote { border-left: 2px solid #333; padding-left: 1rem; margin: 0.75rem 0; color: #999; font-style: italic; }
    .targets { color: #666; font-size: 0.85rem; margin-top: 0.5rem; }
    .empty { color: #555; text-align: center; padding: 3rem 0; font-size: 0.95rem; }
    </style>
</head>
<body>
    <div class="container">
    <header>
        <h1><span>PYT</span> Radar</h1>
        <p class="subtitle">Podcast &amp; YouTube Tracking &mdash; automated episode digest</p>
        <p class="targets">Tracking: Karen Bass (guest) &middot; Nithya Raman (topic)</p>
        <p class="subscribe"><a href="https://blogtrottr.com/?subscribe=https://ericspiegelman.github.io/pyt-radar/feed.xml">&#9993; Subscribe via email</a> <a href="https://ericspiegelman.github.io/pyt-radar/feed.xml">&#128226; RSS feed</a></p>
    </header>
    <main id="digests">
    <p class="empty">No episodes found yet. PYT Radar scans twice daily at 8am and 6pm.</p>
    </main>
    </div>
</body>
</html>
