{"title": "The Dystopian Future the \"No Kings\" Protestors Really Want | Guest Host: Nick Freitas", "show": "3 Martini Lunch – Political Humor & Commentary", "description": "This episode discusses the LA wildfires response and upcoming mayoral race, with hosts criticizing Mayor Karen Bass's handling of the crisis and her communist connections. Karen Bass is mentioned as a target of criticism regarding her disaster response and past trips to Cuba.", "date": "March 30, 2026", "tags": ["Karen Bass", "Guest Appearance", "Podcast"], "sentiment": "Negative", "quotes": [{"text": "Karen Bass, of course, could not have handled the LA wildfires worse at the beginning of last year.", "attribution": "-- Speaker A at 06:25", "link": "https://www.spreaker.com/episode/the-dystopian-future-the-no-kings-protestors-really-want-guest-host-nick-freitas--71003963?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=385"}, {"text": "I think Karen Bass has everything it takes to handle those fires even worse than she did before.", "attribution": "-- Speaker B at 06:32", "link": "https://www.spreaker.com/episode/the-dystopian-future-the-no-kings-protestors-really-want-guest-host-nick-freitas--71003963?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=392"}, {"text": "If we look at what Karen Bass was doing 20 years ago, she was in Cuba learning how to make bombs with the people that would then go bomb Capitol Hill.", "attribution": "-- Spencer Pratt at 07:48", "link": "https://www.spreaker.com/episode/the-dystopian-future-the-no-kings-protestors-really-want-guest-host-nick-freitas--71003963?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=468"}, {"text": "When I look at Karen Bass, I'm baffled at how she's the mayor of anything.", "attribution": "-- Speaker B at 10:18", "link": "https://www.spreaker.com/episode/the-dystopian-future-the-no-kings-protestors-really-want-guest-host-nick-freitas--71003963?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=618"}, {"text": "You just know at some point she was putting together the bomb in Havana and it blew up when it wasn't supposed to.", "attribution": "-- Speaker B at 10:18", "link": "https://www.spreaker.com/episode/the-dystopian-future-the-no-kings-protestors-really-want-guest-host-nick-freitas--71003963?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=618"}, {"text": "I think she can and has achieved far more devastation than she could as an armed revolutionary.", "attribution": "-- Speaker B at 10:18", "link": "https://www.spreaker.com/episode/the-dystopian-future-the-no-kings-protestors-really-want-guest-host-nick-freitas--71003963?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=618"}, {"text": "She was on Joe Biden's shortlist. Kamala Harris was up against Karen Bass and Susan Rice.", "attribution": "-- Speaker A at 10:27", "link": "https://www.spreaker.com/episode/the-dystopian-future-the-no-kings-protestors-really-want-guest-host-nick-freitas--71003963?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=627"}, {"text": "He was going for a certain thing—incoherent female politician. And he found one. It just wasn't Karen Bass this time around.", "attribution": "-- Speaker B at 11:03", "link": "https://www.spreaker.com/episode/the-dystopian-future-the-no-kings-protestors-really-want-guest-host-nick-freitas--71003963?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=663"}], "links": [["Listen to Episode", "https://www.spreaker.com/episode/the-dystopian-future-the-no-kings-protestors-really-want-guest-host-nick-freitas--71003963?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website"], ["Summary", "https://www.dropbox.com/scl/fi/9s7webwpoy03nbtotbuf8/3-Martini-Lunch-Political-Humor-Commentary-The-Dystopian-Future-the-No-Kings-Protestors-Really-Want-Guest-Host-Nick-Freitas-Summary.docx?rlkey=4rxlp2 {"title": "Departure of Water and Power", "show": "LA Podcast", "description": "This episode of LA Podcast discusses the departure of Los Angeles Department of Water and Power CEO Janice Quinones and various climate policy issues in LA. Karen Bass is mentioned throughout as the mayor who appointed Quinones and is criticized for her climate priorities and handling of fire-related issues.", "date": "March 30, 2026", "tags": ["Karen Bass", "Guest Appearance", "Podcast"], "sentiment": "Negative", "quotes": [{"text": "That was not a dig at Karen Bass, by the way.", "attribution": "-- Speaker C at 02:21", "link": "https://www.thinkforward.la/la-podcast/?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=141"}, {"text": "Was Karen Bass going to appoint someone who was really committed to this? Was Karen Bass even committed to it?", "attribution": "-- Speaker C at 04:42", "link": "https://www.thinkforward.la/la-podcast/?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=282"}, {"text": "Bass removed her from the AQMD board, or said she was going to remove her from the AQMD board and appoint her own council.", "attribution": "-- Speaker C at 31:47", "link": "https://www.thinkforward.la/la-podcast/?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1907"}, {"text": "The thing about Bass with climate... it seemed pretty obvious that like climate was just not a priority for her.", "attribution": "-- Speaker C at 34:34", "link": "https://www.thinkforward.la/la-podcast/?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=2074"}, {"text": "When I first interviewed her when she was running for mayor... she made the comment of, well, this is really a problem in cities like Chicago, but it's not such a big problem in Los Angeles.", "attribution": "-- Speaker C at 35:35", "link": "https://www.thinkforward.la/la-podcast/?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=2135"}, {"text": "She wanted to save $700,000 by shutting the city's climate emergency mobilization office.", "attribution": "-- Speaker C at 36:05", "link": "https://www.thinkforward.la/la-podcast/?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=2165"}, {"text": "Her immediate response to the fire being undo the all-electric building ordinance.", "attribution": "-- Speaker C at 37:13", "link": "https://www.thinkforward.la/la-podcast/?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=2233"}, {"text": "The mayor did not attend, by the way... the fact that she didn't attend, I think, was kind of indicative of maybe her— the way that she thinks about these issues.", "attribution": "-- Speaker A at 27:31", "link": "https://www.thinkforward.la/la-podcast/?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1651"}], "links": [["Listen to Episode", "https://www.thinkforward.la/la-podcast/?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website"], ["Summary", "https://www.dropbox.com/scl/fi/lqi7rt2yqsawu4yk4iihc/LA-Podcast-Departure-of-Water-and-Power-Summary.docx?rlkey=6j1x0flrhu5a4i78qjislod27&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/wgwvvj9bg64a9j9khr7xv/LA-Podcast-Departure-of-Water-and-Power-Transcript.docx?rlkey=mq10dek209bllt0l1zut4cvzq&dl=0"]]},

{"title": "Bachelor Nation Bombshell & Spencer Pratt’s Mayoral Buzz + Ren Faire Preview", "show": "KFI Live with Heather Brooker", "description": "This episode discusses Spencer Pratt's campaign for Los Angeles mayor, with host Heather Brooker and reality TV expert Kate Casey analyzing his chances and qualifications. Pratt is mentioned as polling in third place behind current Mayor Bass and Nithya Raman.", "date": "March 29, 2026", "tags": ["Spencer Pratt", "Guest Appearance", "Podcast"], "sentiment": "Mixed", "quotes": [{"text": "Reality TV star Spencer Pratt is polling in third place in a lot of the polls behind Nithya Raman and LA Mayor Bass, uh, for potentially being the mayor of LA.", "attribution": "-- Heather Brooker at 22:45", "link": "https://omny.fm/shows/kfi-live-with-heather-brooker/bachelor-nation-bombshell-spencer-pratt-s-mayoral-buzz-ren-faire-preview?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1365"}, {"text": "Spencer is I think he has been very, like, ahead of the curve with media, uh, and he, he's similar to Kim Kardashian. They're just really good at marketing.", "attribution": "-- Kate Casey at 23:55", "link": "https://omny.fm/shows/kfi-live-with-heather-brooker/bachelor-nation-bombshell-spencer-pratt-s-mayoral-buzz-ren-faire-preview?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1435"}, {"text": "Spencer was a producer of Princes of Malibu, which was Brody Jenner and his brother, and David Foster was Brody's stepfather at the time. So he's been— Spencer actually created that and produced that.", "attribution": "-- Kate Casey at 26:04", "link": "https://omny.fm/shows/kfi-live-with-heather-brooker/bachelor-nation-bombshell-spencer-pratt-s-mayoral-buzz-ren-faire-preview?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1564"}, {"text": "When Spencer used that time to announce candidacy, I talked to people in the crowd and they were really mixed in the reaction.", "attribution": "-- Heather Brooker at 26:41", "link": "https://omny.fm/shows/kfi-live-with-heather-brooker/bachelor-nation-bombshell-spencer-pratt-s-mayoral-buzz-ren-faire-preview?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1601"}, {"text": "Some people said, 'Yay, this is great. We support him. He's really been an advocate for the Palisades and he's really done his homework.'", "attribution": "-- Heather Brooker at 27:15", "link": "https://omny.fm/shows/kfi-live-with-heather-brooker/bachelor-nation-bombshell-spencer-pratt-s-mayoral-buzz-ren-faire-preview?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1635"}, {"text": "There's no other candidate for mayor of LA that's going on Good Morning America, The Today Show, major talk shows nationally.", "attribution": "-- Heather Brooker at 28:15", "link": "https://omny.fm/shows/kfi-live-with-heather-brooker/bachelor-nation-bombshell-spencer-pratt-s-mayoral-buzz-ren-faire-preview?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1695"}, {"text": "Spencer Pratt doesn't have a shot in... Despite the fact that KFI really does seem to be pushing this guy, it's just not going to happen.", "attribution": "-- Cliff (caller) at 43:03", "link": "https://omny.fm/shows/kfi-live-with-heather-brooker/bachelor-nation-bombshell-spencer-pratt-s-mayoral-buzz-ren-faire-preview?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=2583"}, {"text": "He's polling in third place. A lot could happen between now and when the actual LA mayor's race happens.", "attribution": "-- Heather Brooker at 43:27", "link": "https://omny.fm/shows/kfi-live-with-heather-brooker/bachelor-nation-bombshell-spencer-pratt-s-mayoral-buzz-ren-faire-preview?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=2607"}], "links": [["Listen to Episode", "https://omny.fm/shows/kfi-live-with-heather-brooker/bachelor-nation-bombshell-spencer-pratt-s-mayoral-buzz-ren-faire-preview?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website"], ["Summary", "https://www.dropbox.com/scl/fi/1c7rp99301l6xtu5o7pz7/KFI-Live-with-Heather-Brooker-Bachelor-Nation-Bombshell-Spencer-Pratts-Mayoral-Buzz-Ren-Faire-Preview-Summary.docx?rlkey=5j58yso4exioz78wqj08jhij9&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/eiuqemy8rdtyaw3yq133c/KFI-Live-with-Heather-Brooker-Bachelor-Nation-Bombshell-Spencer-Pratts-Mayoral-Buzz-Ren-Faire-Preview-Transcript.docx?rlkey=ug26kqsnuyde4vy3qhrebjxzm&dl=0"]]},

{"title": "Bass Skips Debate, Rivals Seize the Stage in Turbulent L.A. Mayor’s Race", "show": "Monks & Merrill", "description": "This episode discusses the LA mayoral race, focusing on a recent debate where Mayor Bass was absent. Adam Miller, a tech entrepreneur candidate, participated in the debate alongside other mayoral hopefuls.", "date": "March 24, 2026", "tags": ["Adam Miller", "Guest Appearance", "Podcast"], "sentiment": "Mixed", "quotes": [{"text": "He is a tech entrepreneur who made some money in the tech field, and now he has turned his attention to homelessness and opportunities for young people in Los Angeles.", "attribution": "-- Michael Monks at 06:36", "link": "https://omny.fm/shows/monks-merrill/bass-skips-debate-rivals-seize-the-stage-in-turbulent-l-a-mayor-s-race?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=396"}, {"text": "When I interviewed him shortly after his campaign was announced, I kind of left a little bit disappointed that his policy positions weren't better spelled out.", "attribution": "-- Michael Monks at 06:49", "link": "https://omny.fm/shows/monks-merrill/bass-skips-debate-rivals-seize-the-stage-in-turbulent-l-a-mayor-s-race?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=409"}, {"text": "If you're going to be a relative nobody jumping in the race for Los Angeles mayor, you've got to pop and you got to pop quickly because there's not a lot of time to make any noise.", "attribution": "-- Michael Monks at 07:01", "link": "https://omny.fm/shows/monks-merrill/bass-skips-debate-rivals-seize-the-stage-in-turbulent-l-a-mayor-s-race?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=421"}, {"text": "He did look professional and sounded competent.", "attribution": "-- Michael Monks at 07:11", "link": "https://omny.fm/shows/monks-merrill/bass-skips-debate-rivals-seize-the-stage-in-turbulent-l-a-mayor-s-race?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=431"}, {"text": "Adam Miller can kind of claim that lane too, but nobody knows who he is yet.", "attribution": "-- Michael Monks at 24:49", "link": "https://omny.fm/shows/monks-merrill/bass-skips-debate-rivals-seize-the-stage-in-turbulent-l-a-mayor-s-race?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1489"}, {"text": "Adam Miller and Ray Hwang who are bringing up the rear there.", "attribution": "-- Michael Monks at 25:45", "link": "https://omny.fm/shows/monks-merrill/bass-skips-debate-rivals-seize-the-stage-in-turbulent-l-a-mayor-s-race?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1545"}], "links": [["Listen to Episode", "https://omny.fm/shows/monks-merrill/bass-skips-debate-rivals-seize-the-stage-in-turbulent-l-a-mayor-s-race?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website"], ["Summary", "https://www.dropbox.com/scl/fi/8m3ri0wm7pic457ysgmi6/Monks-Merrill-Bass-Skips-Debate-Rivals-Seize-the-Stage-in-Turbulent-LA-Mayors-Race-Summary.docx?rlkey=zhhhqq7qqvi4xvjzk734tbxit&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/oq8gr0vajc320my7n1jqk/Monks-Merrill-Bass-Skips-Debate-Rivals-Seize-the-Stage-in-Turbulent-LA-Mayors-Race-Transcript.docx?rlkey=mte3nsw2hr7ug6hs34ti85ak7&dl=0"]]},

{"title": "Hazmat Situation at the site of the woman living in the sewer", "show": "790 KABC", "description": "This episode of the 790 KABC show focuses on the hazmat cleanup of a homeless woman living in LA sewers, with hosts discussing local politics including a recent debate. Adam Miller is mentioned as one of three candidates who participated in a debate for local office, where he received no audience applause compared to his opponents.", "date": "March 25, 2026", "tags": ["Adam Miller", "Guest Appearance", "Podcast"], "sentiment": "Negative", "quotes": [{"text": "Every single response, it didn't matter what the question was, this guy Adam Miller, who owns a nonprofit, would get no applause.", "attribution": "-- Speaker B at 01:39", "link": "https://omny.fm/shows/the-drive-home-with-jillian-barberie-and-john-ph-1/hazmat-situation-at-the-site-of-the-woman-living-in-the-sewer?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=99"}, {"text": "Nithya would get golf claps. And then Ray Huang, the full-blown socialist who wants free buses, would get cheers for every single answer.", "attribution": "-- Speaker B at 01:39", "link": "https://omny.fm/shows/the-drive-home-with-jillian-barberie-and-john-ph-1/hazmat-situation-at-the-site-of-the-woman-living-in-the-sewer?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=99"}], "links": [["Listen to Episode", "https://omny.fm/shows/the-drive-home-with-jillian-barberie-and-john-ph-1/hazmat-situation-at-the-site-of-the-woman-living-in-the-sewer?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website"], ["Summary", "https://www.dropbox.com/scl/fi/ugnctg2te1ri7mnonndse/790-KABC-Hazmat-Situation-at-the-site-of-the-woman-living-in-the-sewer-Summary.docx?rlkey=rvypn38nrrk0iiyt35hcgfs9p&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/0zipi3xignf7wm72sf839/790-KABC-Hazmat-Situation-at-the-site-of-the-woman-living-in-the-sewer-Transcript.docx?rlkey=qcmusu9t54eyqb {"title": "Downtown L.A. at a Crossroads: Power, Policy, and the Fight to Revive the City Core", "show": "Monks & Merrill", "description": "This episode of Monks & Merrill focuses on the challenges facing downtown Los Angeles, including homelessness, crime, and urban decay. Spencer Pratt is mentioned as a mayoral candidate who will appear on an upcoming show with John Kobalt.", "date": "March 26, 2026", "tags": ["Spencer Pratt", "Guest Appearance", "Podcast"], "sentiment": "Positive", "quotes": [{"text": "I anticipate Spencer Pratt. You could see them potentially jumping in the mayor's race.", "attribution": "-- Michael Monks at 18:20", "link": "https://omny.fm/shows/monks-merrill/downtown-l-a-at-a-crossroads-power-policy-and-the-fight-to-revive-the-city-core?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1100"}, {"text": "Spencer Pratt's going to be on with John Kobold, by the way.", "attribution": "-- Chris Merrill at 18:20", "link": "https://omny.fm/shows/monks-merrill/downtown-l-a-at-a-crossroads-power-policy-and-the-fight-to-revive-the-city-core?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1100"}, {"text": "They've become good buddies. And it was interesting radio the last time Spencer Pratt was on.", "attribution": "-- Michael Monks at 18:22", "link": "https://omny.fm/shows/monks-merrill/downtown-l-a-at-a-crossroads-power-policy-and-the-fight-to-revive-the-city-core?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1102"}, {"text": "I don't want to suggest that I had low expectations for him as a person. That's not true. But for him as a candidate, I did.", "attribution": "-- Michael Monks at 18:22", "link": "https://omny.fm/shows/monks-merrill/downtown-l-a-at-a-crossroads-power-policy-and-the-fight-to-revive-the-city-core?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1102"}, {"text": "He has expanded his issue list and seemed to speak pretty well about {"title": "Newsom fake tears when talking about job fairs", "show": "The John Kobylt Show", "description": "Host John Kobylt strongly endorses Spencer Pratt's mayoral candidacy for Los Angeles, urging listeners to hear Pratt's interview from the previous hour. Kobylt presents Pratt as the ideal candidate to replace Karen Bass, praising his comprehensive plans and common-sense approach to city issues.", "date": "March 27, 2026", "tags": ["Spencer Pratt", "Guest Appearance", "Podcast"], "sentiment": "Positive", "quotes": [{"text": "Spencer Pratt, that's— this is the one to replace this, this tired, destructive, evil reign of Karen Bass and Nithya Raman.", "attribution": "-- John Kobylt at 04:09", "link": "https://omny.fm/shows/john-and-ken-on-demand/newsom-fake-tears-when-talking-about-job-fairs?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=249"}, {"text": "There isn't a thing he said that I wouldn't say myself. and, and that's who I'm voting for, and that's who you have to vote for.", "attribution": "-- John Kobylt at 04:44", "link": "https://omny.fm/shows/john-and-ken-on-demand/newsom-fake-tears-when-talking-about-job-fairs?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=284"}, {"text": "Spencer Pratt was on in the 3 o'clock hour, the whole hour. That's what you're listening to tonight, okay, on the podcast.", "attribution": "-- John Kobylt at 10:42", "link": "https://omny.fm/shows/john-and-ken-on-demand/newsom-fake-tears-when-talking-about-job-fairs?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=642"}, {"text": "He's the real deal. He's got fully fleshed out plans for Los Angeles.", "attribution": "-- John Kobylt at 10:50", "link": "https://omny.fm/shows/john-and-ken-on-demand/newsom-fake-tears-when-talking-about-job-fairs?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=650"}, {"text": "Spencer Pratt was with us here in the first hour. Spencer Pratt, a whole hour. You— I defy you.", "attribution": "-- John Kobylt at 21:37", "link": "https://omny.fm/shows/john-and-ken-on-demand/newsom-fake-tears-when-talking-about-job-fairs?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1297"}, {"text": "If after listening to him for an hour, and we covered a lot of territory, that you wouldn't think he's a way, way, way better choice than Bassarama.", "attribution": "-- John Kobylt at 21:47", "link": "https://omny.fm/shows/john-and-ken-on-demand/newsom-fake-tears-when-talking-about-job-fairs?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1307"}, {"text": "He's saying all the stuff that you're thinking. He's saying all the stuff that you want to say.", "attribution": "-- John Kobylt at 22:02", "link": "https://omny.fm/shows/john-and-ken-on-demand/newsom-fake-tears-when-talking-about-job-fairs?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1322"}], "links": [["Listen to Episode", "https://omny.fm/shows/john-and-ken-on-demand/newsom-fake-tears-when-talking-about-job-fairs?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website"], ["Summary", "https://www.dropbox.com/scl/fi/8cq8f2qc5b5tjdih1pnre/The-John-Kobylt-Show-Newsom-fake-tears-when-talking-about-job-fairs-Summary.docx?rlkey=us69t381mg9t0403lrp3594e5&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/5rbwuhe18oq2m52qqr5nj/The-John-Kobylt-Show-Newsom-fake-tears-when-talking-about-job-fairs-Transcript.docx?rlkey=033fusd6zz2qw6h0jndptkju5&dl=0"]]},

{"title": "The Decline of San Francisco (03/27)", "show": "The John Kobylt Show", "description": "This episode of The John Kobylt Show focuses on criticizing California political leadership, particularly discussing the decline of San Francisco and Los Angeles. Karen Bass is mentioned in relation to her handling of the LA fires and various city issues.", "date": "March 28, 2026", "tags": ["Karen Bass", "Guest Appearance", "Podcast"], "sentiment": "Negative", "quotes": [{"text": "Nice job, Karen Bass. You have turned Los Angeles into a post-apocalyptic zombie city, and your only focus is on the Olympic Games.", "attribution": "-- Caller at 18:31", "link": "https://omny.fm/shows/john-and-ken-on-demand/the-decline-of-san-francisco-03-27?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1111"}, {"text": "How the hell is Karen Bass going to get reelected? I tell you, this city deserves what it gets. Going to reelect the person that burned half of it down.", "attribution": "-- Caller at 18:32", "link": "https://omny.fm/shows/john-and-ken-on-demand/the-decline-of-san-francisco-03-27?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1112"}, {"text": "They all got up and they said absolutely insane things about how wonderful and smart... all 4 million residents say thank you for burning down Pacific Palisades.", "attribution": "-- Speaker F (John Kobylt) at 03:47", "link": "https://omny.fm/shows/john-and-ken-on-demand/the-decline-of-san-francisco-03-27?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=227"}], "links": [["Listen to Episode", "https://omny.fm/shows/john-and-ken-on-demand/the-decline-of-san-francisco-03-27?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website"], ["Summary", "https://www.dropbox.com/scl/fi/xqmm5j7btqoeb35dpaoog/The-John-Kobylt-Show-The-Decline-of-San-Francisco-0327-Summary.docx?rlkey=0f3la9tgtzgv399fp4quc7iu7&dl=0"], ["Full Transcript", "https://www.dropbox. {"title": "TSA Agents To Be Paid (03/27)", "show": "The John Kobylt Show", "description": "This episode of The John Kobylt Show focuses on TSA funding issues and transgender prisoners in California prisons. Karen Bass is mentioned briefly in the context of criticism over her handling of the Pacific Palisades fires and missing homelessness funds.", "date": "March 28, 2026", "tags": ["Karen Bass", "Guest Appearance", "Podcast"], "sentiment": "Negative", "quotes": [{"text": "Who helped burn down the Pacific Palisades. She wouldn't fill up a reservoir, wouldn't turn on a water hose and fill the 117 million gallon hole in the ground.", "attribution": "-- John Kobylt at 03:09", "link": "https://omny.fm/shows/john-and-ken-on-demand/tsa-agents-to-be-paid-03-27?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=189"}, {"text": "Instead of spending the day shouting in the streets about Trump, why don't you organize and clean up the garbage that Karen Bass won't pick up?", "attribution": "-- John Kobylt at 18:37", "link": "https://omny.fm/shows/john-and-ken-on-demand/tsa-agents-to-be-paid-03-27?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1117"}, {"text": "Why don't you protest that? Gavin Newsom lost $24 billion of your money... instead of protesting Trump, ought to be protesting Karen Bass, who lost $2 billion just in LA", "attribution": "-- John Kobylt at 18:37", "link": "https://omny.fm/shows/john-and-ken-on-demand/tsa-agents-to-be-paid-03-27?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1117"}, {"text": "Karen Bass, who lost $2 billion just in LA and then spent more of your tax money hiring 15 lawyers so she wouldn't have to testify about where the money went.", "attribution": "-- John Kobylt at 19:30", "link": "https://omny.fm/shows/john-and-ken-on-demand/tsa-agents-to-be-paid-03-27?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1170"}], "links": [["Listen to Episod {"title": "LA City Council's Tongue Bath For Janisse Quiñones (03/27)", "show": "The John Kobylt Show", "description": "The episode heavily criticizes LA Mayor Karen Bass's handling of the Palisades fires, focusing on her absence during the crisis and her appointment of Janisse Quiñones to head the Department of Water and Power. The host blames Bass, along with Quiñones and fire chief Kristin Crowley, for the fire's devastation.", "date": "March 28, 2026", "tags": ["Karen Bass", "Guest Appearance", "Podcast"], "sentiment": "Negative", "quotes": [{"text": "She was Karen Bass's friend, and they gave her almost twice the salary that her predecessor got.", "attribution": "-- John Kobylt at 07:08", "link": "https://omny.fm/shows/john-and-ken-on-demand/la-city-councils-tongue-bath-for-janisse-qui-ones-03-27?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=428"}, {"text": "It's Karen Bass, Janice Quinonez, and Kristin Crowley. Boy, that's a real diverse group, huh? 3 women, all 3 incompetent, and they teamed up to burn down the Palisades.", "attribution": "-- John Kobylt at 16:40", "link": "https://omny.fm/shows/john-and-ken-on-demand/la-city-councils-tongue-bath-for-janisse-qui-ones-03-27?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1000"}, {"text": "When you hear him, you just— it's hard to believe. Now, uh, last week we found out that he got pulled over... And this was the guy the day of the fire. Bass is in Africa.", "attribution": "-- John Kobylt at 28:45", "link": "https://omny.fm/shows/john-and-ken-on-demand/la-city-councils-tongue-bath-for-janisse-qui-ones-03-27?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1725"}, {"text": "Karen Bass really went to Africa.", "attribution": "-- John Kobylt at 29:20", "link": "https://omny.fm/shows/john-and-ken-on-demand/la-city-councils-tongue-bath-for-janisse-qui-ones-03-27?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=17 {"title": "Two Guys, Five Rings: Looking Ahead to LA 2028", "show": "Las Culturistas with Matt Rogers and Bowen Yang", "description": "This is the final episode of season 2 of 'Two Guys, Five Rings' where hosts Matt Rogers and Bowen Yang discuss the upcoming 2028 LA Olympics. Karen Bass is mentioned briefly in relation to transportation planning for the games.", "date": "March 28, 2026", "tags": ["Karen Bass", "Guest Appearance", "Podcast"], "sentiment": "Negative", "quotes": [{"text": "Well, okay, so they've walked back, uh, no cars Olympics or whatever the heck Miss Karen Bass was saying.", "attribution": "-- Matt Rogers at 10:09", "link": "https://omny.fm/shows/two-guys-five-rings-matt-bowen-the-olympics/two-guys-five-rings-episode-xv-lookahead-to-la-2028?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=609"}], "links": [["Listen to Episode", "https://omny.fm/shows/two-guys-five-rings-matt-bowen-the-olympics/two-guys-five-rings-episode-xv-lookahead-to-la-2028?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website"], ["Summary", "https://www.dropbox.com/scl/fi/0xyfwb8i7zqe8xpojihtk/Las-Culturistas-with-Matt-Rogers-and-Bowen-Yang-Two-Guys-Five-Rings-Looking-Ahead-to-LA-2028-Summary.docx?rlkey=0krjy4fuocgemav88fyqup8mm&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/3u0wlae2dlav8bowhff2c/Las-Culturistas-with-Matt-Rogers-and-Bowen-Yang-Two-Guys-Five-Rings-Looking-Ahead-to-LA-2028-Transcript.docx?rlkey=crreuvxd8qqgsc8ilxe6swmfw&dl=0"]]},
{"title": "BEST OF WEEK: Cesar's Takedown. Virgin Husband, Promiscuous Wife. Meta's Kids. | Mar 23-27, '26", "show": "JLP Highlights", "description": "This is a highlights episode from the JLP show covering various topics including attacks on men, domestic violence cases, and political commentary. Karen Bass is briefly mentioned in the context of renaming Cesar Chavez Day after sexual assault allegations against the civil rights leader.", "date": "March 28, 2026", "tags": ["Karen Bass", "Guest Appearance", "Podcast"], "sentiment": "Neutral", "quotes": [{"text": "Even Karen Bass, the so-called mayor of LA, signed a proclamation on Thursday to rename the last day of the month Farmers Workers instead of Cesar Chavez Day.", "attribution": "-- Speaker A at 15:32", "link": "https://rebuildingtheman.substack.com/p/best-of-week-cesars-takedown-virgin?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=932"}, {"text": "LA Mayor Karen Bass signed a proclamation renaming the last Monday of March to Farm Workers Day in the city of Los Angeles.", "attribution": "-- Speaker F at 16:04", "link": "https://rebuildingtheman.substack.com/p/best-of-week-cesars-takedown-virgin?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=964"}], "links": [["Listen to Episode", "https://rebuildingtheman.substack.com/p/best-of-week-cesars-takedown-virgin?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website"], ["Summary", "https://www.dropbox.com/scl/fi/wjgbqk2zidzhbme2oxt9s/JLP-Highlights-BEST-OF-WEEK-Cesars-Takedown-Virgin-Husband-Promiscuous-Wife-Metas-Kids-Mar-23-27-26-Summary.docx?rlkey=2rvu1ebtkcf5s1yj8ko6qg6xy&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/sywu3mkuybyhzkodk1q09/JLP-Highlights-BEST-OF-WEEK-Cesars-Takedown-Virgin-Husband-Promiscuous-Wife-Metas-Kids-Mar-23-27-26-Transcript.docx?rlkey=5m40a7savxou8hqhj5v7qevqn&dl=0"]]},
{"title": "\"All Politics Is Local\"", "show": "Inside Golden State Politics ", "description": "This 36-minute episode of Inside Golden State Politics  mentions Nithya Raman.", "date": "March 19, 2026", "tags": ["Nithya Raman", "Mentioned", "Podcast"], "sentiment": "Neutral", "quotes": [{"text": "It's absolutely terrible for a horse, but she's still at the top of the field. You know, the person who I have with the second odds at this time is Council Member Nithya Raman from the 4th District, the late entry into the race. Given her political leanings, I've given her the horse name of Here Comes Lefty, and we've got, we've got Here Comes Lefty starting at, at 6-1. If you're looking for a I was going to say, if you're looking for a third candidate, you know, third person at the starting gate, I would say we'd look at Adam Miller. The horse name I've got for him is The Owl. Odds 25 to 1. And as I wrote, why is he The Owl? Because if you ask most Angelenos what they think of Adam Miller, the response will be, who? Who? But he is running for it. We've got a couple others. We've got Reverend Ray Wang, one of the left-leaning candidates. I'm calling her Ray of Light. Odd 70 to 1. And then our 5th main candidate, Spencer Pratt, the Republican reality TV star running, you know, out of the Palisades. Often we see him wearing gear for his wife Heidi Montag. He's selling merchandise on his website. So at 95 to 1, he is the merchant of Heidiwood. So that's how I break down the race.", "attribution": "-- Speaker C at 04:24", "link": "https://www.buzzsprout.com/916192?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=264"}, {"text": "Exactly. So I'm going to answer your question, Bill, which is absolutely the right on question with a little bit of context. And when we talk about who's running, we have to think about who's not running. And if we Recall, there was a lot of speculation for a long time over who would challenge Karen Bass. Austin Beutner, the former superintendent of LAUSD, former publisher of the LA Times, he was running in the race, but he had the terrible tragedy of his young daughter passing away. He pulled out of the contest. He was someone who I think could have been a threat to Karen Bass, you know, had he run. We had, as we kept knowing, Supervisor Lindsey Horvath was flirting with running almost until the last moment, and she opted not to run. And then I think most Notably, we had Rick Caruso, the billionaire developer, civic leader. He seemed to sort of waffle for 3 years. Am I going to run? Am I not going to run? And then decided not to run. By contrast, after 3 years of Rick wavering, I think Nithya Raman spent about 3 days determining and going, oh, no one else is running. There's an opportunity. I'm disappointed in what's happening in Los Angeles. I think I could do better. 3 days, sure, why not? Very important to note that Nithya Raman's campaign team is the campaign team that had been working with Austin Butner, a campaign team that's worked a lot in Los Angeles before. And she saw Elaine. Now look, certainly there are a number of people who are saying, oh well, this is just political opportunism. And maybe it is. I'm not criticizing it. As I wrote in that Westside Current column, many of those people who choose to wait their turn They're still working as political aides years down the line. So Nithya Raman had an opportunity. Very importantly, very importantly, she had just won a seat 2 years ago. So she, even if she loses, she still has her city council seat. So she jumped in and yeah, Bill, as you referenced, complete surprise to many people, but gives us a lot of content.", "attribution": "-- Speaker C at 06:58", "link": "https://www.buzzsprout.com/916192?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=418"}, {"text": "Well, I will answer that with a reference to an absolutely terrible movie that almost no one will remember. There was once a movie called King Ralph in which John Candy, who I think was about the 18th in line to be the King of England, suddenly became the King of England because the other 17 people in front of him were all electrocuted during a photo shoot. And King Ralph became the King of England. I think that's about the only way that we actually wind up with a Republican mayor of Los Angeles if we have a King Ralph moment, which in this case would be King Spencer. Now, goofiness aside, Bill, your point is actually crucial, and I think it's something that we really need to be thinking about widespread in Los Angeles. We should not be thinking about who's going to win the mayor's race of Los Angeles. We should, in June, We should be thinking about who is going to finish within the top 2, because, and Cheri, as you just referenced, you need 50%, but I don't see a world where anyone eclipses 50%. So we have these 5 main candidates, and then we have 9 other people on the ballot. So, you know, very, you know, it's very unlikely that someone gets to 50%. So who's going to finish within the top 2? And with so many people there, the voting, the, you know, could be, you know, spread in, in unexpected ways. There's a lot of people who do think that it will be Mayor Bass and Nithya Raman who will finish 1-2 and will continue on to, you know, to the November general election. That could happen, but there's also other things that could happen. Nithya Raman is expected to, you know, siphon a number of votes from Karen Bass, but there is another left-leaning candidate, as we just referenced, Ray Wang, the Reverend Ray of Light, who could as well siphon votes from Nithya Raman. Perhaps that holds down Nithya Raman's ability to get to second place. There is, I think, certainly a lane for Adam Miller, who, you know, is a successful businessman turned philanthropist. We have to remember in 2022, the runoff, Rick Caruso got 45%. So there's a lane there, but will he actually go and spend the money and boost his name ID? We don't know. Or will everyone just divide it up so much that it does leave space for Spencer Pratt, that reality TV star who will appeal to a lot of Republicans? I've heard different people speculate that maybe he gets 7%, maybe he gets 15%, maybe he gets as much as 20% or even slightly more. And if he gets there, does he advance to a runoff against Karen Bass or someone else? If he gets into that runoff, then again, we have, as you just referenced at the beginning, Bill, that possibility of a Republican mayor. I don't think it's likely. I think it's more likely we have a Republican governor, but that's a whole other story given where those polls are. But yeah, it, you know, again, sorry if I'm being long-winded, but it is really important for us to think about the fact that what matters is not, you know, if you come in first in the June primary, what matters is that you do not come in third or worse. In the June primary. You know, that's what candidates are trying to do. They're trying to figure out how do I get enough just to squeak into the top two? If I get there, I'll worry about November later.", "attribution": "-- Speaker C at 19:13", "link": "https://www.buzzsprout.com/916192?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1153"}, {"text": "And if I could just add to that a little bit more context, because you're right on, and just something to build on that. You know, Nithya Raman absolutely elected in the past with support from the Democratic Socialists. Local chapter, but she has certainly drifted, you know, more towards the middle compared with some of her other council colleagues who continue to hew sort of very hard left. You know, it— you know, when one of the ways that we see that most significantly is within housing amongst many of the super progressives, or whatever you want to call them. When it comes to housing, their focus will be, let's build affordable housing, it's got to be affordable housing, every product's got to be either all or mostly or have a significant chunk of affordable housing. I've spoken with Nithya Raman in the past and, you know, and I've had conversations with her where she's like, yes, we need to build affordable housing, but we also need to build market rate housing. We need housing at all levels in Los Angeles. And there's a number of developers, you know, people who want to build who are now backing her because she has been forward thinking in trying to take steps to get housing construction going in Los Angeles after the fires. She got— she was pushing some strategies that had been utilized in other cities to speed up housing production. So she's been looking at a lot of these levels and steps that are embraced by the development community, which may be ironic to some people. So she— so I don't think it's fair to just put her any longer into the shoebox of left-leaning only DSA part. Also recently, she talked about being more open to certain funding for policing for LAPD, which many of the DSA-affiliated candidates have opposed. But yeah, housing has definitely been, you know, been an interesting statement and evolution and stands out.", "attribution": "-- Speaker C at 24:28", "link": "https://www.buzzsprout.com/916192?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1468"}, {"text": "But when you're talking money, it also is the case in these elections. And that's another key component. And that's another thing that makes it very, that is a challenge, a significant challenge for Nithya Raman, when you get in the race on February 7th and the election is on June 2nd, you have very little time to raise the millions of dollars that you need to raise to run viably for the seat. Now, again, she's abetted in that by a generally weak field and criticism against the mayor, but it's a monumental challenge for her, and we can't dismiss, we can't dismiss that. I think there's a lot of people who are unaware of who Nithya Raman is, and she needs to introduce herself to a lot of people in a short time period. And I'm looking right now, this is March 18th. In less than 2 months, the mail-in ballots are already going to be in your homes. The election will be underway.", "attribution": "-- Speaker C at 28:37", "link": "https://www.buzzsprout.com/916192?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1717"}], "links": [["Listen to Episode", "https://www.buzzsprout.com/916192?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website"], ["Summary", "https://www.dropbox.com/scl/fi/ndw11qetqzk0rs2ax472b/Inside-Golden-State-Politics-All-Politics-Is-Local-Summary.docx?rlkey=yw14xuiolpss29r954tg9p29x&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/q5qtpim8nt0axevkqpkrw/Inside-Golden-State-Politics-All-Politics-Is-Local-Transcript.docx?rlkey=312w5wig5if1wuyxgornk0x19&dl=0"]]},
{"title": "Inside Nithya Raman’s Campaign: Can She Transform LA? | Capítulo 264", "show": "Locatora Radio [A Radiophonic Novela]", "description": "This 55-minute episode of Locatora Radio [A Radiophonic Novela] mentions Nithya Raman.", "date": "March 25, 2026", "tags": ["Nithya Raman", "Mentioned", "Podcast"], "sentiment": "Neutral", "quotes": [{"text": "Hey, locamores, this is Diosa and you're listening to LocaTora Radio. In this week's episode, we interview mayoral race candidate Nithya Raman. She currently holds a seat in LA City Council and represents District 4. Councilmember Nithya Raman filed her candidacy for the mayor's race on the final day in February, shocking every Politico across Los Angeles. She's running against Democratic incumbent Mayor Karen Bass. In this interview, Councilmember Nithya Raman shares the days leading up to her filing.", "attribution": "-- Speaker F at 03:26", "link": "https://omny.fm/shows/locatora-radio-a-radiophonic-novela/inside-nithya-raman-s-campaign-can-she-transform-la-cap-tulo-264?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=206"}, {"text": "The city of LA is in a budget deficit. There's a myriad of issues Angelenos are facing every day. Like housing affordability, public safety, ICE kidnapping our neighbors, and the humanitarian crisis that is homelessness. But amidst these concerns lies a crossroads, a chance to stick to the status quo or enact change and redefine the city of LA's future. In this race, we find a diverse set of candidates, even reality TV star Spencer Pratt, is running for LA mayor. Every candidate demands our scrutiny, not just our support. Now is the time to familiarize ourselves with these candidates, not just through their campaign promises, but through their past actions and future potentials. It's our collective responsibility to be informed, to ask questions, and to make a voting plan with our friends and family. It's a midterm election year. And this is an important race in Los Angeles. We know that not all of our listeners are LA-based, but we do think this mayoral race is important because Los Angeles is often a test ground for politics and policy. Here's our interview with councilmember and mayoral candidate Nithya Raman.", "attribution": "-- Speaker F at 04:40", "link": "https://omny.fm/shows/locatora-radio-a-radiophonic-novela/inside-nithya-raman-s-campaign-can-she-transform-la-cap-tulo-264?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=280"}, {"text": "This is Nithya Raman, candidate for mayor of Los Angeles, and you're listening to Locutora Radio.", "attribution": "-- Speaker G at 06:04", "link": "https://omny.fm/shows/locatora-radio-a-radiophonic-novela/inside-nithya-raman-s-campaign-can-she-transform-la-cap-tulo-264?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=364"}, {"text": "Thank you so much, Councilmember Nithya Raman, mayoral candidate for the City of LA. It's been a pleasure chatting with you today.", "attribution": "-- Speaker H at 55:13", "link": "https://omny.fm/shows/locatora-radio-a-radiophonic-novela/inside-nithya-raman-s-campaign-can-she-transform-la-cap-tulo-264?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=3313"}], "links": [["Listen to Episode", "https://omny.fm/shows/locatora-radio-a-radiophonic-novela/inside-nithya-raman-s-campaign-can-she-transform-la-cap-tulo-264?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website"], ["Summary", "https://www.dropbox.com/scl/fi/4sse4mbgn4arxka679dxz/Locatora-Radio-A-Radiophonic-Novela-Inside-Nithya-Ramans-Campaign-Can-She-Transform-LA-Cap-tulo-264-Summary.docx?rlkey=vnco0x0z5jy20b78lx12yljel&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/v9zmmthpscw04evm78why/Locatora-Radio-A-Radiophonic-Novela-Inside-Nithya-Ramans-Campaign-Can-She-Transform-LA-Cap-tulo-264-Transcript.docx?rlkey=6qk8v9vfq0yobx3hphrrl4qm0&dl=0"]]},
{"title": "Justice for César Chávez Victims? Taylor Frankie Paul &amp; Nithya Raman for LA Mayor | The Moment LIVE", "show": "The Moment LIVE", "description": "This episode of The Moment LIVE covers multiple topics including a New York Times investigation into César Chávez, Taylor Frankie Paul's cancelled Bachelorette season, and features an interview with LA City Council member Nithya Raman who is running for mayor of Los Angeles.", "date": "March 21, 2026", "tags": ["Nithya Raman", "Mentioned", "Podcast"], "sentiment": "Positive", "quotes": [{"text": "Nithia Ramen who is a council member here in LA running for mayor and she's sort of LA's Zoron maybe some are saying", "attribution": "-- Speaker A at 03:04", "link": "https://www.youtube.com/watch?v=c3qMvb7q1F4&t=184"}, {"text": "Well, I'm endorsing myself for mayor.", "attribution": "-- Nithya Raman at 22:31", "link": "https://www.youtube.com/watch?v=c3qMvb7q1F4&t=1351"}, {"text": "We've passed some of the strongest tenant protections in the entire country universal just cause eviction protections.", "attribution": "-- Nithya Raman at 23:07", "link": "https://www.youtube.com/watch?v=c3qMvb7q1F4&t=1387"}, {"text": "We've housed hundreds of people without using arrests and enforcement.", "attribution": "-- Nithya Raman at 23:39", "link": "https://www.youtube.com/watch?v=c3qMvb7q1F4&t=1419"}, {"text": "We haven't paved a single mile of street this entire year.", "attribution": "-- Nithya Raman at 24:36", "link": "https://www.youtube.com/watch?v=c3qMvb7q1F4&t=1476"}, {"text": "I don't feel like we are adequately prepared for the Olympics right now.", "attribution": "-- Nithya Raman at 34:07", "link": "https://www.youtube.com/watch?v=c3qMvb7q1F4&t=2047"}, {"text": "The city is on the hook for hundreds of millions of dollars.", "attribution": "-- Nithya Raman at 35:17", "link": "https://www.youtube.com/watch?v=c3qMvb7q1F4&t=2117"}, {"text": "I really think about making government work for people because I believe in the power of government to do good.", "attribution": "-- Nithya Raman at 38:13", "link": "https://www.youtube.com/watch?v=c3qMvb7q1F4&t=2293"}], "links": [["Listen to Episode", "https://www.youtube.com/watch?v=c3qMvb7q1F4"], ["Summary", "https://www.dropbox.com/scl/fi/wv273ojrrk4nbh425xvd1/The-Moment-LIVE-Justice-for-C-sar-Ch-vez-Victims-Taylor-Frankie-Paul-amp-Nithya-Raman-for-LA-Mayor-The-Moment-LIVE-Summary.docx?rlkey=1nhshm05n2u8ie6a4gcxyok7m&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/p9x7kyffslgyrapiunrfg/The-Moment-LIVE-Justice-for-C-sar-Ch-vez-Victims-Taylor-Frankie-Paul-amp-Nithya-Raman-for-LA-Mayor-The-Moment-LIVE-Transcript.docx?rlkey=4jxvty4h6dcsr38y4x26afzh0&dl=0"]]},
{"title": "Rap&#39;s dogpiling problem + Hannah Montana 20th anniversary, Spencer Pratt for LA mayor?", "show": "Freshly Pop'd", "description": "This episode of Freshly Pop'd discusses Spencer Pratt's mayoral campaign for Los Angeles, with hosts critically analyzing his political platform and qualifications. The hosts express strong skepticism about his candidacy and compare him unfavorably to other political outsiders.", "date": "March 28, 2026", "tags": ["Spencer Pratt", "Guest Appearance", "Video"], "sentiment": "Negative", "quotes": [{"text": "Spencer Pratt is a villain.", "attribution": "-- Sequoia Holmes at 00:56", "link": "https://www.youtube.com/watch?v=Qsnm9TT_UPk&t=56"}, {"text": "I don't trust Spencer Pratt as far as I can throw him.", "attribution": "-- Sequoia Holmes at 01:13", "link": "https://www.youtube.com/watch?v=Qsnm9TT_UPk&t=73"}, {"text": "Spencer Pratt is from LA, has been in LA for a long time, was literally on television. You don't have any connections?", "attribution": "-- Ryan Graham at 04:12", "link": "https://www.youtube.com/watch?v=Qsnm9TT_UPk&t=252"}, {"text": "Spencer Pratt probably doesn't know what an NGO is.", "attribution": "-- Ryan Graham at 04:22", "link": "https://www.youtube.com/watch?v=Qsnm9TT_UPk&t=262"}, {"text": "I can't imagine he's ever been homeless. He was on a show where he was a like a rich kid.", "attribution": "-- Sequoia Holmes at 05:13", "link": "https://www.youtube.com/watch?v=Qsnm9TT_UPk&t=313"}, {"text": "Why did they get a king, and we get a clown?", "attribution": "-- Ryan Graham at 07:12", "link": "https://www.youtube.com/watch?v=Qsnm9TT_UPk&t=432"}, {"text": "What I saw of him on The Hills was abuse.", "attribution": "-- Sequoia Holmes at 06:23", "link": "https://www.youtube.com/watch?v=Qsnm9TT_UPk&t=383"}, {"text": "He's running on the drain the swamp, I'm an outsider, same type of platform that Trump ran on. And I hate that.", "attribution": "-- Sequoia Holmes at 07:02", "link": "https://www.youtube.com/watch?v=Qsnm9TT_UPk&t=422"}], "links": [["Watch Episode", "https://www.youtube.com/watch?v=Qsnm9TT_UPk"], ["Summary", "https://www.dropbox.com/scl/fi/gxbeip2c24d6laaho939h/Freshly-Popd-Rap39s-dogpiling-problem-Hannah-Montana-20th-anniversary-Spencer-Pratt-for-LA-mayor-Summary.docx?rlkey=l4zot0vfs8n3d3zjuu1nrhuh2&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/j3vwhqq3da3ml083q4ccp/Freshly-Popd-Rap39s-dogpiling-problem-Hannah-Montana-20th-anniversary-Spencer-Pratt-for-LA-mayor-Transcript.docx?rlkey=makzsilwip4e40u4e3fr6y2p4&dl=0"]]},
{"title": "Ashley Zavala confronts the lack of transparency at the Capitol Annex Project", "show": "The John Phillips Show", "description": "This episode of The John Phillips Show focuses on government transparency issues in California, particularly Ashley Zavala's investigation into the secretive Capitol Annex Project. Karen Bass is mentioned briefly in relation to LA's homelessness crisis when responding to the 'Sewer Lady' story.", "date": "March 28, 2026", "tags": ["Karen Bass", "Guest Appearance", "Podcast"], "sentiment": "Negative", "quotes": [{"text": "the current mayor of Los Angeles, Karen Bass— if you're feeling down, if you're feeling blue, let's get help for you", "attribution": "-- Speaker A at 22:21", "link": "https://omny.fm/shows/the-drive-home-with-jillian-barberie-and-john-ph-1/ashley-zavala-confronts-the-lack-of-transparency-at-the-capitol-annex-project?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1341"}, {"text": "Mayor Karen Bass is reacting, calling it a tragedy.", "attribution": "-- Speaker D at 22:52", "link": "https://omny.fm/shows/the-drive-home-with-jillian-barberie-and-john-ph-1/ashley-zavala-confronts-the-lack-of-transparency-at-the-capitol-annex-project?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1372"}, {"text": "You're the mayor. This is your number one issue. Number one, not two, not three, not four. Number one. And you failed.", "attribution": "-- Speaker B at 27:29", "link": "https://omny.fm/shows/the-drive-home-with-jillian-barberie-and-john-ph-1/ashley-zavala-confronts-the-lack-of-transparency-at-the-capitol-annex-project?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1649"}, {"text": "You'd think in the last 4 years she'd have somebody working for her check the sewers.", "attribution": "-- Speaker A at 27:38", "link": "https://omny.fm/shows/the-drive-home-with-jillian-barberie-and-john-ph-1/ashley-zavala-confronts-the-lack-of-transparency-at-the-capitol-annex-project?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1658"}, {"text": "The mayor now responding, saying the drain is sealed.", "attribution": "-- Speaker D at 27:45", "link": "https://omny.fm/shows/the-drive-home-with-jillian-barberie-and-john-ph-1/ashley-zavala-confronts-the-lack-of-transparency-at-the-capitol-annex-project?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1665"}, {"text": "These are people that voted for Bass, or these are people that did not vote at all? 100% of those who voted, they voted for Bass.", "attribution": "-- Speaker A and Speaker B at 25:07", "link": "https://omny.fm/shows/the-drive-home-with-jillian-barberie-and-john-ph-1/ashley-zavala-confronts-the-lack-of-transparency-at-the-capitol-annex-project?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website&t=1507"}], "links": [["Listen to Episode", "https://omny.fm/shows/the-drive-home-with-jillian-barberie-and-john-ph-1/ashley-zavala-confronts-the-lack-of-transparency-at-the-capitol-annex-project?utm_source=listennotes.com&utm_campaign=Listen+Notes&utm_medium=website"], ["Summary", "https://www.dropbox.com/scl/fi/bx5qgcwrscq2n5vy7apar/The-John-Phillips-Show-Ashley-Zavala-confronts-the-lack-of-transparency-at-the-Capitol-Annex-Project-Summary.docx?rlkey=y514sms3cmreai5b75jht3vqm&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/fccpssvuvh72uemlwj19c/The-John-Phillips-Show-Ashley-Zavala-confronts-the-lack-of-transparency-at-the-Capitol-Annex-Project-Transcript.docx?rlkey=lkkk9813ogwfdxb9dr5op3fza&dl=0"]]},
{"title": "Los Angeles Mayor Karen Bass Talks Public Transit | Bloomberg Talks", "show": "Bloomberg Podcasts", "description": "This Bloomberg podcast episode features an interview with Los Angeles Mayor Karen Bass discussing various challenges facing the city including high gas prices, housing affordability, public transit, and major upcoming events. Bass speaks extensively about her administration's progress on homelessness reduction, public safety improvements, and preparations for hosting the World Cup and Olympics.", "date": "March 28, 2026", "tags": ["Karen Bass", "Guest Appearance", "Video"], "sentiment": "Positive", "quotes": [{"text": "We are a city that loves our cars. However, we have spent the last three or four decades building out our public transportation system.", "attribution": "-- Karen Bass at 00:36", "link": "https://www.youtube.com/watch?v=JFivrIkyacI&t=36"}, {"text": "I signed an executive directive to fasttrack the building especially of housing. And we have 40,000 units that are currently going through that process.", "attribution": "-- Karen Bass at 01:35", "link": "https://www.youtube.com/watch?v=JFivrIkyacI&t=95"}, {"text": "I have certainly been doing everything to make sure that filming doesn't continue to leave and in fact increases in our city.", "attribution": "-- Karen Bass at 02:57", "link": "https://www.youtube.com/watch?v=JFivrIkyacI&t=177"}, {"text": "We have over 119 new projects that have started in LA since the tax credits and these other initiatives have been put into place.", "attribution": "-- Karen Bass at 03:49", "link": "https://www.youtube.com/watch?v=JFivrIkyacI&t=229"}, {"text": "You have called for the ouster of Casey Wasserman as the LA28 Olympic chair.", "attribution": "-- Bloomberg Host at 05:12", "link": "https://www.youtube.com/watch?v=JFivrIkyacI&t=312"}, {"text": "My role is to make sure that the city of Los Angeles is ready to welcome thousands, tens of thousands of visitors from around the world.", "attribution": "-- Karen Bass at 06:07", "link": "https://www.youtube.com/watch?v=JFivrIkyacI&t=367"}, {"text": "I ran because Los Angeles was the epicenter for the country in homelessness, especially street homelessness.", "attribution": "-- Karen Bass at 07:51", "link": "https://www.youtube.com/watch?v=JFivrIkyacI&t=471"}, {"text": "We've had a decrease in street homelessness of 18%. This is a dysfunctional system that has been dysfunctional for at least the last three decades.", "attribution": "-- Karen Bass at 08:11", "link": "https://www.youtube.com/watch?v=JFivrIkyacI&t=491"}], "links": [["Watch Episode", "https://www.youtube.com/watch?v=JFivrIkyacI"], ["Summary", "https://www.dropbox.com/scl/fi/8gxnsj0xw59srlhlyebdw/Bloomberg-Podcasts-Los-Angeles-Mayor-Karen-Bass-Talks-Public-Transit-Bloomberg-Talks-Summary.docx?rlkey=qwqhhrruxcfper6dbwt7vdiiv&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/zk7w9k3sr2voj8362tv7u/Bloomberg-Podcasts-Los-Angeles-Mayor-Karen-Bass-Talks-Public-Transit-Bloomberg-Talks-Transcript.docx?rlkey=miljxu7e68yyw3bthqie7ytvy&dl=0"]]},
{"title": "On the Record with Adam Miller", "show": "Pat Brown Institute at Cal State LA", "description": "This is an in-depth interview with Adam Miller, a mayoral candidate for Los Angeles, discussing his background as an entrepreneur and nonprofit leader, and his vision for fixing the city's problems through better leadership and management.", "date": "March 28, 2026", "tags": ["Adam Miller", "Guest Appearance", "Video"], "sentiment": "Neutral", "quotes": [{"text": "I love LA. I raised my family here... but the city's broken and you see it everywhere.", "attribution": "-- Adam Miller at 03:15", "link": "https://www.youtube.com/watch?v=KUWxBHWB1Os&t=195"}, {"text": "The city needs to be fixed and we need a builder to fix it. And I'm that builder.", "attribution": "-- Adam Miller at 05:02", "link": "https://www.youtube.com/watch?v=KUWxBHWB1Os&t=302"}, {"text": "Adam and my husband Sean have worked together for five years now... Seven years.", "attribution": "-- Speaker A at 02:02", "link": "https://www.youtube.com/watch?v=KUWxBHWB1Os&t=122"}, {"text": "Obviously, the fires were a complete abdication of leadership.", "attribution": "-- Adam Miller at 24:14", "link": "https://www.youtube.com/watch?v=KUWxBHWB1Os&t=1454"}, {"text": "Better Angels built that. We were the ones that did it.", "attribution": "-- Adam Miller at 28:56", "link": "https://www.youtube.com/watch?v=KUWxBHWB1Os&t=1736"}, {"text": "I would have been on the ground. I probably would have gotten in trouble because I would have been in the middle of the fire.", "attribution": "-- Adam Miller at 25:30", "link": "https://www.youtube.com/watch?v=KUWxBHWB1Os&t=1530"}, {"text": "We've helped about 2,000 Angelinos stay off the street with this program already.", "attribution": "-- Adam Miller at 26:58", "link": "https://www.youtube.com/watch?v=KUWxBHWB1Os&t=1618"}, {"text": "I think ultimately the way we're going to solve this... is by new leadership that has transparency, accountability, and operational experience.", "attribution": "-- Adam Miller at 09:16", "link": "https://www.youtube.com/watch?v=KUWxBHWB1Os&t=556"}], "links": [["Watch Episode", "https://www.youtube.com/watch?v=KUWxBHWB1Os"], ["Summary", "https://www.dropbox.com/scl/fi/kwh33mjpiw519m7cl1q7o/Pat-Brown-Institute-at-Cal-State-LA-On-the-Record-with-Adam-Miller-Summary.docx?rlkey=v7a7k78t9x16vzdkfm0watq3q&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/d8bb2yztbal83h7toszd2/Pat-Brown-Institute-at-Cal-State-LA-On-the-Record-with-Adam-Miller-Transcript.docx?rlkey=lap1rbddf2e7wgnfatn5r3vde&dl=0"]]},
{"title": "Spencer Pratt | Creating A Villain, His New Memoir, &amp; Running For LA Mayor!", "show": "Off the Vine with Kaitlyn Bristowe", "description": "Spencer Pratt appears as a guest on Kaitlyn Bristowe's podcast to discuss his new memoir 'The Guy You Love to Hate.' The wide-ranging conversation covers his reality TV villain persona, life experiences from The Hills, recent house fire tragedy, and his campaign for LA mayor.", "date": "March 28, 2026", "tags": ["Spencer Pratt", "Guest Appearance", "Video"], "sentiment": "Positive", "quotes": [{"text": "Your book was amazing. I text you this. I just could not get enough of it.", "attribution": "-- Kaitlyn Bristowe at 01:51", "link": "https://www.youtube.com/watch?v=fCUNquHGBkk&t=111"}, {"text": "I didn't accidentally become the villain, that you created him and that you studied obviously people like Simon Cowell.", "attribution": "-- Kaitlyn Bristowe at 05:04", "link": "https://www.youtube.com/watch?v=fCUNquHGBkk&t=304"}, {"text": "The goal was to write a book that the way I joked about it, it seems like somebody wrote a book to like take me down.", "attribution": "-- Spencer Pratt at 02:27", "link": "https://www.youtube.com/watch?v=fCUNquHGBkk&t=147"}, {"text": "I always joke for years if I had narrated The Hills, the other cast members would have definitely been the bad guys.", "attribution": "-- Spencer Pratt at 03:54", "link": "https://www.youtube.com/watch?v=fCUNquHGBkk&t=234"}, {"text": "If I had had comment sections and DMs and if I was going on TikTok live and just feeling that hate in real life, I probably would have not been able to continue.", "attribution": "-- Spencer Pratt at 05:32", "link": "https://www.youtube.com/watch?v=fCUNquHGBkk&t=332"}, {"text": "These are the two nicest people I've ever met in my life and like so real and so honest.", "attribution": "-- Kaitlyn Bristowe at 03:27", "link": "https://www.youtube.com/watch?v=fCUNquHGBkk&t=207"}, {"text": "I was forced because this lady Karen Bass who is rerunning who's probably, God forbid, if I didn't even step in, she was for sure winning.", "attribution": "-- Spencer Pratt at 53:13", "link": "https://www.youtube.com/watch?v=fCUNquHGBkk&t=3193"}, {"text": "I put all of my money into crystals since 2008. That was at least probably $2 million in just crystals that went up.", "attribution": "-- Spencer Pratt at 49:05", "link": "https://www.youtube.com/watch?v=fCUNquHGBkk&t=2945"}], "links": [["Watch Episode", "https://www.youtube.com/watch?v=fCUNquHGBkk"], ["Summary", "https://www.dropbox.com/scl/fi/mw75wd0at973t77p31skb/Off-the-Vine-with-Kaitlyn-Bristowe-Spencer-Pratt-Creating-A-Villain-His-New-Memoir-amp-Running-For-LA-Mayor-Summary.docx?rlkey=10p7yzv7vo02iqjniqmpztwlo&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/uq4eh4a9mz7qy98uugxjx/Off-the-Vine-with-Kaitlyn-Bristowe-Spencer-Pratt-Creating-A-Villain-His-New-Memoir-amp-Running-For-LA-Mayor-Transcript.docx?rlkey=3q91mrvlq3us4c9ll7h4pozy7&dl=0"]]},
{"title": "LA Mayoral Candidate Spencer Pratt In Studio Interview With John Kobylt", "show": "John Kobylt Show & John Kobylt Radio", "description": "Spencer Pratt appears as an in-studio guest for the full hour on the John Kobylt Show, discussing his mayoral campaign for Los Angeles. He presents himself as the accountability candidate challenging incumbent Karen Bass and Nithia Ramen, focusing heavily on homelessness, law enforcement, and city corruption.", "date": "March 28, 2026", "tags": ["Spencer Pratt", "Guest Appearance", "Video"], "sentiment": "Positive", "quotes": [{"text": "Spencer Pratt running for mayor of Los Angeles against Karen Bass and Nithia Ramen and he's got some good support already and you can definitely get into the runoff for sure.", "attribution": "-- John Kobylt at 00:06", "link": "https://www.youtube.com/watch?v=L1GctL0pQmE&t=6"}, {"text": "I'm so excited to be running for mayor because I'm going to show them there are consequences and there are enough angry taxpayers, they're going to say, 'No more. You're done, Mayor Bass.'", "attribution": "-- Spencer Pratt at 03:12", "link": "https://www.youtube.com/watch?v=L1GctL0pQmE&t=192"}, {"text": "The issue that I believe I will be elected potentially on June 2nd with 51% of the vote outright is homelessness.", "attribution": "-- Spencer Pratt at 04:50", "link": "https://www.youtube.com/watch?v=L1GctL0pQmE&t=290"}, {"text": "I'm the only one saying that everyone on the streets, we're going to enforce the law. And that means treatment first, not this housing first thing.", "attribution": "-- Spencer Pratt at 05:24", "link": "https://www.youtube.com/watch?v=L1GctL0pQmE&t=324"}, {"text": "Spencer Pratt, who's running for mayor and he's he's the only logical candidate. He's the guy you have to vote for if you want to change things.", "attribution": "-- John Kobylt at 10:44", "link": "https://www.youtube.com/watch?v=L1GctL0pQmE&t=644"}, {"text": "I'm going to be the mayor of accountability as I keep saying and I have after the break I'll show you the text messages from the IRS ready to go.", "attribution": "-- Spencer Pratt at 11:22", "link": "https://www.youtube.com/watch?v=L1GctL0pQmE&t=682"}, {"text": "I didn't want to run for mayor. I don't want to be a politician. I had no choice. If it wasn't me, it was Karen Bass again.", "attribution": "-- Spencer Pratt at 26:04", "link": "https://www.youtube.com/watch?v=L1GctL0pQmE&t=1564"}, {"text": "1984, people still talk about was the greatest Olympics ever. I'm bringing 1984 back.", "attribution": "-- Spencer Pratt at 28:57", "link": "https://www.youtube.com/watch?v=L1GctL0pQmE&t=1737"}], "links": [["Watch Episode", "https://www.youtube.com/watch?v=L1GctL0pQmE"], ["Summary", "https://www.dropbox.com/scl/fi/c6otgkv7zqghejqt1uepc/John-Kobylt-Show-John-Kobylt-Radio-LA-Mayoral-Candidate-Spencer-Pratt-In-Studio-Interview-With-John-Kobylt-Summary.docx?rlkey=b7u0xqi82feqaz2kfc3f7n15q&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/jbnrw9wqty2ss7vad6r92/John-Kobylt-Show-John-Kobylt-Radio-LA-Mayoral-Candidate-Spencer-Pratt-In-Studio-Interview-With-John-Kobylt-Transcript.docx?rlkey=0q7b0sphvvmb6om3eluqggaj9&dl=0"]]},
{"title": "A conversation with LA mayoral candidate Rae Huang and Nick Caputo of Livable Advanced LA", "show": "Rae for LA", "description": "This is Rae Huang's own podcast episode where she hosts Nick Caputo to discuss LA's charter reform process. Rae is the host/interviewer discussing civic engagement and governmental reform as part of her mayoral campaign platform.", "date": "March 28, 2026", "tags": ["Rae Huang", "Guest Appearance", "Video"], "sentiment": "Positive", "quotes": [{"text": "Hey everybody, it's Ray Hang here. I am so excited to be able to have my friend Nick Caputo", "attribution": "-- Rae Huang at 00:00", "link": ""}, {"text": "Part of the reason why I wanted to hold this podcast and have you on is because a lot of folks recently saw me go viral.", "attribution": "-- Rae Huang at 01:24", "link": "https://www.youtube.com/watch?v=8_q8m3g3XA8&t=84"}, {"text": "I was going to give public comment to the Charter Reform Commission and I got cut off immediately", "attribution": "-- Rae Huang at 01:30", "link": "https://www.youtube.com/watch?v=8_q8m3g3XA8&t=90"}, {"text": "A big piece of our campaign is actually educating people more about their city", "attribution": "-- Rae Huang at 01:46", "link": "https://www.youtube.com/watch?v=8_q8m3g3XA8&t=106"}, {"text": "I attended this last charter commission meeting and it was a bit of an embarrassment", "attribution": "-- Rae Huang at 14:56", "link": "https://www.youtube.com/watch?v=8_q8m3g3XA8&t=896"}, {"text": "Seeing what happened to you was wrong. Seeing what happened to you was without a doubt the worst I've seen", "attribution": "-- Nick Caputo at 15:24", "link": "https://www.youtube.com/watch?v=8_q8m3g3XA8&t=924"}, {"text": "I believe that people who have lived experience know what they need to change to make their lives better", "attribution": "-- Rae Huang at 48:30", "link": "https://www.youtube.com/watch?v=8_q8m3g3XA8&t=2910"}, {"text": "I'm so proud and honored to be running in this race and to be creating that hope and change", "attribution": "-- Rae Huang at 52:41", "link": "https://www.youtube.com/watch?v=8_q8m3g3XA8&t=3161"}], "links": [["Watch Episode", "https://www.youtube.com/watch?v=8_q8m3g3XA8"], ["Summary", "https://www.dropbox.com/scl/fi/jg3xxu75svmzwefwtfezh/Rae-for-LA-A-conversation-with-LA-mayoral-candidate-Rae-Huang-and-Nick-Caputo-of-Livable-Advanced-LA-Summary.docx?rlkey=1mvn7h8jqc0efx20f6kzvxqh8&dl=0"], ["Full Transcript", "https://www.dropbox.com/scl/fi/mhi88am2v1nr0j9oxw3l8/Rae-for-LA-A-conversation-with-LA-mayoral-candidate-Rae-Huang-and-Nick-Caputo-of-Livable-Advanced-LA-Transcript.docx?rlkey=3bcqy5fxhngr8es1x9k4hzcu2&dl=0"]]},

    function filterEpisodes() {
      const searchTerm = document.getElementById('search').value.toLowerCase();
      const personFilter = document.getElementById('person').value;
      const appearanceFilter = document.getElementById('appearance').value;
      const sentimentFilter = document.getElementById('sentiment').value;
      const sourceFilter = document.getElementById('source').value;

      filteredEpisodes = allEpisodes.filter(ep => {
        const matchSearch = !searchTerm ||
          ep.title.toLowerCase().includes(searchTerm) ||
          ep.show.toLowerCase().includes(searchTerm) ||
          ep.description.toLowerCase().includes(searchTerm);

        const matchPerson = !personFilter || ep.tags.includes(personFilter);
        const matchAppearance = !appearanceFilter || ep.tags.includes(appearanceFilter);
        const matchSentiment = !sentimentFilter || ep.sentiment === sentimentFilter;
        const matchSource = !sourceFilter || ep.tags.includes(sourceFilter);

        return matchSearch && matchPerson && matchAppearance && matchSentiment && matchSource;
      });

      currentPage = 1;
      renderEpisodes();
    }

    function renderEpisodes() {
      const container = document.getElementById('episodes');
      const emptyState = document.getElementById('emptyState');
      const resultsInfo = document.getElementById('resultsInfo');

      if (filteredEpisodes.length === 0) {
        container.innerHTML = '';
        emptyState.style.display = 'block';
        resultsInfo.textContent = '';
        document.getElementById('pagination').innerHTML = '';
        return;
      }

      emptyState.style.display = 'none';
      const totalPages = Math.ceil(filteredEpisodes.length / ITEMS_PER_PAGE);
      resultsInfo.textContent = totalPages > 1
        ? `Showing page ${currentPage} of ${totalPages} (${filteredEpisodes.length} episodes)`
        : `Showing ${filteredEpisodes.length} episode${filteredEpisodes.length !== 1 ? 's' : ''}`;

      const start = (currentPage - 1) * ITEMS_PER_PAGE;
      const end = start + ITEMS_PER_PAGE;
      const pageEpisodes = filteredEpisodes.slice(start, end);

      container.innerHTML = pageEpisodes.map((ep, idx) => {
        const sentimentClass = `sentiment-${ep.sentiment.toLowerCase()}`;

        let tagsHtml = '';
        for (const tag of ep.tags) {
          if (tag === 'Karen Bass' || tag === 'Nithya Raman') {
            tagsHtml += `<span class="tag tag-person">${tag}</span>`;
          } else if (tag === 'Guest Appearance' || tag === 'Guest') {
            tagsHtml += `<span class="tag tag-guest">${tag}</span>`;
          } else if (tag === 'Mentioned') {
            tagsHtml += `<span class="tag tag-mention">${tag}</span>`;
          } else if (tag === 'Podcast' || tag === 'Video') {
            tagsHtml += `<span class="tag tag-source">${tag}</span>`;
          } else {
            tagsHtml += `<span class="tag">${tag}</span>`;
          }
        }

        let linksHtml = '';
        for (const link of ep.links) {
          const [text, url] = link;
          const icon = text.includes('Watch') || text.includes('Episode') ? '\u25b6' :
                       text.includes('Transcript') ? '\ud83d\udcc4' : '\ud83d\udcc4';
          linksHtml += `<a href="${url}" class="episode-link" target="_blank">${icon} ${text}</a>`;
        }

        let quoteHtml = '';
        if (ep.quotes && ep.quotes.length > 0) {
          const quotesMarkup = ep.quotes.map(q => `
            <div class="quote-item">
              <div class="quote-text">${q.text}</div>
              <div class="quote-attribution">${q.attribution}${q.link ? ` <a href="${q.link}" target="_blank">&#x2192;</a>` : ''}</div>
            </div>`).join('');
          quoteHtml = `<div class="quote-section">${quotesMarkup}</div>`;
        } else if (ep.quoteText) {
          quoteHtml = `<div class="quote-section">
            <div class="quote-item">
              <div class="quote-text">${ep.quoteText}</div>
              ${ep.quoteAttribution ? `<div class="quote-attribution">${ep.quoteAttribution}${ep.quoteLink ? ` <a href="${ep.quoteLink}" target="_blank">&#x2192;</a>` : ''}</div>` : ''}
            </div>
          </div>`;
        }

        return `<div class="episode-card">
          <div class="episode-meta">
            <div>
              <div class="episode-show">${ep.show}</div>
              <div class="episode-title">${ep.title}</div>
            </div>
            <div class="episode-date">${ep.date}</div>
          </div>

          <div class="episode-tags">
            ${tagsHtml}
            <span class="sentiment-badge ${sentimentClass}">${ep.sentiment}</span>
          </div>

          <div class="episode-description">${ep.description}</div>

          ${quoteHtml}

          <div class="episode-links">
            ${linksHtml}
          </div>
        </div>`;
      }).join('');

      renderPagination();
    }

    function renderPagination() {
      const totalPages = Math.ceil(filteredEpisodes.length / ITEMS_PER_PAGE);
      const pagination = document.getElementById('pagination');

      if (totalPages <= 1) {
        pagination.innerHTML = '';
        return;
      }

      let html = '';
      if (currentPage > 1) {
        html += `<button onclick="goToPage(${currentPage - 1})">\u2190 Previous</button>`;
      }

      for (let i = 1; i <= totalPages; i++) {
        if (i === currentPage) {
          html += `<button class="active">${i}</button>`;
        } else {
          html += `<button onclick="goToPage(${i})">${i}</button>`;
        }
      }

      if (currentPage < totalPages) {
        html += `<button onclick="goToPage(${currentPage + 1})">Next \u2192</button>`;
      }

      pagination.innerHTML = html;
    }

    function goToPage(page) {
      currentPage = page;
      renderEpisodes();
      window.scrollTo(0, 0);
    }

    function toggleQuote(quoteId, btn) {
      const expand = document.getElementById(quoteId + '-full');
      if (!expand || !btn) return;
      if (expand.classList.contains('show')) {
        expand.classList.remove('show');
        btn.textContent = 'Show full quote';
      } else {
        expand.classList.add('show');
        btn.textContent = 'Show less';
      }
    }

    function resetFilters() {
      document.getElementById('search').value = '';
      document.getElementById('person').value = '';
      document.getElementById('appearance').value = '';
      document.getElementById('sentiment').value = '';
      document.getElementById('source').value = '';
      filterEpisodes();
    }

    // Event listeners
    document.getElementById('search').addEventListener('input', filterEpisodes);
    document.getElementById('person').addEventListener('change', filterEpisodes);
    document.getElementById('appearance').addEventListener('change', filterEpisodes);
    document.getElementById('sentiment').addEventListener('change', filterEpisodes);
    document.getElementById('source').addEventListener('change', filterEpisodes);
    document.getElementById('resetBtn').addEventListener('click', resetFilters);

    // Populate person dropdown from episode data
    const personSelect = document.getElementById('person');
    const people = [...new Set(allEpisodes.flatMap(ep => ep.tags.filter(t => !['Mentioned', 'Guest', 'Guest Appearance', 'Podcast', 'Video'].includes(t))))].sort();
    people.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p;
      opt.textContent = p;
      personSelect.appendChild(opt);
    });

    // Initial render
    filterEpisodes();
  </script>
</body>
