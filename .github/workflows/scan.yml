name: PYT Radar Scan

on:
  schedule:
    # Both scans: 8am ET (12:00 UTC) and 6pm ET (22:00 UTC)
    - cron: '0 12,22 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Search mode'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - youtube
          - podcast
      reprocess:
        description: 'Reprocess failed episodes (retry transcripts & Dropbox uploads)'
        required: false
        default: false
        type: boolean
      send_digest:
        description: 'Send digest email for N most recent episodes (0 = skip)'
        required: false
        default: '0'
        type: string

permissions:
  contents: write

jobs:
  youtube-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.mode == 'all' || github.event.inputs.mode == 'youtube'))

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          pip install requests python-docx youtube-transcript-api
          pip install "yt-dlp[default]"

      - name: Create YouTube cookies file
        if: env.YOUTUBE_COOKIES != ''
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          printf '%s' "$YOUTUBE_COOKIES" > cookies.txt
          echo "YouTube cookies file created ($(wc -c < cookies.txt) bytes)"

      - name: Run YouTube scan
        id: scan
        env:
          ASSEMBLYAI_API_KEY: ${{ secrets.ASSEMBLYAI_API_KEY }}
          DROPBOX_TOKEN: ${{ secrets.DROPBOX_TOKEN }}
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          LISTENNOTES_API_KEY: ${{ secrets.LISTENNOTES_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SEARCH_TARGETS: ${{ secrets.SEARCH_TARGETS }}
          MAILGUN_API_KEY: ${{ secrets.MAILGUN_API_KEY }}
          MAILGUN_DOMAIN: ${{ secrets.MAILGUN_DOMAIN }}
          WEBSHARE_PROXY_USERNAME: ${{ secrets.WEBSHARE_PROXY_USERNAME }}
          WEBSHARE_PROXY_PASSWORD: ${{ secrets.WEBSHARE_PROXY_PASSWORD }}
        run: |
          REPROCESS_FLAG=""
          if [ "${{ github.event.inputs.reprocess }}" = "true" ]; then
            REPROCESS_FLAG="--reprocess"
          fi
          DIGEST_FLAG=""
          if [ "${{ github.event.inputs.send_digest }}" != "0" ] && [ -n "${{ github.event.inputs.send_digest }}" ]; then
            DIGEST_FLAG="--send-digest ${{ github.event.inputs.send_digest }}"
          fi
          python scanner.py --mode ${{ github.event.inputs.mode || 'youtube' }} $REPROCESS_FLAG $DIGEST_FLAG

      - name: Commit and push changes
        run: |
          git config user.name "PYT Radar Bot"
          git config user.email "pyt-radar[bot]@users.noreply.github.com"
          git add -A data/ index.html feed.xml kb/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "PYT Radar: new YouTube episodes found"
          git pull --rebase origin main || {
            git rebase --abort 2>/dev/null || true
            echo "Rebase conflict - other job likely pushed same changes. Skipping push."
            exit 0
          }
          git push || echo "Push failed, changes may already be up to date"

  podcast-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.mode == 'all' || github.event.inputs.mode == 'podcast'))

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          pip install requests python-docx youtube-transcript-api
          pip install "yt-dlp[default]"

      - name: Create YouTube cookies file
        if: env.YOUTUBE_COOKIES != ''
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          printf '%s' "$YOUTUBE_COOKIES" > cookies.txt
          echo "YouTube cookies file created ($(wc -c < cookies.txt) bytes)"

      - name: Run podcast scan
        id: scan
        env:
          ASSEMBLYAI_API_KEY: ${{ secrets.ASSEMBLYAI_API_KEY }}
          DROPBOX_TOKEN: ${{ secrets.DROPBOX_TOKEN }}
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          LISTENNOTES_API_KEY: ${{ secrets.LISTENNOTES_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SEARCH_TARGETS: ${{ secrets.SEARCH_TARGETS }}
          MAILGUN_API_KEY: ${{ secrets.MAILGUN_API_KEY }}
          MAILGUN_DOMAIN: ${{ secrets.MAILGUN_DOMAIN }}
          WEBSHARE_PROXY_USERNAME: ${{ secrets.WEBSHARE_PROXY_USERNAME }}
          WEBSHARE_PROXY_PASSWORD: ${{ secrets.WEBSHARE_PROXY_PASSWORD }}
        run: |
          REPROCESS_FLAG=""
          if [ "${{ github.event.inputs.reprocess }}" = "true" ]; then
            REPROCESS_FLAG="--reprocess"
          fi
          python scanner.py --mode ${{ github.event.inputs.mode || 'podcast' }} $REPROCESS_FLAG

      - name: Commit and push changes
        run: |
          git config user.name "PYT Radar Bot"
          git config user.email "pyt-radar[bot]@users.noreply.github.com"
          git add -A data/ index.html feed.xml kb/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "PYT Radar: new podcast episodes found"
          git pull --rebase origin main || {
            git rebase --abort 2>/dev/null || true
            echo "Rebase conflict - other job likely pushed same changes. Skipping push."
            exit 0
          }
          git push || echo "Push failed, changes may already be up to date"
