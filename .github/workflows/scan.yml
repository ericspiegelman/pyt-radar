name: PYT Radar Scan

on:
  schedule:
    # Every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:
    # Allow manual triggers from the Actions tab

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests python-docx yt-dlp

      - name: Run PYT Radar scan
        id: scan
        env:
          ASSEMBLYAI_API_KEY: ${{ secrets.ASSEMBLYAI_API_KEY }}
          DROPBOX_TOKEN: ${{ secrets.DROPBOX_TOKEN }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SEARCH_TARGETS: ${{ secrets.SEARCH_TARGETS }}
        run: python scanner.py

      - name: Commit and push changes
        run: |
          git config user.name "PYT Radar Bot"
          git config user.email "pyt-radar[bot]@users.noreply.github.com"
          for f in data/found_episodes.json index.html feed.xml; do
            [ -f "$f" ] && git add "$f"
          done
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "PYT Radar: new episode(s) found $(date -u +%Y-%m-%d)"
            git push
          fi
