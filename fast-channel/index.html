<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Griffith Observatory Television</title>
<style>
  :root{
    --accent:#ff3b30;        /* channel accent / LIVE color */
    --bg:#000;
    --fg:#fff;
    --muted:rgba(255,255,255,.62);
    --panel:rgba(12,12,14,.82);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--fg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    overflow:hidden;-webkit-font-smoothing:antialiased}

  /* ---- Player fills the screen, cropped to cover like a TV ---- */
  #stage{position:fixed;inset:0;background:#000;overflow:hidden}
  #player{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    width:100vw;height:56.25vw;pointer-events:none;border:0}
  /* "fit"  — letterbox: whole player stays on screen (keeps YouTube branding
     visible; the ToS-clean choice for a public website). */
  body.fit  #player{max-height:100vh;max-width:177.78vh}
  /* "crop" — TV-style: iframe scaled past the viewport so the picture is
     edge-to-edge (YouTube's logo/controls get pushed off-screen). */
  body.crop #player{min-height:100vh;min-width:177.78vh}

  /* ---- Channel bug (top-left) ---- */
  /* Top-right stack: logo + LIVE on top, control buttons underneath. */
  .topright{position:fixed;top:max(16px,env(safe-area-inset-top));right:16px;z-index:40;
    display:flex;flex-direction:column;align-items:flex-end;gap:8px}
  .bug{display:flex;flex-direction:column;align-items:stretch;gap:6px;width:fit-content;
    text-shadow:0 1px 6px rgba(0,0,0,.7)}
  /* LIVE sits under the logo, stretched to the logo's width and kept short. */
  .live{display:flex;align-items:center;justify-content:center;gap:7px;font-weight:800;
    font-size:12px;line-height:1;letter-spacing:.14em;background:var(--accent);color:#fff;
    padding:3px 8px;border-radius:5px;box-sizing:border-box}
  .live .dot{width:8px;height:8px;border-radius:50%;background:#fff;animation:blink 1.6s infinite}
  @keyframes blink{0%,55%{opacity:1}70%,100%{opacity:.25}}
  .bug .name{font-weight:700;font-size:15px;letter-spacing:.02em}
  /* Render the (mixed-color) Griffith wordmark uniformly white for the TV bug. */
  .bug .bug-logo{height:26px;width:auto;display:block;
    filter:brightness(0) invert(1) drop-shadow(0 1px 4px rgba(0,0,0,.65))}

  /* ---- Lower third (now playing / up next) ---- */
  .lower{position:fixed;left:0;right:0;bottom:0;z-index:30;
    padding:64px 22px max(22px,env(safe-area-inset-bottom));
    background:linear-gradient(to top,rgba(0,0,0,.85),rgba(0,0,0,0));
    transition:opacity .5s ease;pointer-events:none}
  .lower.hide{opacity:0}
  .now-label{font-size:11px;letter-spacing:.18em;font-weight:800;color:var(--accent);
    text-transform:uppercase;margin-bottom:4px}
  .now-title{font-size:clamp(20px,3.4vw,34px);font-weight:800;line-height:1.12;
    max-width:60ch;text-shadow:0 2px 12px rgba(0,0,0,.6)}
  .next{margin-top:10px;font-size:14px;color:var(--muted)}
  .next b{color:#fff;font-weight:600}
  /* thin progress bar for the current program */
  .bar{position:fixed;left:0;right:0;bottom:0;height:3px;background:rgba(255,255,255,.18);z-index:31}
  .bar > i{display:block;height:100%;width:0;background:var(--accent);transition:width 1s linear}

  /* ---- Buttons ---- */
  /* Controls sit inside the bug stack -> stretched to the logo width, spread to fit. */
  .controls{display:flex;justify-content:space-between;gap:6px;transition:opacity .4s ease}
  .controls .btn{padding:5px 10px;font-size:12px;gap:5px}
  /* When mirrored/cast to a TV nobody touches the mouse — after a few idle
     seconds, hide the cursor and the buttons so only the channel shows. */
  body.idle{cursor:none}
  body.idle .controls{opacity:0;pointer-events:none}
  .btn{appearance:none;border:0;cursor:pointer;color:#fff;background:var(--panel);
    backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.12);
    padding:9px 13px;border-radius:999px;font-size:13px;font-weight:600;
    display:inline-flex;align-items:center;gap:7px;transition:background .2s}
  .btn:hover{background:rgba(40,40,46,.92)}

  /* ---- Unmute / tune-in overlay ---- */
  #tunein{position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(120% 120% at 50% 40%,rgba(0,0,0,.35),rgba(0,0,0,.78));
    cursor:pointer;transition:opacity .4s}
  #tunein.gone{opacity:0;pointer-events:none}
  .tune-card{text-align:center;transform:translateY(-4%)}
  .tune-card .ic{font-size:46px}
  .tune-card .t{margin-top:10px;font-size:22px;font-weight:800;letter-spacing:.02em}
  .tune-card .s{margin-top:4px;font-size:14px;color:var(--muted)}

  /* ---- Guide / EPG overlay ---- */
  /* Compact channel-guide panel (floats, not full-screen) */
  #guide{position:fixed;top:96px;right:16px;left:auto;z-index:50;
    width:min(380px,92vw);max-height:min(78vh,640px);
    background:rgba(8,8,10,.92);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.14);
    border-radius:14px;box-shadow:0 14px 44px rgba(0,0,0,.55);
    display:none;flex-direction:column;padding:13px 15px}
  #guide.open{display:flex}
  .guide-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:9px}
  .guide-head h2{margin:0;font-size:14px;line-height:1.25;letter-spacing:.02em}
  .guide-head .sub{color:var(--muted);font-size:11px}
  .guide-list{overflow:auto;display:flex;flex-direction:column;gap:1px;-webkit-overflow-scrolling:touch}
  .row{display:grid;grid-template-columns:66px 1fr auto;gap:10px;align-items:center;
    padding:6px 8px;border-radius:7px}
  .row + .row{border-top:1px solid rgba(255,255,255,.06)}
  .row.on{background:rgba(255,59,48,.18)}
  .row .time{font-variant-numeric:tabular-nums;color:var(--muted);font-size:12px}
  .row.on .time{color:var(--accent);font-weight:700}
  .row .ttl{font-weight:600;font-size:13px;color:rgba(255,255,255,.92);
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .row.on .ttl{color:#fff}
  .row .badge{font-size:9px;font-weight:800;letter-spacing:.1em;color:var(--accent)}

  /* ---- Status / error toast ---- */
  #status{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);z-index:45;
    background:var(--panel);border:1px solid rgba(255,255,255,.12);border-radius:10px;
    padding:11px 16px;font-size:13px;color:var(--muted);max-width:min(92vw,520px);
    text-align:center;display:none}
  #status.show{display:block}
  #status code{color:#fff;background:rgba(255,255,255,.1);padding:1px 5px;border-radius:4px}
  a{color:var(--accent)}
</style>
</head>
<body>

  <div id="stage"><div id="player"></div></div>

  <div class="topright">
    <div class="bug">
      <img class="bug-logo" src="logo_griffith.svg" alt="Griffith Observatory">
      <span class="live"><span class="dot"></span>LIVE</span>
      <span class="name" id="chName" style="display:none"></span>
      <div class="controls">
        <button class="btn" id="guideBtn">📺 Guide</button>
        <button class="btn" id="muteBtn">🔇</button>
        <button class="btn" id="fsBtn">⛶</button>
      </div>
    </div>
  </div>

  <div class="lower" id="lower">
    <div class="now-label" id="nowLabel">Now Playing</div>
    <div class="now-title" id="nowTitle">Tuning in…</div>
    <div class="next" id="nextLine"></div>
  </div>
  <div class="bar"><i id="progress"></i></div>

  <div id="tunein">
    <div class="tune-card">
      <div class="ic">🔊</div>
      <div class="t">Tap to tune in</div>
      <div class="s">The channel is already live — tap to unmute</div>
    </div>
  </div>

  <div id="guide">
    <div class="guide-head">
      <div><h2 id="guideName">Channel Guide</h2></div>
      <button class="btn" id="guideClose">✕ Close</button>
    </div>
    <div class="guide-list" id="guideList"></div>
  </div>

  <div id="status"></div>

<script>
/* ============================================================================
   FAST CHANNEL — lightweight linear "live TV" template
   ----------------------------------------------------------------------------
   Plays YouTube videos as a broadcast-style channel. What's on screen is
   computed from the wall clock, so everyone who tunes in lands at the same
   spot — like a real channel.

   Two scheduling modes, auto-detected from your sheet's columns:

   • WEEKLY GRID  (sheet has `day` + `start` columns) — true broadcast schedule.
                  "Mon 8:00 PM" always shows the same program. Repeats weekly.
   • LOOP         (no day/start columns) — one list that plays top-to-bottom
                  and repeats forever.

   ── SET UP YOUR SPREADSHEET (weekly grid) ──────────────────────────────────
   Header row + these columns (any order):
          day | start | video                               | title    | duration
          ---------------------------------------------------------------------
          Mon | 20:00 | https://youtu.be/aqz-KE-bpKQ        | Hubble   | 10:34
          Mon | 20:11 | https://www.youtube.com/watch?v=... | Nebulae  | 12:40
          Tue | 09:00 | dQw4w9WgXcQ                         | Sunrise  | 3:33
      • day      — Mon … Sun (the day the program airs)
      • start    — air time, 24-hour HH:MM (or "8:00 PM"), in CONFIG.TIMEZONE
      • video    — YouTube URL (watch, youtu.be, /embed, /shorts) or bare ID
      • title    — shown in the lower-third + guide (optional)
      • duration — h:mm:ss, m:ss, or plain seconds. REQUIRED so the schedule
                   knows when each program starts and ends.
      (Drop the day/start columns and it falls back to a continuous LOOP.)

   Then: File ▸ Share ▸ Publish to web ▸ CSV  (or set the sheet link-viewable),
   and put that link in SHEET_CSV_URL below.

   Until then, the channel runs the built-in DEMO lineup so it works immediately.
   ========================================================================== */

  const CONFIG = {
    CHANNEL_NAME : "Griffith Observatory Television",
    // How the picture fills the screen:
    //   "fit"  = letterbox, YouTube branding stays visible (best for a public website)
    //   "crop" = edge-to-edge TV crop (best for an on-site kiosk/display)
    FILL_MODE    : "fit",
    // Paste your published-to-web CSV link here (…/pub?output=csv or gviz csv):
    SHEET_CSV_URL: "schedule.csv",
    // Timezone the weekly grid is read in (so "Mon 8:00 PM" means 8pm there).
    TIMEZONE     : "America/Los_Angeles",
    // LOOP-MODE ONLY: fixed point a continuous loop counts from. Ignored when
    // the sheet has day/start columns (grid mode anchors to the wall clock).
    EPOCH_ANCHOR : Date.UTC(2024, 0, 1, 0, 0, 0) / 1000,
    REFRESH_MIN  : 5,    // re-fetch the sheet every N minutes to pick up edits
    HIDE_LOWER_S : 8,    // auto-hide the now/next lower-third after N seconds
  };

  // Built-in demo lineup (durations are real) so the template runs out-of-box.
  const DEMO = [
    { video:"aqz-KE-bpKQ", title:"Big Buck Bunny (Demo)",      duration:"10:34" },
    { video:"dQw4w9WgXcQ", title:"Demo Program — Block B",     duration:"3:33"  },
    { video:"YE7VzlLtp-4", title:"Big Buck Bunny — Trailer",   duration:"0:33"  },
    { video:"jNQXAC9IVRw", title:"Me at the zoo (Demo)",       duration:"0:19"  },
  ];

  /* ---------- tiny helpers ---------- */
  const $ = s => document.querySelector(s);
  const statusEl = $("#status");
  function showStatus(html){ statusEl.innerHTML = html; statusEl.classList.add("show"); }
  function hideStatus(){ statusEl.classList.remove("show"); }

  function parseDuration(v){
    if (v == null) return NaN;
    v = String(v).trim();
    if (v === "") return NaN;
    if (/^\d+(\.\d+)?$/.test(v)) return Math.round(parseFloat(v));   // plain seconds
    const parts = v.split(":").map(Number);
    if (parts.some(isNaN)) return NaN;
    return parts.reduce((acc, n) => acc * 60 + n, 0);                // h:mm:ss / m:ss
  }
  function fmtClock(sec){
    sec = Math.max(0, Math.round(sec));
    const h = Math.floor(sec/3600), m = Math.floor(sec%3600/60), s = sec%60;
    return (h? h+":"+String(m).padStart(2,"0") : m) + ":" + String(s).padStart(2,"0");
  }
  function fmtTOD(epochSec){
    return new Date(epochSec*1000).toLocaleTimeString([], {hour:"numeric", minute:"2-digit"});
  }
  function extractId(s){
    s = String(s||"").trim();
    if (/^[\w-]{11}$/.test(s)) return s;                 // already a bare ID
    const m = s.match(/(?:v=|\/embed\/|\/shorts\/|youtu\.be\/)([\w-]{11})/);
    return m ? m[1] : "";
  }

  // Minimal CSV parser (handles quotes, commas, and newlines inside quotes).
  function parseCSV(text){
    const rows = []; let row = [], field = "", q = false;
    text = text.replace(/\r\n?/g, "\n");
    for (let i=0; i<text.length; i++){
      const c = text[i];
      if (q){
        if (c === '"'){ if (text[i+1] === '"'){ field+='"'; i++; } else q=false; }
        else field += c;
      } else {
        if (c === '"') q = true;
        else if (c === ",") { row.push(field); field=""; }
        else if (c === "\n"){ row.push(field); rows.push(row); row=[]; field=""; }
        else field += c;
      }
    }
    if (field !== "" || row.length){ row.push(field); rows.push(row); }
    return rows.filter(r => r.length && r.some(c => c.trim() !== ""));
  }

  function rowsToPlaylist(rows){
    if (!rows.length) return [];
    const head = rows[0].map(h => h.trim().toLowerCase());
    const col = (...names) => { for (const n of names){ const i=head.indexOf(n); if(i>=0) return i; } return -1; };
    const ci = {
      day:      col("day","weekday","dow"),
      start:    col("start","starttime","airtime","slot"),
      video:    col("video","url","youtube","link","id","videoid"),
      title:    col("title","name","program"),
      duration: col("duration","length","runtime","secs","seconds"),
      offset:   col("offset","startat","seek"),
      block:    col("block"),
    };
    if (ci.video < 0) ci.video = ci.day>=0 ? 2 : 0;  // default video column
    const out = [];
    for (let r=1; r<rows.length; r++){
      const cells = rows[r];
      const id = extractId(cells[ci.video]);
      if (!id) continue;
      out.push({
        id,
        title:     (ci.title>=0 && cells[ci.title]?.trim()) || ("Video "+id),
        dur:       ci.duration>=0 ? parseDuration(cells[ci.duration]) : NaN,
        dayIdx:    ci.day>=0    ? parseDay(cells[ci.day])         : NaN,
        startSec:  ci.start>=0  ? parseTimeOfDay(cells[ci.start]) : NaN,
        offsetSec: ci.offset>=0 ? (parseTimeOfDay(cells[ci.offset]) || 0) : 0,
        block:     ci.block>=0  ? (cells[ci.block]?.trim() || "") : "",
      });
    }
    return out;
  }

  /* ---------- channel state ---------- */
  let schedule = [];     // [{start,dur,id,title,offset,block}]  start = seconds into the cycle
  let cycle = 0;         // length of one full cycle
  let mode = "loop";     // "grid" = weekly day/time · "daily" = time-of-day · "loop" = continuous
  let player = null, ytReady = false, pendingStart = null;
  let current = -1, segmentEnd = 0, progTimer = null, gapTimer = null;

  const DAY = 86400, WEEK = 7 * DAY;
  const DAY_IDX = { mon:0,monday:0, tue:1,tues:1,tuesday:1, wed:2,weds:2,wednesday:2,
                    thu:3,thur:3,thurs:3,thursday:3, fri:4,friday:4,
                    sat:5,saturday:5, sun:6,sunday:6 };
  const DAY_LABEL = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

  function parseDay(v){ const k=String(v||"").trim().toLowerCase(); return k in DAY_IDX ? DAY_IDX[k] : NaN; }
  function parseTimeOfDay(v){               // "20:00", "20:10:34", "8:00 PM" -> seconds into the day
    v = String(v||"").trim(); if (!v) return NaN;
    const m = v.match(/^(\d{1,2}):(\d{2})(?::(\d{2}))?\s*(am|pm)?$/i);
    if (!m) return NaN;
    let h = +m[1]; const min = +m[2], sec = +(m[3]||0);
    if (m[4]){ const pm=/pm/i.test(m[4]); if (h===12) h = pm?12:0; else if (pm) h += 12; }
    return h*3600 + min*60 + sec;
  }
  function fmtSlot(startSec){               // -> "8:00 PM" (daily) / "Mon 8:00 PM" (grid)
    const tod = startSec % DAY;
    const h24 = Math.floor(tod/3600), m = Math.floor(tod%3600/60);
    let h = h24 % 12; if (h===0) h = 12;
    const t = h+":"+String(m).padStart(2,"0")+" "+(h24>=12?"PM":"AM");
    return mode==="grid" ? DAY_LABEL[Math.floor(startSec/DAY)%7]+" "+t : t;
  }

  function buildSchedule(items){
    const usable = items.filter(it => it.dur > 0);
    const dropped = items.length - usable.length;
    // grid = every row has day + start · daily = every row has start (no day) · else loop
    const hasStart = usable.length > 0 && usable.every(it => !isNaN(it.startSec));
    const hasDay   = usable.length > 0 && usable.every(it => !isNaN(it.dayIdx));
    mode = hasStart ? (hasDay ? "grid" : "daily") : "loop";
    schedule = [];
    if (mode !== "loop"){
      cycle = mode === "grid" ? WEEK : DAY;
      for (const it of usable)
        schedule.push({ start: (hasDay ? it.dayIdx*DAY : 0) + it.startSec, dur: it.dur,
                        id: it.id, title: it.title, offset: it.offsetSec||0, block: it.block||"" });
      schedule.sort((a,b)=>a.start-b.start);
    } else {
      let acc = 0;
      for (const it of usable){ schedule.push({ start:acc, dur:it.dur, id:it.id, title:it.title, offset:0, block:"" }); acc += it.dur; }
      cycle = acc;
    }
    return { usable: usable.length, dropped };
  }

  // Where are we in the cycle right now (seconds)?
  function nowPos(){
    if (mode !== "loop"){
      const parts = new Intl.DateTimeFormat("en-US",{ timeZone:CONFIG.TIMEZONE, weekday:"short",
        hour:"2-digit", minute:"2-digit", second:"2-digit", hour12:false }).formatToParts(new Date());
      const get = t => parts.find(x=>x.type===t)?.value;
      const dayIdx = DAY_IDX[String(get("weekday")).toLowerCase()] ?? 0;
      let h = +get("hour"); if (h===24) h = 0;     // some engines emit "24" at midnight
      const sod = h*3600 + (+get("minute"))*60 + (+get("second"));
      return (mode === "grid" ? dayIdx*DAY : 0) + sod;
    }
    return ((Date.now()/1000 - CONFIG.EPOCH_ANCHOR) % cycle + cycle) % cycle;
  }

  // How far into a program is the cycle position, accounting for windows that
  // wrap past the end of the cycle? Returns -1 if the position isn't inside it.
  function offsetInto(prog, pos){
    const o = ((pos - prog.start) % cycle + cycle) % cycle;
    return o < prog.dur ? o : -1;
  }
  function currentProgram(pos){
    for (let i=0; i<schedule.length; i++){ const o=offsetInto(schedule[i],pos); if (o>=0) return {index:i, offset:o}; }
    return null;                                    // gap (only possible in grid mode)
  }
  function nextProgram(pos){
    let best=-1, wait=Infinity;
    for (let i=0; i<schedule.length; i++){
      const d = ((schedule[i].start - pos) % cycle + cycle) % cycle;
      if (d>0 && d<wait){ wait=d; best=i; }
    }
    return best<0 ? null : { index:best, wait };
  }

  function tuneToNow(){
    if (!schedule.length || !ytReady) return;
    clearTimeout(gapTimer);
    const pos = nowPos();
    const cur = currentProgram(pos);
    if (cur){ playSegment(cur.index, cur.offset); return; }
    // Grid gap: show standby and auto-tune when the next program is due.
    const nx = nextProgram(pos);
    showStandby(nx);
    if (nx) gapTimer = setTimeout(tuneToNow, Math.min(nx.wait, 3600)*1000 + 500);
  }

  function playSegment(index, offset){
    current = index;
    const item = schedule[index];
    segmentEnd = Date.now()/1000 + (item.dur - offset);
    // item.offset = where in the video this program starts (e.g. skip a 7-min intro)
    player.loadVideoById({ videoId:item.id, startSeconds: Math.floor((item.offset||0) + offset) });
    updateOverlay();
  }

  function showStandby(nx){
    current = -1;
    $("#nowLabel").textContent = "Up Next";
    $("#nowTitle").textContent = nx ? schedule[nx.index].title : "Off air";
    $("#nextLine").innerHTML  = nx ? "Starts <b>"+fmtSlot(schedule[nx.index].start)+"</b>" : "";
    $("#progress").style.width = "0%";
    try { player && player.pauseVideo && player.pauseVideo(); } catch(e){}
    flashLower();
  }

  // When a program ends, re-check the clock and play whatever's on now (self-heals
  // any drift between a video's stated duration and its real length).
  function advance(){ tuneToNow(); }

  /* ---------- overlay / chrome ---------- */
  let lowerTimer = null;
  function flashLower(){
    $("#lower").classList.remove("hide");
    clearTimeout(lowerTimer);
    lowerTimer = setTimeout(()=>$("#lower").classList.add("hide"), CONFIG.HIDE_LOWER_S*1000);
  }
  function updateOverlay(){
    if (current < 0) return;
    const item = schedule[current];
    const next = schedule[(current+1) % schedule.length];
    $("#nowLabel").textContent = item.block || "Now Playing";
    $("#nowTitle").textContent = item.title;
    $("#nextLine").innerHTML = next
      ? "Up next · <b>"+escapeHtml(next.title)+"</b>"
        + (mode!=="loop" ? ' · <span style="color:var(--muted)">'+fmtSlot(next.start)+'</span>' : '')
      : "";
    flashLower();
    if ($("#guide").classList.contains("open")) renderGuide();
  }
  function escapeHtml(s){ return String(s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

  function tickProgress(){
    if (current < 0 || !schedule[current]) return;
    const item = schedule[current];
    const remain = segmentEnd - Date.now()/1000;
    const frac = 1 - Math.max(0, Math.min(1, remain / item.dur));
    $("#progress").style.width = (frac*100).toFixed(2) + "%";
  }

  // Collapse consecutive same-block segments into one guide row per block.
  function blockGroups(){
    const g = [];
    for (let i=0; i<schedule.length; i++){
      const it = schedule[i], name = it.block || it.title, last = g[g.length-1];
      if (last && last.name === name){ last.dur += it.dur; last.lastIdx = i; }
      else g.push({ name, start: it.start, dur: it.dur, firstIdx: i, lastIdx: i });
    }
    return g;
  }
  function renderGuide(){
    const list = $("#guideList");
    const pos = nowPos();
    const cur = currentProgram(pos);
    const groups = blockGroups();   // already in schedule order (from 12 AM in daily mode)
    const curG = cur ? groups.findIndex(g => cur.index >= g.firstIdx && cur.index <= g.lastIdx) : -1;
    let html = "";
    for (let i=0; i<groups.length; i++){
      const g = groups[i];
      const on = i === curG;
      const time = mode!=="loop" ? fmtSlot(g.start) : fmtClock(g.start);
      html += '<div class="row'+(on?' on':'')+'">'
            +   '<div class="time">'+time+'</div>'
            +   '<div class="ttl">'+escapeHtml(g.name)+'</div>'
            +   (on ? '<div class="badge">ON NOW</div>' : '<div></div>')
            + '</div>';
    }
    list.innerHTML = html;
    list.querySelector('.row.on')?.scrollIntoView({block:'center'});
  }

  /* ---------- YouTube IFrame API ---------- */
  window.onYouTubeIframeAPIReady = function(){
    player = new YT.Player("player", {
      host: "https://www.youtube.com",
      playerVars: {
        autoplay:1, mute:1, controls:0, rel:0, modestbranding:1,
        playsinline:1, iv_load_policy:3, fs:0, disablekb:1,
      },
      events: {
        onReady: ()=>{
          ytReady = true;
          player.mute();
          if (pendingStart){ pendingStart(); pendingStart = null; }
          else tuneToNow();
          if (!progTimer) progTimer = setInterval(()=>{ tickProgress(); if(Date.now()/1000>=segmentEnd-0.3) {/*safety*/} }, 1000);
        },
        onStateChange: (e)=>{ if (e.data === YT.PlayerState.ENDED) advance(); },
        onError: ()=>{ advance(); },   // skip unplayable videos
      },
    });
  };
  function loadYT(){
    const s = document.createElement("script");
    s.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(s);
  }

  /* ---------- data load ---------- */
  async function loadPlaylist(){
    let items, source;
    if (CONFIG.SHEET_CSV_URL){
      try {
        const res = await fetch(CONFIG.SHEET_CSV_URL, { cache:"no-store" });
        if (!res.ok) throw new Error("HTTP "+res.status);
        items = rowsToPlaylist(parseCSV(await res.text()));
        source = "sheet";
        if (!items.length) throw new Error("no usable rows");
      } catch (err){
        items = DEMO.map(d=>({id:extractId(d.video),title:d.title,dur:parseDuration(d.duration)}));
        source = "demo-fallback";
        showStatus("Couldn't load the sheet ("+escapeHtml(err.message)+"). Showing the demo lineup. "
          +"Check that <code>SHEET_CSV_URL</code> is the <b>published CSV</b> link.");
      }
    } else {
      items = DEMO.map(d=>({id:extractId(d.video),title:d.title,dur:parseDuration(d.duration)}));
      source = "demo";
      showStatus("Running the built-in <b>demo</b> lineup. Add your published Google-Sheet CSV link to "
        +"<code>SHEET_CSV_URL</code> in the file to load your own channel.");
    }

    const { dropped } = buildSchedule(items);
    if (source === "sheet") hideStatus();
    if (dropped > 0){
      showStatus(dropped+" row(s) were skipped because they had no valid <b>duration</b>. "
        +"Add a duration (e.g. <code>3:45</code>) so the live schedule can place them.");
    }

    if (!schedule.length){
      showStatus("No playable videos found. Make sure your sheet has a <code>video</code> column with "
        +"YouTube links/IDs and a <code>duration</code> column.");
      return;
    }
    // (Re)sync to the clock with the freshly built schedule.
    if (ytReady) tuneToNow();
    else pendingStart = tuneToNow;
  }

  /* ---------- interactions ---------- */
  let muted = true;
  function setMuted(m){
    muted = m;
    if (!player) return;
    if (m){ player.mute(); $("#muteBtn").textContent = "🔇"; }
    else  { player.unMute(); player.setVolume(100); $("#muteBtn").textContent = "🔊"; }
  }
  $("#tunein").addEventListener("click", ()=>{
    $("#tunein").classList.add("gone");
    setMuted(false);
    tuneToNow();            // re-sync to "now" the moment the viewer engages
    flashLower();
  });
  $("#muteBtn").addEventListener("click", ()=> setMuted(!muted));
  function toggleFs(){
    const el = document.documentElement;
    if (document.fullscreenElement) (document.exitFullscreen||document.webkitExitFullscreen).call(document);
    else (el.requestFullscreen||el.webkitRequestFullscreen).call(el);
  }
  $("#fsBtn").addEventListener("click", toggleFs);
  document.addEventListener("fullscreenchange", ()=>{
    $("#fsBtn").textContent = document.fullscreenElement ? "🗗" : "⛶";
  });
  $("#guideBtn").addEventListener("click", ()=>{
    const tr = document.querySelector(".topright").getBoundingClientRect();
    $("#guide").style.top = (tr.bottom + 6) + "px";   // drop it just under the buttons
    renderGuide(); $("#guide").classList.add("open");
  });
  $("#guideClose").addEventListener("click", ()=> $("#guide").classList.remove("open"));
  document.addEventListener("keydown", e=>{
    if (e.key==="g") $("#guideBtn").click();
    if (e.key==="Escape") $("#guide").classList.remove("open");
    if (e.key==="m") $("#muteBtn").click();
    if (e.key==="f") $("#fsBtn").click();
  });
  // When a backgrounded tab comes back, snap to whatever's live now.
  document.addEventListener("visibilitychange", ()=>{ if(!document.hidden) tuneToNow(); });

  // Idle auto-hide for a clean mirrored/cast TV view.
  let idleTimer = null;
  function activity(){
    document.body.classList.remove("idle");
    clearTimeout(idleTimer);
    idleTimer = setTimeout(()=>document.body.classList.add("idle"), 3500);
  }
  ["mousemove","mousedown","keydown","touchstart"].forEach(e=>document.addEventListener(e, activity));
  activity();
  // Tap anywhere on the picture to briefly show now/next.
  $("#stage").addEventListener("click", flashLower);

  /* ---------- boot ---------- */
  document.body.classList.add(CONFIG.FILL_MODE === "crop" ? "crop" : "fit");
  $("#chName").textContent = CONFIG.CHANNEL_NAME;
  $("#guideName").textContent = "Griffith Observatory Television - Sample Day Schedule";
  document.title = CONFIG.CHANNEL_NAME;
  loadYT();
  loadPlaylist();
  setInterval(loadPlaylist, Math.max(1, CONFIG.REFRESH_MIN) * 60 * 1000);
</script>
</body>
</html>
